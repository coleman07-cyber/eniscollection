<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ENIS COLLECTION</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@700;800&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #FFFFFF;
            --card-bg: #FFFFFF;
            --text-main: #000000;
            --text-soft: #636366;
            /* Harmonized Gold Palette */
            --accent-gold: #C5A028; 
            --wa-green: #25D366;
            --border: rgba(0, 0, 0, 0.05);
            --ease-luxury: cubic-bezier(0.23, 1, 0.32, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --card-bg: #0D0D0D;
                --text-main: #FFFFFF;
                --text-soft: #8E8E93;
                --border: rgba(255, 255, 255, 0.08);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); height: 100vh; overflow: hidden; position: fixed; width: 100%; }
        .app-shell { width: 100%; max-width: 420px; height: 100vh; margin: 0 auto; background: var(--bg); position: relative; display: flex; flex-direction: column; }

        /* --- HEADER (Premium Serif) --- */
        header { padding: calc(env(safe-area-inset-top) + 20px) 0 15px; background: var(--bg); text-align: center; border-bottom: 0.5px solid var(--border); }
        .header-title { 
            font-family: 'Playfair Display', serif; 
            font-size: 24px; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            color: var(--text-main); 
        }
        .header-slogan { 
            font-size: 9px; 
            text-transform: uppercase; 
            letter-spacing: 5px; 
            font-weight: 700; 
            color: var(--accent-gold); 
            margin-top: 5px;
        }

        /* --- CATALOGUE --- */
        .catalogue-container { padding: 15px 0; background: var(--bg); }
        .catalogue-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 0 15px; scrollbar-width: none; }
        .catalogue-scroll::-webkit-scrollbar { display: none; }
        
        .cat-item {
            padding: 10px 22px; border-radius: 50px; 
            border: 1px solid var(--border);
            font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
            white-space: nowrap; color: var(--text-soft); transition: 0.4s;
        }
        .cat-item.active { background: var(--text-main); color: var(--bg); border-color: var(--text-main); }

        /* --- PRODUCT GRID --- */
        .feed { flex: 1; overflow-y: auto; background: var(--bg); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 15px; }
        .product-card { background: var(--card-bg); border-radius: 20px; overflow: hidden; opacity: 0; transform: translateY(20px); transition: all 0.8s var(--ease-luxury); }
        .product-card.visible { opacity: 1; transform: translateY(0); }
        
        .p-image-wrap { position: relative; width: 100%; aspect-ratio: 1/1.35; overflow: hidden; border-radius: 18px; }
        .p-image-wrap img { width: 100%; height: 100%; object-fit: cover; }
        
        /* MATCHED GOLD PRICE TAG WITH GLOW */
        .price-tag { 
            position: absolute; bottom: 10px; right: 10px; 
            background: var(--accent-gold); color: #FFF; 
            padding: 7px 14px; border-radius: 12px; font-size: 11px; font-weight: 800; 
            box-shadow: 0 4px 15px rgba(197, 160, 40, 0.4);
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* --- PREMIUM ABOUT --- */
        .about-premium { margin: 50px 15px; padding: 60px 20px; background: var(--card-bg); border-radius: 35px; border: 1px solid var(--border); text-align: center; }
        .about-premium h3 { font-family: 'Playfair Display', serif; font-size: 26px; margin-bottom: 15px; }
        .about-premium p { font-size: 13px; color: var(--text-soft); line-height: 1.8; margin-bottom: 30px; }

        /* --- PREVIEW TRANSITION --- */
        #item-preview {
            position: fixed; inset: 0; z-index: 10000;
            background: rgba(0,0,0,0.2); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.5s var(--ease-luxury);
        }
        #item-preview.active { display: flex; opacity: 1; }
        
        .preview-box { 
            width: 270px; background: var(--card-bg); padding: 8px; border-radius: 42px; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.15);
            transform: scale(0.9) translateY(20px); transition: transform 0.5s var(--ease-luxury);
        }
        #item-preview.active .preview-box { transform: scale(1) translateY(0); }
        
        /* Smooth Fade-Out */
        #item-preview.closing { opacity: 0; }
        #item-preview.closing .preview-box { transform: scale(0.94) translateY(10px); }

        .btn-wa { background: var(--wa-green); color: white; padding: 18px; border-radius: 22px; text-decoration: none; font-weight: 800; display: flex; align-items: center; gap: 12px; font-size: 13px; justify-content: center; margin-top: 15px; box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3); }

        /* --- SPLASH (Classic Branding) --- */
        #splash-screen { position: absolute; inset: 0; z-index: 9999; background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.85)), url('images/Splash-Dress.PNG') center/cover; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.8s var(--ease-luxury); }
        #splash-screen.hidden { opacity: 0; visibility: hidden; }
        .splash-title { font-family: 'Great Vibes', cursive; color: white; font-size: 64px; text-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .splash-slogan { font-size: 10px; letter-spacing: 6px; text-transform: uppercase; font-weight: 700; color: var(--accent-gold); margin-top: -10px; }
        .btn-discover { margin-top: 50px; padding: 18px 60px; border-radius: 50px; border: none; font-weight: 800; background: #FFF; color: #000; letter-spacing: 3px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-shell">
    <div id="splash-screen">
        <h1 class="splash-title">Enis Collection</h1>
        <p class="splash-slogan">Pamper Your Body</p>
        <button class="btn-discover" onclick="launchApp()">DISCOVER</button>
    </div>

    <div id="shop-content" style="display: none; flex-direction: column; height: 100%;">
        <header>
            <h1 class="header-title">Enis Collection</h1>
            <p class="header-slogan">Pamper Your Body</p>
        </header>

        <div class="catalogue-container">
            <div class="catalogue-scroll">
                <div class="cat-item active" onclick="filterCat('All', this)">All Items</div>
                <div class="cat-item" onclick="filterCat('Dress', this)">Dresses</div>
                <div class="cat-item" onclick="filterCat('Set', this)">Sets</div>
                <div class="cat-item" onclick="filterCat('Work', this)">Work Wear</div>
            </div>
        </div>

        <div class="feed" id="mainFeed" onscroll="handleScroll()">
            <div class="grid" id="productGrid"></div>
            
            <div class="about-premium">
                <span style="font-size: 9px; letter-spacing: 4px; color: var(--accent-gold); text-transform: uppercase; font-weight: 800;">Established 2022</span>
                <h3 style="font-family: 'Playfair Display', serif; margin-top: 10px;">The Gold Standard</h3>
                <p>Curating exceptional silhouettes for the modern woman. Based in Cape Coast, Ghana.</p>
                <div style="display: flex; justify-content: center; gap: 20px;">
                    <a href="#" style="color: var(--text-main); font-size: 20px;"><i class="fab fa-whatsapp"></i></a>
                    <a href="#" style="color: var(--text-main); font-size: 20px;"><i class="fab fa-tiktok"></i></a>
                </div>
            </div>
        </div>
    </div>

    <div id="item-preview" onclick="closePreview()">
        <div class="preview-box" onclick="event.stopPropagation()">
            <div style="border-radius: 34px; overflow: hidden; height: 380px;">
                <img id="preview-img" src="" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <div style="padding: 22px 10px; text-align: center;">
                <h2 id="preview-name" style="font-family: 'Playfair Display', serif; font-size: 22px; color: var(--text-main);"></h2>
                <p id="preview-price" style="color: var(--accent-gold); font-size: 13px; font-weight: 700; margin-top: 6px;"></p>
                <a id="wa-btn" href="#" class="btn-wa"><i class="fab fa-whatsapp"></i> ORDER VIA WHATSAPP</a>
            </div>
        </div>
    </div>
</div>

<script>
    const myProducts = [
        { name: "Thick Seamless Dress", price: 50, size: "10", category: "Dress", image: "images/item1.jpg" },
        { name: "Plaited Skirts & Top", price: 50, size: "8/10", category: "Set", image: "images/item2.jpg" },
        { name: "Short Length Essential", price: 45, size: "8", category: "Dress", image: "images/item3.jpg" },
        { name: "Church & Work Midi", price: 50, size: "8", category: "Work", image: "images/item4.jpg" },
        { name: "Dinner & Party Elegance", price: 45, size: "8/10", category: "Dress", image: "images/item5.jpg" },
        { name: "Lecture & Beach Set", price: 45, size: "6/8/10", category: "Set", image: "images/item6.jpg" },
        { name: "Ruched SHEIN Special", price: 50, size: "8/10", category: "Dress", image: "images/item7.jpg" },
        { name: "Ultimate Work Gown", price: 50, size: "12/14", category: "Work", image: "images/item8.jpg" },
        { name: "Skirt & Basic Top Duo", price: 50, size: "10/12", category: "Set", image: "images/item9.jpg" },
        { name: "Refined Church Wear", price: 50, size: "10", category: "Work", image: "images/item10.jpg" }
    ];

    function renderProducts(filter = 'All') {
        const grid = document.getElementById('productGrid');
        const items = filter === 'All' ? myProducts : myProducts.filter(p => p.category === filter);
        grid.innerHTML = items.map((item) => `
            <div class="product-card">
                <div class="p-image-wrap" onclick="openPreview('${item.name.replace(/'/g, "\\'")}', ${item.price}, '${item.image}', '${item.size}')">
                    <img src="${item.image}" loading="lazy" onload="this.parentElement.parentElement.classList.add('visible')">
                    <div class="price-tag">₵${item.price}</div>
                </div>
                <div style="padding:15px 5px;">
                    <span style="font-size:9px; color:var(--accent-gold); font-weight:700; letter-spacing:1px;">SIZE ${item.size}</span>
                    <h3 style="font-size:12px; color:var(--text-main); margin-top:4px; font-weight:700; letter-spacing:-0.2px;">${item.name}</h3>
                </div>
            </div>
        `).join('');
    }

    function filterCat(cat, el) {
        document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        renderProducts(cat);
        document.getElementById('mainFeed').scrollTo({ top: 0, behavior: 'smooth' });
    }

    function handleScroll() {
        document.querySelectorAll('.product-card').forEach(card => {
            if(card.getBoundingClientRect().top < window.innerHeight * 0.95) card.classList.add('visible');
        });
    }

    function launchApp() {
        document.getElementById('splash-screen').classList.add('hidden');
        setTimeout(() => {
            document.getElementById('shop-content').style.display = 'flex';
            renderProducts();
        }, 400);
    }

    function openPreview(name, price, image, size) {
        const modal = document.getElementById('item-preview');
        document.getElementById('preview-img').src = image;
        document.getElementById('preview-name').innerText = name;
        document.getElementById('preview-price').innerText = `UK ${size} • ₵${price}`;
        const msg = encodeURIComponent(`Hi Enis! ✨ I'd like to order: ${name} (Size ${size})`);
        document.getElementById('wa-btn').href = `https://wa.me/233546527892?text=${msg}`;
        modal.classList.remove('closing');
        modal.style.display = 'flex';
        setTimeout(() => modal.classList.add('active'), 10);
    }

    function closePreview() { 
        const modal = document.getElementById('item-preview');
        modal.classList.add('closing');
        setTimeout(() => {
            modal.style.display = 'none';
            modal.classList.remove('active', 'closing');
        }, 500);
    }
</script>

</body>
</html>
