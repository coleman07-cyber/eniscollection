<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ENIS COLLECTION</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #FFFFFF;
            --card-bg: #FFFFFF;
            --text-main: #000000;
            --text-soft: #757575;
            --accent-gold: #C5A028; 
            --accent-pink: #D65A8D;
            --search-bg: #F5F5F5;
            --border: rgba(0, 0, 0, 0.06);
            --ease-luxury: cubic-bezier(0.25, 1, 0.5, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --card-bg: #0D0D0D;
                --text-main: #FFFFFF;
                --text-soft: #A1A1A6;
                --search-bg: #1A1A1A;
                --border: rgba(255, 255, 255, 0.1);
            }
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Montserrat', sans-serif; 
            scrollbar-width: none;
        }
        *::-webkit-scrollbar { display: none; }

        body { background: var(--bg); height: 100vh; overflow: hidden; }
        
        .app-shell { width: 100%; max-width: 420px; height: 100vh; margin: 0 auto; background: var(--bg); position: relative; display: flex; flex-direction: column; }

        /* --- HEADER AS PER IMAGE --- */
        .header-container {
            padding: calc(env(safe-area-inset-top) + 15px) 20px 10px;
        }

        .search-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .search-bar {
            flex: 1;
            background: var(--search-bg);
            height: 48px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 0 18px;
            gap: 10px;
        }

        .search-bar i { color: #8E8E93; font-size: 16px; }
        .search-bar span { color: #8E8E93; font-size: 14px; }

        .filter-btn {
            width: 48px;
            height: 48px;
            background: var(--search-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
        }

        .category-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .category-title-row h2 { font-size: 22px; font-weight: 700; color: var(--text-main); }
        .see-all { color: var(--accent-pink); font-size: 13px; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 4px; }

        /* --- CIRCULAR CATEGORIES --- */
        .category-scroll {
            display: flex;
            gap: 18px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .cat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            cursor: pointer;
        }

        .cat-icon-box {
            width: 65px;
            height: 65px;
            background: var(--search-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: var(--text-main);
            transition: 0.3s;
        }

        .cat-item.active .cat-icon-box {
            background: var(--accent-gold);
            color: #000;
        }

        .cat-item span { font-size: 12px; font-weight: 500; color: var(--text-main); }

        /* --- FEED --- */
        .feed { flex: 1; overflow-y: auto; padding-top: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        
        .product-card { background: var(--bg); opacity: 0; transform: translateY(20px); transition: 0.6s var(--ease-luxury); }
        .product-card.visible { opacity: 1; transform: translateY(0); }
        .p-image-wrap { position: relative; aspect-ratio: 1/1.3; overflow: hidden; border-radius: 18px; }
        .p-image-wrap img { width: 100%; height: 100%; object-fit: cover; }
        
        .price-tag { position: absolute; bottom: 8px; right: 8px; background: var(--accent-gold); color: #000; padding: 5px 10px; border-radius: 10px; font-size: 11px; font-weight: 800; }
        
        .card-footer { padding: 10px 4px; display: flex; justify-content: space-between; align-items: flex-start; }
        .card-info h3 { font-size: 12px; font-weight: 600; color: var(--text-main); }
        .card-info span { font-size: 10px; color: var(--text-soft); }

        /* --- SPLASH --- */
        #splash-screen { 
            position: fixed; inset: 0; z-index: 9999; 
            background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;
            transition: 0.8s var(--ease-luxury);
        }
        #splash-screen.hidden { opacity: 0; pointer-events: none; transform: scale(1.1); }
        .btn-discover { margin-top: 30px; padding: 15px 40px; border-radius: 30px; border: none; font-weight: 700; background: #fff; cursor: pointer; }

        /* --- UTILS --- */
        #toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: #000; color: #fff; padding: 10px 20px; border-radius: 20px;
            font-size: 12px; opacity: 0; transition: 0.3s; z-index: 10000;
        }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

<div class="app-shell">
    
    <div id="splash-screen">
        <h1 style="font-size: 32px; letter-spacing: 2px;">ENIS COLLECTION</h1>
        <button class="btn-discover" onclick="launchApp()">ENTER STORE</button>
    </div>

    <div class="header-container" id="app-header" style="display:none;">
        <div class="search-row">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <span>Search...</span>
            </div>
            <div class="filter-btn">
                <i class="fas fa-sliders-h"></i>
            </div>
        </div>

        <div class="category-title-row">
            <h2>Category</h2>
            <a href="#" class="see-all">See All <i class="fas fa-arrow-right"></i></a>
        </div>

        <div class="category-scroll">
            <div class="cat-item active" onclick="filterCat('All', this)">
                <div class="cat-icon-box"><i class="fas fa-border-all"></i></div>
                <span>All</span>
            </div>
            <div class="cat-item" onclick="filterCat('Thrift', this)">
                <div class="cat-icon-box"><i class="fas fa-tshirt"></i></div>
                <span>Thrift</span>
            </div>
            <div class="cat-item" onclick="filterCat('Store', this)">
                <div class="cat-icon-box"><i class="fas fa-shopping-bag"></i></div>
                <span>Store</span>
            </div>
            <div class="cat-item" onclick="filterCat('Handmade', this)">
                <div class="cat-icon-box"><i class="fas fa-cut"></i></div>
                <span>Handmade</span>
            </div>
        </div>
    </div>

    <div class="feed" id="mainFeed">
        <div class="grid" id="productGrid"></div>
    </div>

</div>

<div id="toast"></div>

<script>
    const myProducts = [
        { id:1, name: "Seamless Dress", price: 50, size: "10", category: "Thrift", image: "https://images.unsplash.com/photo-1515372039744-b8f02a3ae446?q=80&w=400" },
        { id:2, name: "Plaited Skirt", price: 50, size: "8/10", category: "Thrift", image: "https://images.unsplash.com/photo-1551488831-00ddcb6c6bd3?q=80&w=400" },
        { id:3, name: "Essential Top", price: 45, size: "8", category: "Store", image: "https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?q=80&w=400" },
        { id:4, name: "Work Gown", price: 50, size: "12", category: "Store", image: "https://images.unsplash.com/photo-1539109132314-3477524c8595?q=80&w=400" }
    ];

    function launchApp() {
        document.getElementById('splash-screen').classList.add('hidden');
        document.getElementById('app-header').style.display = 'block';
        renderProducts();
    }

    function renderProducts(filter = 'All') {
        const grid = document.getElementById('productGrid');
        const items = filter === 'All' ? myProducts : myProducts.filter(p => p.category === filter);
        
        grid.innerHTML = items.map(item => `
            <div class="product-card visible">
                <div class="p-image-wrap">
                    <img src="${item.image}">
                    <div class="price-tag">₵${item.price}</div>
                </div>
                <div class="card-footer">
                    <div class="card-info">
                        <h3>${item.name}</h3>
                        <span>Size ${item.size}</span>
                    </div>
                    <i class="fas fa-plus-circle" style="color:var(--accent-gold); font-size:18px;"></i>
                </div>
            </div>
        `).join('');
    }

    function filterCat(cat, el) {
        document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        renderProducts(cat);
    }
</script>

</body>
</html>
