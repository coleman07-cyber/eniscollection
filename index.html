<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>ENIS COLLECTION</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,400&family=Outfit:wght@300;500;700&display=swap"/>
<style>
:root {
  --bg: #FDFCFB; 
  --text: #1A1614;
  --gold: #C5A059;
  --accent: #D4AF37;
  --white: #FFFFFF;
  --radius: 24px;
  --shadow: 0 10px 30px rgba(0,0,0,0.03);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

/* ── MODERN CENTERED HEADER ── */
.hdr { position: sticky; top: 0; z-index: 100; background: rgba(253, 252, 251, 0.95); backdrop-filter: blur(15px); padding: 15px 20px; border-bottom: 1px solid rgba(0,0,0,0.03); }
.hdr-top { display: flex; justify-content: space-between; align-items: center; }
.brand-wrap { text-align: center; flex: 1; display: flex; flex-direction: column; align-items: center; }
.brand-name { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 600; color: var(--text); line-height: 1.1; }
.brand-tag { font-family: 'Montserrat', sans-serif; text-transform: uppercase; font-size: 8px; letter-spacing: 4px; color: var(--gold); font-weight: 600; margin-top: 4px; }

.hdr-icon-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: white; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); position: relative; cursor: pointer; }
.badge { position: absolute; top: -2px; right: -2px; background: var(--text); color: var(--accent); font-size: 9px; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }

/* ── CATEGORIES (WORKING) ── */
.cat-section { padding: 20px; }
.cat-pills { display: flex; gap: 18px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
.cat-pill { display: flex; flex-direction: column; align-items: center; gap: 8px; flex-shrink: 0; cursor: pointer; opacity: 0.6; transition: 0.3s; }
.cat-pill.active { opacity: 1; }
.cat-circle { width: 50px; height: 50px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); border: 1px solid rgba(0,0,0,0.02); color: #444; }
.cat-pill.active .cat-circle { background: var(--text); color: var(--accent); transform: translateY(-3px); }
.cat-lbl { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

/* ── PRODUCT GRID ── */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px 40px; }
.card { border-radius: var(--radius); overflow: hidden; display: block; animation: fadeIn 0.5s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.card-img-box { position: relative; aspect-ratio: 0.75; border-radius: var(--radius); overflow: hidden; background: #eee; }
.card-img-box img { width: 100%; height: 100%; object-fit: cover; }

.price-pill { position: absolute; bottom: 12px; left: 12px; background: white; padding: 6px 12px; border-radius: 12px; font-weight: 700; font-size: 13px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
.card-actions { position: absolute; top: 12px; right: 12px; display: flex; flex-direction: column; gap: 8px; }
.action-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: rgba(255,255,255,0.9); color: #BBB; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); cursor: pointer; transition: 0.3s; }
.action-btn.wish-active { color: #FF4D4D; }
.action-btn.cart-active { background: var(--text); color: var(--accent); }

.card-info { padding: 12px 5px; }
.card-tag { font-size: 8px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; display: block; }
.card-title { font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 500; color: var(--text); }

/* ── EMPTY STATE ── */
#empty-msg { grid-column: 1/-1; text-align: center; padding: 40px; color: #AAA; font-size: 14px; display: none; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <button class="hdr-icon-btn" onclick="alert('Wishlist feature opening...')">
      <i class="far fa-heart"></i>
      <span class="badge" id="wish-count">0</span>
    </button>
    
    <div class="brand-wrap">
      <h1 class="brand-name">Enis Collection</h1>
      <span class="brand-tag">Pamper your body</span>
    </div>

    <button class="hdr-icon-btn" onclick="alert('Cart feature opening...')">
      <i class="fas fa-shopping-bag"></i>
      <span class="badge" id="cart-count">0</span>
    </button>
  </div>
</div>

<div class="cat-section">
  <div class="cat-pills" id="cat-pills">
    <div class="cat-pill active" data-cat="ALL"><div class="cat-circle"><i class="fas fa-border-all"></i></div><span class="cat-lbl">All</span></div>
    <div class="cat-pill" data-cat="THRIFT"><div class="cat-circle"><i class="fas fa-leaf"></i></div><span class="cat-lbl">Thrift</span></div>
    <div class="cat-pill" data-cat="STORE"><div class="cat-circle"><i class="fas fa-store"></i></div><span class="cat-lbl">Store</span></div>
    <div class="cat-pill" data-cat="HANDMADE"><div class="cat-circle"><i class="fas fa-wand-magic-sparkles"></i></div><span class="cat-lbl">Handmade</span></div>
  </div>
</div>

<div class="grid" id="product-grid">
  <div id="empty-msg">No items found in this category.</div>
</div>

<script>
const PRODUCTS = [
  {id:1, name:"Thick Seamless Dress", price:50, cat:"THRIFT", tag:"Thrift Premium", img:"images/item1.jpg"},
  {id:2, name:"Plaited Skirts & Top", price:50, cat:"THRIFT", tag:"Thrift Premium", img:"images/item2.jpg"},
  {id:3, name:"Short Length Essential", price:45, cat:"THRIFT", tag:"Daily Luxe", img:"images/item3.jpg"},
  {id:4, name:"Church & Work Gown", price:50, cat:"STORE", tag:"Boutique Store", img:"images/item4.jpg"},
  {id:5, name:"Dinner Party Elegance", price:45, cat:"STORE", tag:"Special Edition", img:"images/item5.jpg"},
  {id:6, name:"Lecture & Beach Set", price:45, cat:"STORE", tag:"Boutique Store", img:"images/item6.jpg"},
  {id:7, name:"Handmade Silk Wrap", price:65, cat:"HANDMADE", tag:"Custom Piece", img:"images/item7.jpg"}
];

let wishlist = [];
let cart = [];

function updateBadges() {
  document.getElementById('wish-count').innerText = wishlist.length;
  document.getElementById('cart-count').innerText = cart.length;
}

function toggleWishlist(id) {
  const index = wishlist.indexOf(id);
  if (index > -1) wishlist.splice(index, 1);
  else wishlist.push(id);
  updateBadges();
  renderGrid(currentFilter);
}

function toggleCart(id) {
  const index = cart.indexOf(id);
  if (index > -1) cart.splice(index, 1);
  else cart.push(id);
  updateBadges();
  renderGrid(currentFilter);
}

let currentFilter = "ALL";

function renderGrid(filter) {
  const grid = document.getElementById('product-grid');
  const emptyMsg = document.getElementById('empty-msg');
  
  const filtered = filter === "ALL" ? PRODUCTS : PRODUCTS.filter(p => p.cat === filter);
  
  if (filtered.length === 0) {
    emptyMsg.style.display = "block";
    const cards = grid.querySelectorAll('.card');
    cards.forEach(c => c.remove());
  } else {
    emptyMsg.style.display = "none";
    grid.innerHTML = '<div id="empty-msg">No items found in this category.</div>' + filtered.map(p => {
      const isWished = wishlist.includes(p.id) ? 'wish-active' : '';
      const inCart = cart.includes(p.id) ? 'cart-active' : '';
      return `
        <div class="card">
          <div class="card-img-box">
            <img src="${p.img}" alt="${p.name}">
            <div class="price-pill">₵${p.price}</div>
            <div class="card-actions">
              <button class="action-btn ${isWished}" onclick="toggleWishlist(${p.id})"><i class="fas fa-heart"></i></button>
              <button class="action-btn ${inCart}" onclick="toggleCart(${p.id})"><i class="fas fa-shopping-bag"></i></button>
            </div>
          </div>
          <div class="card-info">
            <span class="card-tag">${p.tag}</span>
            <h4 class="card-title">${p.name}</h4>
          </div>
        </div>
      `;
    }).join('');
  }
}

// Category logic
document.querySelectorAll('.cat-pill').forEach(pill => {
  pill.onclick = () => {
    document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    currentFilter = pill.getAttribute('data-cat');
    renderGrid(currentFilter);
  };
});

// Initial Render
renderGrid("ALL");
</script>
</body>
</html>
