<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>ENIS COLLECTION</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg: #FDFDFD;
            --card-bg: #FFFFFF;
            --text-main: #121212;
            --text-soft: #8E8E93;
            --accent-gold: #D4AF37; 
            --gold-gradient: linear-gradient(135deg, #D4AF37 0%, #F4D03F 100%);
            --gold-glow: 0 4px 15px rgba(212, 175, 55, 0.4);
            --glass: rgba(255, 255, 255, 0.88);
            --border: rgba(0, 0, 0, 0.05);
            --shadow: 0 8px 30px rgba(0,0,0,0.04);
            --accent-green: #25D366;
            --ease-fluid: cubic-bezier(0.23, 1, 0.32, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000;
                --card-bg: #0A0A0A;
                --text-main: #FFF;
                --text-soft: #A1A1A6;
                --glass: rgba(10, 10, 10, 0.9);
                --border: rgba(255, 255, 255, 0.08);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, "SF Pro Display", sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: #000; height: 100vh; overflow: hidden; position: fixed; width: 100%; }

        .app-shell {
            width: 100%; max-width: 420px; height: 100vh; margin: 0 auto;
            background: var(--bg); position: relative; display: flex; flex-direction: column;
        }

        #splash-screen {
            position: absolute; inset: 0; z-index: 9999;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.9)), url('images/Splash-Dress.PNG') center/cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: all 0.8s var(--ease-fluid);
        }
        #splash-screen.hidden { opacity: 0; visibility: hidden; transform: scale(1.1); }
        .btn-launch {
            background: var(--gold-gradient); color: #000; padding: 18px 50px;
            border-radius: 50px; border: none; font-weight: 800; font-size: 12px;
            box-shadow: var(--gold-glow); cursor: pointer; letter-spacing: 1px;
        }

        #shop-content { display: none; flex-direction: column; height: 100%; }
        #shop-content.active { display: flex; animation: fadeIn 0.8s var(--ease-fluid); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        header { padding: calc(env(safe-area-inset-top) + 15px) 0 8px; background: var(--bg); }
        .logo-box h2 { font-size: 19px; font-weight: 800; text-align: center; color: var(--text-main); text-transform: uppercase; letter-spacing: 4px;}
        .logo-box span { 
            font-size: 8px; background: var(--gold-gradient); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; letter-spacing: 6px; display: block; 
            text-transform: uppercase; text-align: center; margin-top: 4px; font-weight: 800; 
        }

        .catalog-container {
            position: sticky; top: 0; z-index: 90;
            background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-bottom: 0.5px solid var(--border);
            transition: box-shadow 0.3s ease;
        }
        .catalog-bar { display: flex; gap: 8px; overflow-x: auto; padding: 12px 12px; scrollbar-width: none; }
        .catalog-bar::-webkit-scrollbar { display: none; }
        
        .filter-tag {
            padding: 10px 20px; background: rgba(120, 120, 128, 0.08); border-radius: 50px;
            font-size: 10px; font-weight: 600; color: var(--text-soft); white-space: nowrap; 
            transition: 0.3s var(--ease-fluid); text-transform: uppercase; letter-spacing: 0.5px;
        }
        .filter-tag.active { background: var(--text-main); color: var(--bg); }

        .feed { flex: 1; overflow-y: auto; padding-bottom: 40px; scroll-behavior: smooth; }
        .feed::-webkit-scrollbar { display: none; }

        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 8px; 
            padding: 12px 10px; 
        }
        
        .product-card { 
            background: var(--card-bg); border-radius: 24px; 
            overflow: hidden; box-shadow: var(--shadow); border: 0.5px solid var(--border);
            opacity: 0; transform: translateY(20px); 
            transition: all 0.6s var(--ease-fluid);
        }
        .product-card.visible { opacity: 1; transform: translateY(0); }

        .p-image-wrap { position: relative; width: 100%; aspect-ratio: 1/1.35; overflow: hidden; }
        .p-image-wrap img { width: 100%; height: 100%; object-fit: cover; }
        
        .floating-tag {
            position: absolute; bottom: 8px; right: 8px; background: var(--gold-gradient); 
            color: #000; padding: 4px 10px; border-radius: 12px; font-size: 10px;
            font-weight: 900; box-shadow: var(--gold-glow);
        }

        .p-details { padding: 10px 10px; } 
        .p-name { font-size: 12px; font-weight: 600; color: var(--text-main); line-height: 1.3; height: 32px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        /* ABOUT SECTION UPDATED */
        .about-modern {
            margin: 30px 10px 10px; padding: 40px 20px;
            background: linear-gradient(145deg, var(--card-bg), rgba(212, 175, 55, 0.03));
            border-radius: 35px; border: 1px solid var(--border); text-align: center;
        }
        .headline { font-size: 18px; font-weight: 700; color: var(--text-main); margin: 12px 0; }
        .subtext { font-size: 13px; color: var(--text-soft); line-height: 1.6; margin-bottom: 25px; }
        .social-row { display: flex; justify-content: center; gap: 10px; }
        .social-btn {
            width: 48px; height: 48px; border-radius: 18px;
            background: var(--bg); display: flex; align-items: center; justify-content: center;
            color: var(--text-main); border: 1px solid var(--border);
        }

        /* DARK MODE FOOTER FIX */
        .establishment-note {
            margin-top: 25px; 
            font-size: 9px; 
            letter-spacing: 3px; 
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-soft); /* Dynamic color based on theme */
            opacity: 0.9;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; /* Gold shimmer for luxury look */
        }

        #item-preview {
            position: fixed; inset: 0; z-index: 10000;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: none; align-items: center; justify-content: center; padding: 25px;
            opacity: 0; transition: opacity 0.5s var(--ease-fluid);
        }
        #item-preview.active { display: flex; opacity: 1; }
        .preview-box { 
            width: fit-content; max-width: 85%; background: var(--card-bg); 
            padding: 8px; border-radius: 40px;
            transform: translateY(40px) scale(0.9); transition: all 0.5s var(--ease-fluid);
        }
        #item-preview.active .preview-box { transform: translateY(0) scale(1); }
        .preview-img-container { max-height: 50vh; border-radius: 32px; overflow: hidden; background: #000; }
        .preview-image { display: block; max-width: 100%; max-height: 50vh; object-fit: contain; }
        .btn-order {
            background: var(--accent-green); color: white; padding: 16px; border-radius: 24px;
            text-decoration: none; font-weight: 700; display: flex; align-items: center; 
            gap: 12px; font-size: 15px; justify-content: center; margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="app-shell">
    <div id="splash-screen">
        <div style="text-align:center; color:white; margin-bottom:40px;">
            <h1 style="font-weight: 800; font-size: 26px; letter-spacing: 3px;">ENIS COLLECTION</h1>
            <p style="font-size:9px; letter-spacing:7px; color: var(--accent-gold); margin-top: 12px; font-weight: 800;">PAMPER YOUR BODY</p>
        </div>
        <button class="btn-launch" onclick="launchApp()">ENTER SHOP</button>
    </div>

    <div id="shop-content">
        <header>
            <div class="logo-box">
                <h2>Enis Collection</h2>
                <span>Pamper Your Body</span>
            </div>
        </header>

        <div class="catalog-container" id="stickyNav">
            <div class="catalog-bar">
                <div class="filter-tag active" onclick="filterItems('All', this)">All</div>
                <div class="filter-tag" onclick="filterItems('Dress', this)">Dresses</div>
                <div class="filter-tag" onclick="filterItems('Set', this)">Sets</div>
                <div class="filter-tag" onclick="filterItems('Work', this)">Work Wear</div>
            </div>
        </div>

        <div class="feed" id="mainFeed" onscroll="handleScroll()">
            <div class="grid" id="productGrid"></div>
            
            <div class="about-modern">
                <h3 style="font-size:10px; letter-spacing:4px; color:var(--accent-gold); text-transform:uppercase; font-weight:800;">Our Heritage</h3>
                <p class="headline">Curating luxury silhouettes.</p>
                <p class="subtext">Hand-selected pieces designed in Ghana to ensure comfort and sophistication.</p>
                <div class="social-row">
                    <a href="tel:+233546527892" class="social-btn"><i class="fas fa-phone"></i></a>
                    <a href="https://wa.me/233546527892" class="social-btn"><i class="fab fa-whatsapp"></i></a>
                    <a href="https://www.tiktok.com/@eniscollection1" class="social-btn"><i class="fab fa-tiktok"></i></a>
                    <a href="mailto:sheilaenima@gmail.com" class="social-btn"><i class="fas fa-envelope"></i></a>
                </div>
                <p class="establishment-note">CAPECOAST, GHANA • EST. 2022</p>
            </div>
        </div>
    </div>

    <div id="item-preview" onclick="closePreview()">
        <div class="preview-box" id="previewBox" onclick="event.stopPropagation()">
            <div class="preview-img-container">
                <img id="preview-img" src="" class="preview-image" onclick="closePreview()">
                <div id="preview-tag" class="floating-tag"></div>
            </div>
            <div style="padding: 18px 12px 10px;">
                <span id="preview-size" style="font-size: 11px; color: var(--accent-gold); font-weight: 800; display: block; margin-bottom: 8px; letter-spacing: 1px;"></span>
                <h2 id="preview-name" style="font-size: 18px; color: var(--text-main); font-weight: 700;"></h2>
                <a id="wa-btn" href="#" class="btn-order"><i class="fab fa-whatsapp"></i> INSTANT ORDER</a>
            </div>
        </div>
    </div>
</div>

<script>
    const myProducts = [
        { name: "Thick Seamless Dress", price: 50, size: "10", category: "Dress", image: "images/item1.jpg" },
        { name: "Plaited Skirts & Top", price: 50, size: "8/10", category: "Set", image: "images/item2.jpg" },
        { name: "Short Length Essential", price: 45, size: "8", category: "Dress", image: "images/item3.jpg" },
        { name: "Church & Work Midi", price: 50, size: "8", category: "Work", image: "images/item4.jpg" },
        { name: "Dinner & Party Elegance", price: 45, size: "8/10", category: "Dress", image: "images/item5.jpg" },
        { name: "Lecture & Beach Set", price: 45, size: "6/8/10", category: "Set", image: "images/item6.jpg" },
        { name: "Ruched SHEIN Special", price: 50, size: "8/10", category: "Dress", image: "images/item7.jpg" },
        { name: "Ultimate Work Gown", price: 50, size: "12/14", category: "Work", image: "images/item8.jpg" },
        { name: "Skirt & Basic Top Duo", price: 50, size: "10/12", category: "Set", image: "images/item9.jpg" },
        { name: "Refined Church Wear", price: 50, size: "10", category: "Work", image: "images/item10.jpg" }
    ];

    function renderProducts(filter = 'All') {
        const grid = document.getElementById('productGrid');
        const filtered = filter === 'All' ? myProducts : myProducts.filter(p => p.category === filter);
        grid.innerHTML = filtered.map((item) => `
            <div class="product-card">
                <div class="p-image-wrap" onclick="openPreview('${item.name.replace(/'/g, "\\'")}', ${item.price}, '${item.image}', '${item.size}')">
                    <img src="${item.image}" onerror="this.src='https://via.placeholder.com/400x520?text=ENIS'">
                    <div class="floating-tag">₵${item.price}</div>
                </div>
                <div class="p-details">
                    <span style="font-size:9px; color:var(--accent-gold); font-weight:800;">UK SIZE ${item.size}</span>
                    <h3 class="p-name">${item.name}</h3>
                </div>
            </div>
        `).join('');
        setTimeout(handleScroll, 50);
    }

    function handleScroll() {
        const feed = document.getElementById('mainFeed');
        const nav = document.getElementById('stickyNav');
        const cards = document.querySelectorAll('.product-card');
        
        if (feed.scrollTop > 10) {
            nav.style.boxShadow = "0 10px 30px rgba(0,0,0,0.08)";
        } else {
            nav.style.boxShadow = "none";
        }

        cards.forEach(card => {
            const cardTop = card.getBoundingClientRect().top;
            if(cardTop < window.innerHeight * 0.95) card.classList.add('visible');
        });
    }

    function launchApp() {
        document.getElementById('splash-screen').classList.add('hidden');
        document.getElementById('shop-content').classList.add('active');
        renderProducts();
    }

    function openPreview(name, price, image, size) {
        const modal = document.getElementById('item-preview');
        const pImg = document.getElementById('preview-img');
        pImg.src = image;
        pImg.onload = () => {
            document.getElementById('preview-name').innerText = name;
            document.getElementById('preview-size').innerText = `UK SIZE ${size}`;
            document.getElementById('preview-tag').innerText = `₵${price}`;
            const msg = encodeURIComponent(`Hi Enis! ✨ I'd like to order: ${name} (Size ${size})`);
            document.getElementById('wa-btn').href = `https://wa.me/233546527892?text=${msg}`;
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
        };
    }

    function closePreview() { 
        const modal = document.getElementById('item-preview');
        modal.classList.remove('active');
        setTimeout(() => modal.style.display = 'none', 500);
    }

    function filterItems(cat, el) {
        document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        renderProducts(cat);
        document.getElementById('mainFeed').scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>

</body>
</html>
