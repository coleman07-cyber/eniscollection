<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ENIS COLLECTION</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
:root {
    --bg:#FDFDFD;
    --card-bg:#FFFFFF;
    --text-main:#121212;
    --text-soft:#8E8E93;
    --accent-gold:#D4AF37;
    --gold-gradient:linear-gradient(135deg,#D4AF37 0%,#F4D03F 100%);
    --gold-glow:0 4px 15px rgba(212,175,55,.4);
    --glass:rgba(255,255,255,.75);
    --border:rgba(0,0,0,.05);
    --shadow:0 8px 30px rgba(0,0,0,.04);
    --accent-green:#25D366;
    --ease:cubic-bezier(.23,1,.32,1);
}

@media (prefers-color-scheme: dark){
:root{
    --bg:#000;
    --card-bg:#0A0A0A;
    --text-main:#FFF;
    --text-soft:#A1A1A6;
    --glass:rgba(10,10,10,.7);
    --border:rgba(255,255,255,.12);
}
}

*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,"SF Pro Display",sans-serif;-webkit-tap-highlight-color:transparent}
body{background:#000;height:100vh;overflow:hidden;position:fixed;width:100%}

.app-shell{
    width:100%;
    max-width:420px;
    height:100vh;
    margin:0 auto;
    background:var(--bg);
    display:flex;
    flex-direction:column;
}

/* SPLASH */
#splash-screen{
    position:absolute;
    inset:0;
    z-index:9999;
    background:linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.9)),url('images/Splash-Dress.PNG') center/cover;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    transition:1s var(--ease);
}
#splash-screen.hidden{opacity:0;visibility:hidden}

.btn-launch{
    background:var(--gold-gradient);
    color:#000;
    padding:18px 55px;
    border-radius:50px;
    border:none;
    font-weight:800;
    font-size:13px;
    box-shadow:var(--gold-glow);
    letter-spacing:2px;
}

/* HEADER GLASS */
header{
    position:sticky;
    top:0;
    z-index:100;
    padding:calc(env(safe-area-inset-top) + 15px) 0 12px;
    background:rgba(255,255,255,.7);
    backdrop-filter:blur(0px);
    -webkit-backdrop-filter:blur(0px);
    transition:.4s ease;
}
header.scrolled{
    backdrop-filter:blur(25px);
    -webkit-backdrop-filter:blur(25px);
    background:var(--glass);
    border-bottom:.5px solid var(--border);
}

.logo-box h2{
    font-size:20px;
    font-weight:800;
    text-align:center;
    color:var(--text-main);
    letter-spacing:5px;
}
.logo-box span{
    font-size:8px;
    background:var(--gold-gradient);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    letter-spacing:6px;
    display:block;
    text-align:center;
    margin-top:4px;
    font-weight:800;
}

/* NAV */
.catalog-container{
    position:sticky;
    top:0;
    z-index:90;
    background:var(--glass);
    backdrop-filter:blur(20px);
    border-bottom:.5px solid var(--border);
}
.catalog-bar{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:12px;
}
.catalog-bar::-webkit-scrollbar{display:none}
.filter-tag{
    padding:11px 22px;
    background:rgba(120,120,128,.1);
    border-radius:50px;
    font-size:10px;
    font-weight:700;
    color:var(--text-soft);
    text-transform:uppercase;
}
.filter-tag.active{
    background:var(--text-main);
    color:var(--bg);
}

/* FEED */
#shop-content{display:none;flex-direction:column;height:100%}
#shop-content.active{display:flex}

.feed{flex:1;overflow-y:auto;padding-bottom:60px}
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding:15px 12px;
}
.product-card{
    background:var(--card-bg);
    border-radius:28px;
    overflow:hidden;
    box-shadow:var(--shadow);
    border:.5px solid var(--border);
    opacity:0;
    transform:translateY(15px);
    transition:.6s var(--ease);
}
.product-card.visible{opacity:1;transform:translateY(0)}
.p-image-wrap{aspect-ratio:1/1.35;overflow:hidden}
.p-image-wrap img{width:100%;height:100%;object-fit:cover}
.floating-tag{
    position:absolute;
    bottom:10px;
    right:10px;
    background:var(--gold-gradient);
    padding:5px 12px;
    border-radius:14px;
    font-size:11px;
    font-weight:900;
}
.p-details{padding:12px}
.p-name{font-size:13px;font-weight:600;color:var(--text-main);line-height:1.3}

/* PREVIEW */
#item-preview{
    position:fixed;
    inset:0;
    z-index:10000;
    background:rgba(0,0,0,.95);
    backdrop-filter:blur(20px);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
    opacity:0;
    transition:.4s ease;
}
#item-preview.active{display:flex;opacity:1}

.preview-box{
    width:270px;
    background:var(--card-bg);
    padding:8px;
    border-radius:42px;
    box-shadow:0 30px 60px rgba(0,0,0,.8);
    transform:translateY(30px) scale(.95);
    transition:.5s var(--ease);
}
#item-preview.active .preview-box{transform:translateY(0) scale(1)}

.preview-img-container{
    position:relative;
    height:400px;
    border-radius:34px;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
}
.preview-blur-bg{
    position:absolute;
    inset:0;
    background-size:cover;
    background-position:center;
    filter:blur(40px) brightness(.8);
    transform:scale(1.2);
}
.preview-image{
    position:relative;
    width:90%;
    height:90%;
    object-fit:cover;
    border-radius:28px;
    box-shadow:0 15px 40px rgba(0,0,0,.4);
    z-index:2;
}
.btn-order{
    background:var(--accent-green);
    color:#fff;
    padding:14px;
    border-radius:22px;
    text-decoration:none;
    font-weight:800;
    display:flex;
    justify-content:center;
    margin-top:12px;
}
</style>
</head>
<body>

<div class="app-shell">
<div id="splash-screen">
<h1 style="color:#fff;font-size:28px;letter-spacing:4px">ENIS COLLECTION</h1>
<button class="btn-launch" onclick="launchApp()">DISCOVER COLLECTION</button>
</div>

<div id="shop-content">
<header>
<div class="logo-box">
<h2>Enis Collection</h2>
<span>Pamper Your Body</span>
</div>
</header>

<div class="catalog-container">
<div class="catalog-bar">
<div class="filter-tag active" onclick="filterItems('All',this)">All</div>
<div class="filter-tag" onclick="filterItems('Dress',this)">Dresses</div>
<div class="filter-tag" onclick="filterItems('Set',this)">Sets</div>
<div class="filter-tag" onclick="filterItems('Work',this)">Work Wear</div>
</div>
</div>

<div class="feed" id="mainFeed" onscroll="handleScroll()">
<div class="grid" id="productGrid"></div>
</div>
</div>

<div id="item-preview" onclick="closePreview()">
<div class="preview-box" onclick="event.stopPropagation()">
<div class="preview-img-container">
<div id="preview-blur" class="preview-blur-bg"></div>
<img id="preview-img" class="preview-image">
</div>
<div style="padding:12px;text-align:center">
<h2 id="preview-name"></h2>
<a id="wa-btn" class="btn-order">ORDER NOW</a>
</div>
</div>
</div>
</div>

<script>
const myProducts=[
{name:"Thick Seamless Dress",price:50,size:"10",category:"Dress",image:"images/item1.jpg"},
{name:"Plaited Skirts & Top",price:50,size:"8/10",category:"Set",image:"images/item2.jpg"}
];

function renderProducts(filter="All"){
const grid=document.getElementById("productGrid");
const filtered=filter==="All"?myProducts:myProducts.filter(p=>p.category===filter);
grid.innerHTML=filtered.map(item=>`
<div class="product-card">
<div class="p-image-wrap" onclick="openPreview('${item.name}',${item.price},'${item.image}','${item.size}')">
<img src="${item.image}">
<div class="floating-tag">₵${item.price}</div>
</div>
<div class="p-details">
<h3 class="p-name">${item.name}</h3>
</div>
</div>`).join("");
setTimeout(handleScroll,50);
}

function handleScroll(){
const cards=document.querySelectorAll(".product-card");
const header=document.querySelector("header");
const feed=document.getElementById("mainFeed");

cards.forEach(card=>{
if(card.getBoundingClientRect().top<window.innerHeight*.9){
card.classList.add("visible");
}
});

if(feed.scrollTop>20){
header.classList.add("scrolled");
}else{
header.classList.remove("scrolled");
}
}

function launchApp(){
document.getElementById("splash-screen").classList.add("hidden");
document.getElementById("shop-content").classList.add("active");
renderProducts();
}

function openPreview(name,price,image,size){
const modal=document.getElementById("item-preview");
document.getElementById("preview-img").src=image;
document.getElementById("preview-blur").style.backgroundImage=`url(${image})`;
document.getElementById("preview-name").innerText=name;
document.getElementById("wa-btn").href=`https://wa.me/233546527892?text=Hi I want ${name} size ${size}`;
modal.style.display="flex";
setTimeout(()=>modal.classList.add("active"),10);
}

function closePreview(){
const modal=document.getElementById("item-preview");
modal.classList.remove("active");
setTimeout(()=>modal.style.display="none",400);
}
</script>

</body>
</html>
