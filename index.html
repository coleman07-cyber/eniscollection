<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>ENIS COLLECTION</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,400&family=Outfit:wght@300;500;700&display=swap"/>
<style>
:root {
  --bg: #FDFCFB; 
  --text: #1A1614;
  --gold: #C5A059;
  --white: #FFFFFF;
  --radius: 30px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

/* ── SPLASH ── */
#splash { position: fixed; inset: 0; z-index: 3000; background: #12100E; display: flex; align-items: center; justify-content: center; transition: 0.8s ease; }
#splash.hide { opacity: 0; visibility: hidden; }

/* ── HEADER ── */
.hdr { position: sticky; top: 0; z-index: 100; background: rgba(253, 252, 251, 0.9); backdrop-filter: blur(20px); padding: 20px; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.03); }
.brand-name { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 600; }
.brand-tag { font-family: 'Outfit', sans-serif; text-transform: uppercase; font-size: 9px; letter-spacing: 4px; color: var(--gold); display: block; margin-top: 5px; }

/* ── CATEGORIES (BLACK THEME) ── */
.cat-section { padding: 25px 20px; }
.cat-pills { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
.cat-pill { display: flex; flex-direction: column; align-items: center; gap: 8px; min-width: 70px; cursor: pointer; }
.cat-circle { width: 55px; height: 55px; border-radius: 50%; background: var(--white); display: flex; align-items: center; justify-content: center; border: 1px solid #eee; transition: 0.3s; color: #555; }
/* Changed gold to black as requested */
.cat-pill.active .cat-circle { background: var(--text); color: var(--white); border-color: var(--text); transform: scale(1.05); }
.cat-lbl { font-size: 9px; font-weight: 700; text-transform: uppercase; color: #999; }
.cat-pill.active .cat-lbl { color: var(--text); }

/* ── PRODUCT GRID ── */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px 40px; }
.card-img-box { position: relative; aspect-ratio: 0.75; border-radius: var(--radius); overflow: hidden; background: #eee; box-shadow: 0 10px 30px rgba(0,0,0,0.04); }
.card-img-box img { width: 100%; height: 100%; object-fit: cover; }
.price-tag { position: absolute; bottom: 12px; left: 12px; background: white; padding: 6px 12px; border-radius: 12px; font-weight: 700; font-size: 13px; }

/* ── FLOATING BUTTONS ── */
.float-actions { position: fixed; bottom: 30px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 12px; }
.float-btn { width: 55px; height: 55px; background: rgba(26, 22, 20, 0.95); color: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); cursor: pointer; position: relative; backdrop-filter: blur(10px); }
.badge { position: absolute; top: -2px; right: -2px; background: var(--gold); color: white; font-size: 10px; font-weight: 800; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #1A1614; }

/* ── SCROLLABLE DRAWER ── */
.drawer { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; display: none; align-items: flex-end; }
.drawer.open { display: flex; }
.drawer-content { 
  width: 100%; background: var(--white); border-radius: 30px 30px 0 0; padding: 30px 20px; 
  max-height: 80vh; overflow-y: auto; /* Fixed scrolling */
  -webkit-overflow-scrolling: touch; 
}

/* ── ABOUT ── */
.about { background: #1A1614; color: white; padding: 60px 25px 120px; border-radius: 40px 40px 0 0; text-align: center; }
.contact-btn { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; font-size: 12px; border: 1px solid rgba(255,255,255,0.1); }
</style>
</head>
<body>

<div id="splash" onclick="this.classList.add('hide')">
  <div style="text-align:center; color:white;">
    <h1 style="font-family:'Playfair Display'; font-size:40px;">Enis Collection</h1>
    <p style="letter-spacing:5px; font-size:10px; opacity:0.6; margin-top:10px;">TAP TO ENTER</p>
  </div>
</div>

<div class="hdr">
  <h1 class="brand-name">Enis Collection</h1>
  <span class="brand-tag">Pamper your body</span>
</div>

<div class="cat-section">
  <div class="cat-pills">
    <div class="cat-pill active" onclick="filterCat('ALL', this)"><div class="cat-circle"><i class="fas fa-border-all"></i></div><span class="cat-lbl">All</span></div>
    <div class="cat-pill" onclick="filterCat('THRIFT', this)"><div class="cat-circle"><i class="fas fa-leaf"></i></div><span class="cat-lbl">Thrift</span></div>
    <div class="cat-pill" onclick="filterCat('STORE', this)"><div class="cat-circle"><i class="fas fa-store"></i></div><span class="cat-lbl">Store</span></div>
    <div class="cat-pill" onclick="filterCat('CUSTOM', this)"><div class="cat-circle"><i class="fas fa-wand-magic-sparkles"></i></div><span class="cat-lbl">Custom</span></div>
  </div>
</div>

<div class="grid" id="main-grid"></div>

<div class="float-actions">
  <div class="float-btn" onclick="openDrawer('wish')"><i class="far fa-heart"></i><span class="badge" id="w-count">0</span></div>
  <div class="float-btn" onclick="openDrawer('cart')"><i class="fas fa-shopping-bag"></i><span class="badge" id="c-count">0</span></div>
</div>

<div id="drawer" class="drawer" onclick="this.classList.remove('open')">
  <div class="drawer-content" onclick="event.stopPropagation()">
    <h2 id="d-title" style="font-family:'Playfair Display'; margin-bottom:20px;"></h2>
    <div id="d-list"></div>
    <button id="checkout-btn" onclick="sendWA()" style="display:none; width:100%; padding:20px; background:var(--text); color:var(--gold); border-radius:15px; border:none; margin-top:20px; font-weight:700;">Order via WhatsApp</button>
  </div>
</div>

<div class="about">
  <h3 style="color:var(--gold); font-family:'Playfair Display'; font-size:28px;">Contact Sheila</h3>
  <div style="margin-top:30px;">
    <a href="https://wa.me/233546527892" class="contact-btn"><i class="fab fa-whatsapp"></i> WhatsApp</a>
    <a href="tel:+233546527892" class="contact-btn"><i class="fas fa-phone"></i> Call 054 652 7892</a>
    <a href="mailto:Sheilaenima@gmail.com" class="contact-btn"><i class="far fa-envelope"></i> Email Us</a>
    <a href="https://www.tiktok.com/@eniscollection1" class="contact-btn"><i class="fab fa-tiktok"></i> TikTok</a>
  </div>
</div>

<script>
const DB = [
  {id:1, name:"Thick Seamless Dress", price:50, cat:"THRIFT", img:"images/item1.jpg"},
  {id:2, name:"Plaited Skirts & Top", price:50, cat:"THRIFT", img:"images/item2.jpg"},
  {id:3, name:"Short Length Essential", price:45, cat:"THRIFT", img:"images/item3.jpg"},
  {id:4, name:"Church & Work Gown", price:50, cat:"STORE", img:"images/item4.jpg"},
  {id:5, name:"Dinner Party Elegance", price:45, cat:"STORE", img:"images/item5.jpg"},
  {id:6, name:"Lecture & Beach Set", price:45, cat:"STORE", img:"images/item6.jpg"},
  {id:7, name:"Handmade Silk Wrap", price:65, cat:"CUSTOM", img:"images/item7.jpg"},
  {id:8, name:"Ruched SHEIN Special", price:50, cat:"THRIFT", img:"images/item8.jpg"},
  {id:9, name:"Ultimate Work Gown", price:50, cat:"THRIFT", img:"images/item9.jpg"},
  {id:10, name:"Refined Church Wear", price:50, cat:"STORE", img:"images/item10.jpg"}
];

let wish = []; let cart = [];

function renderGrid(f = 'ALL') {
  const g = document.getElementById('main-grid');
  const items = f === 'ALL' ? DB : DB.filter(x => x.cat === f);
  g.innerHTML = items.map(p => `
    <div class="card">
      <div class="card-img-box">
        <img src="${p.img}">
        <div class="price-tag">₵${p.price}</div>
        <div style="position:absolute; top:12px; right:12px; display:flex; flex-direction:column; gap:8px;">
          <button onclick="toggle('wish', ${p.id})" style="width:35px; height:35px; border-radius:50%; border:none; background:white;"><i class="${wish.includes(p.id)?'fas':'far'} fa-heart" style="color:${wish.includes(p.id)?'#FF4D4D':'#ccc'}"></i></button>
          <button onclick="toggle('cart', ${p.id})" style="width:35px; height:35px; border-radius:50%; border:none; background:${cart.includes(p.id)?'#1A1614':'white'}; color:${cart.includes(p.id)?'var(--gold)':'#ccc'}"><i class="fas fa-shopping-bag"></i></button>
        </div>
      </div>
      <div style="padding:12px 0"><h4 style="font-size:14px; font-weight:500;">${p.name}</h4></div>
    </div>
  `).join('');
}

function toggle(type, id) {
  let list = type === 'wish' ? wish : cart;
  let idx = list.indexOf(id);
  if(idx > -1) list.splice(idx,1); else list.push(id);
  document.getElementById(type[0]+'-count').innerText = list.length;
  renderGrid();
}

function openDrawer(type) {
  const d = document.getElementById('drawer');
  const list = type === 'wish' ? wish : cart;
  document.getElementById('d-title').innerText = type === 'wish' ? 'Wishlist' : 'Cart';
  document.getElementById('checkout-btn').style.display = type === 'cart' && list.length ? 'block' : 'none';
  
  document.getElementById('d-list').innerHTML = list.length ? list.map(id => {
    const p = DB.find(x => x.id === id);
    return `<div style="display:flex; gap:15px; margin-bottom:15px; align-items:center;">
      <img src="${p.img}" style="width:60px; height:60px; border-radius:10px; object-fit:cover;">
      <div style="flex:1"><b>${p.name}</b><br><span style="color:var(--gold)">₵${p.price}</span></div>
      <i class="fas fa-trash" style="color:#eee" onclick="toggle('${type}', ${p.id}); openDrawer('${type}')"></i>
    </div>`;
  }).join('') : '<p style="text-align:center; padding:20px; color:#999">Empty</p>';
  d.classList.add('open');
}

function filterCat(c, el) {
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderGrid(c);
}

function sendWA() {
  const msg = cart.map(id => DB.find(x => x.id === id).name).join(', ');
  window.open(`https://wa.me/233546527892?text=Hello Enis Collection! I want to order: ${msg}`);
}

renderGrid();
</script>
</body>
</html>
