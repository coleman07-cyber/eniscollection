<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>ENIS COLLECTION</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            /* Light Mode Default */
            --bg: #FFFFFF;
            --card-bg: #F2F2F7;
            --text-main: #000000;
            --text-soft: #8E8E93;
            --accent-gold: #C5A02E; 
            --glass: rgba(255, 255, 255, 0.85);
            --border: rgba(0, 0, 0, 0.1);
            --accent-green: #25D366;
            --ease-fluid: cubic-bezier(0.23, 1, 0.32, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                /* Dark Mode - Safari Tray Black */
                --bg: #000000; 
                --card-bg: #1C1C1E; 
                --text-main: #FFFFFF;
                --text-soft: #A1A1A6;
                --glass: rgba(0, 0, 0, 0.9);
                --border: rgba(255, 255, 255, 0.12);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, "SF Pro Display", sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: #000; height: 100vh; overflow: hidden; position: fixed; width: 100%; }

        .app-shell {
            width: 100%; max-width: 420px; height: 100vh; margin: 0 auto;
            background: var(--bg); position: relative; display: flex; flex-direction: column;
            transition: background 0.4s ease;
        }

        /* Splash Fix */
        #splash-screen {
            position: absolute; inset: 0; z-index: 9999;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.95)), url('images/Splash-Dress.PNG') center/cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.6s ease, visibility 0.6s;
        }
        #splash-screen.hidden { opacity: 0; visibility: hidden; }

        #shop-content { display: none; flex-direction: column; height: 100%; opacity: 0; transition: opacity 0.8s ease; }
        #shop-content.active { display: flex; opacity: 1; }

        header {
            padding: calc(env(safe-area-inset-top) + 15px) 20px 15px;
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid var(--border); z-index: 100;
        }

        .logo-box h2 { font-size: 18px; font-weight: 800; text-align: center; color: var(--text-main); text-transform: uppercase; letter-spacing: 3px; }
        .logo-box span { font-size: 7px; color: var(--accent-gold); letter-spacing: 5px; display: block; text-transform: uppercase; text-align: center; margin-top: 5px; font-weight: 700; }

        .catalog-bar { display: flex; gap: 10px; overflow-x: auto; padding: 15px 0 5px; scrollbar-width: none; }
        .catalog-bar::-webkit-scrollbar { display: none; }
        
        .filter-tag {
            padding: 8px 18px; background: var(--card-bg); border-radius: 40px;
            font-size: 10px; font-weight: 700; color: var(--text-soft); white-space: nowrap; 
            border: 0.5px solid var(--border); transition: 0.3s;
        }
        .filter-tag.active { background: var(--text-main); color: var(--bg); border-color: var(--text-main); }

        .feed { flex: 1; overflow-y: auto; padding: 20px 16px 60px; -webkit-overflow-scrolling: touch; }
        .feed::-webkit-scrollbar { display: none; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        
        .product-card { 
            background: var(--card-bg); border-radius: 20px; overflow: hidden; 
            border: 0.5px solid var(--border); opacity: 0; transform: translateY(20px); 
            transition: all 0.6s var(--ease-fluid);
        }
        .product-card.visible { opacity: 1; transform: translateY(0); }

        .p-image-wrap { position: relative; width: 100%; aspect-ratio: 3/4; overflow: hidden; background: #111; }
        .p-image-wrap img { width: 100%; height: 100%; object-fit: cover; }
        
        .floating-tag {
            position: absolute; bottom: 10px; right: 10px;
            background: var(--accent-gold); color: #000;
            padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: 900;
        }

        .about-modern {
            margin-top: 60px; padding: 70px 30px;
            background: var(--card-bg); border-radius: 40px 40px 0 0;
            border-top: 1px solid var(--border); text-align: center;
        }
        .about-modern h3 { font-size: 11px; letter-spacing: 6px; color: var(--accent-gold); text-transform: uppercase; margin-bottom: 15px; font-weight: 800; }
        .about-modern .hero-text { font-weight: 800; font-size: 20px; color: var(--text-main); line-height: 1.2; margin-bottom: 15px; }
        .about-modern .desc-text { font-size: 14px; color: var(--text-soft); line-height: 1.6; max-width: 280px; margin: 0 auto 30px; }
        
        .social-btn {
            width: 50px; height: 50px; border-radius: 15px;
            background: var(--bg); display: inline-flex; align-items: center; justify-content: center;
            color: var(--text-main); text-decoration: none; border: 1px solid var(--border);
            font-size: 18px; margin: 0 5px;
        }

        /* Preview Modal Fix */
        #item-preview {
            position: fixed; inset: 0; z-index: 10000;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            display: none; align-items: center; justify-content: center; padding: 20px;
            opacity: 0; transition: opacity 0.4s ease;
        }
        #item-preview.active { display: flex; opacity: 1; }

        .preview-box { 
            width: 100%; max-width: 360px; 
            background: var(--bg); padding: 8px; border-radius: 28px;
            transform: scale(0.9); transition: transform 0.4s var(--ease-fluid);
            border: 1px solid var(--border);
        }
        #item-preview.active .preview-box { transform: scale(1); }

        .preview-img-container { width: 100%; border-radius: 22px; overflow: hidden; background: #000; position: relative; }
        .preview-image { width: 100%; display: block; max-height: 60vh; object-fit: contain; }
        
        .btn-order {
            background: var(--accent-green); color: white; padding: 16px; border-radius: 18px;
            text-decoration: none; font-weight: 800; display: flex; align-items: center; 
            gap: 12px; font-size: 15px; justify-content: center; margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="app-shell">
    <div id="splash-screen">
        <div style="text-align:center; color:white; margin-bottom:40px;">
            <h1 style="font-weight: 800; font-size: 24px; letter-spacing: 2px;">ENIS COLLECTION</h1>
            <p style="font-size:8px; letter-spacing:6px; color: var(--accent-gold); margin-top: 10px;">PAMPER YOUR BODY</p>
        </div>
        <button style="background:#fff; color:#000; padding:18px 50px; border-radius:40px; border:none; font-weight:800; font-size:12px; cursor:pointer;" onclick="launchApp()">ENTER SHOP</button>
    </div>

    <div id="shop-content">
        <header>
            <div class="logo-box">
                <h2>Enis Collection</h2>
                <span>Pamper Your Body</span>
            </div>
            <div class="catalog-bar">
                <div class="filter-tag active" onclick="filterItems('All', this)">All Items</div>
                <div class="filter-tag" onclick="filterItems('Dress', this)">Dresses</div>
                <div class="filter-tag" onclick="filterItems('Set', this)">Sets</div>
                <div class="filter-tag" onclick="filterItems('Work', this)">Work Wear</div>
            </div>
        </header>

        <div class="feed" id="mainFeed" onscroll="handleScroll()">
            <div class="grid" id="productGrid"></div>
            
            <div class="about-modern">
                <h3>Our Heritage</h3>
                <p class="hero-text">Curating silhouettes for the modern woman.</p>
                <p class="desc-text">Hand-selected pieces designed to ensure luxury, comfort, and sophistication.</p>
                
                <div class="social-row">
                    <a href="tel:+233546527892" class="social-btn"><i class="fas fa-phone"></i></a>
                    <a href="https://wa.me/233546527892" class="social-btn"><i class="fab fa-whatsapp"></i></a>
                    <a href="https://www.tiktok.com/@eniscollection1" class="social-btn"><i class="fab fa-tiktok"></i></a>
                </div>
            </div>
        </div>
    </div>

    <div id="item-preview" onclick="closePreview()">
        <div class="preview-box" id="previewBox" onclick="event.stopPropagation()">
            <div class="preview-img-container">
                <img id="preview-img" src="" class="preview-image" onclick="closePreview()">
                <div id="preview-tag" class="floating-tag"></div>
            </div>
            <div style="padding: 15px 10px;">
                <span id="preview-size" style="font-size: 10px; color: var(--accent-gold); font-weight: 800; display: block; margin-bottom: 5px; text-transform: uppercase;"></span>
                <h2 id="preview-name" style="font-size: 18px; color: var(--text-main); font-weight: 700;"></h2>
                <a id="wa-btn" href="#" class="btn-order"><i class="fab fa-whatsapp"></i> INSTANT ORDER</a>
            </div>
        </div>
    </div>
</div>

<script>
    const myProducts = [
        { name: "Thick Seamless Dress", price: 50, size: "10", category: "Dress", image: "images/item1.jpg" },
        { name: "Plaited Skirts & Top", price: 50, size: "8/10", category: "Set", image: "images/item2.jpg" },
        { name: "Short Length Essential", price: 45, size: "8", category: "Dress", image: "images/item3.jpg" },
        { name: "Church & Work Midi", price: 50, size: "8", category: "Work", image: "images/item4.jpg" },
        { name: "Dinner & Party Elegance", price: 45, size: "8/10", category: "Dress", image: "images/item5.jpg" },
        { name: "Lecture & Beach Set", price: 45, size: "6/8/10", category: "Set", image: "images/item6.jpg" },
        { name: "Ruched SHEIN Special", price: 50, size: "8/10", category: "Dress", image: "images/item7.jpg" },
        { name: "Ultimate Work Gown", price: 50, size: "12/14", category: "Work", image: "images/item8.jpg" },
        { name: "Skirt & Basic Top Duo", price: 50, size: "10/12", category: "Set", image: "images/item9.jpg" },
        { name: "Refined Church Wear", price: 50, size: "10", category: "Work", image: "images/item10.jpg" }
    ];

    function renderProducts(filter = 'All') {
        const grid = document.getElementById('productGrid');
        if (!grid) return;

        const filtered = filter === 'All' ? myProducts : myProducts.filter(p => p.category === filter);
        grid.innerHTML = filtered.map(item => `
            <div class="product-card">
                <div class="p-image-wrap" onclick="openPreview('${item.name.replace(/'/g, "\\'")}', ${item.price}, '${item.image}', '${item.size}')">
                    <img src="${item.image}" onerror="this.src='https://via.placeholder.com/400x520?text=ENIS'">
                    <div class="floating-tag">₵${item.price}</div>
                </div>
                <div class="p-details">
                    <span style="font-size:9px; color:var(--accent-gold); font-weight:800;">UK SIZE ${item.size}</span>
                    <h3 class="p-name" style="color:var(--text-main);">${item.name}</h3>
                </div>
            </div>
        `).join('');
        
        // Use a small delay to ensure cards are in DOM before animating
        setTimeout(handleScroll, 50);
    }

    function handleScroll() {
        const cards = document.querySelectorAll('.product-card');
        cards.forEach(card => {
            const rect = card.getBoundingClientRect();
            if(rect.top < window.innerHeight * 0.95) {
                card.classList.add('visible');
            }
        });
    }

    function launchApp() {
        document.getElementById('splash-screen').classList.add('hidden');
        const content = document.getElementById('shop-content');
        content.classList.add('active');
        renderProducts();
    }

    function openPreview(name, price, image, size) {
        const modal = document.getElementById('item-preview');
        document.getElementById('preview-img').src = image;
        document.getElementById('preview-name').innerText = name;
        document.getElementById('preview-size').innerText = `UK SIZE ${size}`;
        document.getElementById('preview-tag').innerText = `₵${price}`;
        const msg = encodeURIComponent(`Hi Enis! ✨ I want to order: ${name} (Size ${size})`);
        document.getElementById('wa-btn').href = `https://wa.me/233546527892?text=${msg}`;
        modal.style.display = 'flex';
        setTimeout(() => modal.classList.add('active'), 10);
    }

    function closePreview() { 
        const modal = document.getElementById('item-preview');
        modal.classList.remove('active');
        setTimeout(() => modal.style.display = 'none', 400);
    }

    function filterItems(cat, el) {
        document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        renderProducts(cat);
        document.getElementById('mainFeed').scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>

</body>
</html>
