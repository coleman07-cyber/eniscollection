<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>ENIS COLLECTION</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,400&family=Outfit:wght@300;500;700&display=swap"/>
<style>
:root {
  --bg: #FDFCFB; 
  --text: #1A1614;
  --gold: #C5A059;
  --accent: #D4AF37;
  --white: #FFFFFF;
  --radius: 24px;
  --shadow: 0 10px 30px rgba(0,0,0,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

/* ── HEADER ── */
.hdr { position: sticky; top: 0; z-index: 100; background: rgba(253, 252, 251, 0.95); backdrop-filter: blur(15px); padding: 15px 20px; border-bottom: 1px solid rgba(0,0,0,0.03); text-align: center; }
.brand-name { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 600; color: var(--text); }
.brand-tag { font-family: 'Montserrat', sans-serif; text-transform: uppercase; font-size: 8px; letter-spacing: 4px; color: var(--gold); font-weight: 600; margin-top: 4px; display: block; }

/* ── BOTTOM RIGHT FLOATING CONTROLS ── */
.floating-actions { 
  position: fixed; 
  bottom: 30px; 
  right: 20px; 
  z-index: 1000; 
  display: flex; 
  flex-direction: column; 
  gap: 15px; 
}
.float-btn { 
  width: 55px; 
  height: 55px; 
  background: var(--text); 
  color: var(--accent); 
  border-radius: 50%; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  font-size: 20px; 
  box-shadow: 0 8px 25px rgba(0,0,0,0.2); 
  position: relative;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.1);
}
.nav-badge { 
  position: absolute; 
  top: 0; 
  right: 0; 
  background: var(--gold); 
  color: white; 
  font-size: 10px; 
  font-weight: 800; 
  width: 20px; 
  height: 20px; 
  border-radius: 50%; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  border: 2px solid var(--text);
}

/* ── CATEGORIES (FIXED ROUNDING) ── */
.cat-section { padding: 20px; }
.cat-pills { display: flex; gap: 18px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
.cat-pill { display: flex; flex-direction: column; align-items: center; gap: 8px; flex-shrink: 0; cursor: pointer; opacity: 0.5; transition: 0.3s; }
.cat-pill.active { opacity: 1; }
.cat-circle { width: 55px; height: 55px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); border: 1px solid rgba(0,0,0,0.02); color: #444; }
.cat-pill.active .cat-circle { background: var(--text); color: var(--accent); transform: scale(1.1); }
.cat-lbl { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

/* ── PRODUCT GRID ── */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px 40px; }
.card { border-radius: var(--radius); overflow: hidden; }
.card-img-box { position: relative; aspect-ratio: 0.75; border-radius: var(--radius); overflow: hidden; background: #eee; }
.card-img-box img { width: 100%; height: 100%; object-fit: cover; }
.price-pill { position: absolute; bottom: 12px; left: 12px; background: white; padding: 6px 12px; border-radius: 12px; font-weight: 700; font-size: 13px; box-shadow: var(--shadow); }

/* ── CARD BUTTONS ── */
.card-actions { position: absolute; top: 12px; right: 12px; display: flex; flex-direction: column; gap: 8px; }
.action-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: rgba(255,255,255,0.9); color: #BBB; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); cursor: pointer; }
.action-btn.active-wish { color: #FF4D4D; }
.action-btn.active-cart { background: var(--text); color: var(--accent); }

/* ── ABOUT SECTION ── */
.about { background: #1A1614; color: white; padding: 60px 25px 100px; border-radius: 40px 40px 0 0; text-align: center; }
.about h3 { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--accent); margin-bottom: 15px; }
.about p { font-size: 13px; font-weight: 300; line-height: 1.8; opacity: 0.8; margin-bottom: 35px; }
.contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.contact-btn { 
  background: rgba(255,255,255,0.05); 
  border: 1px solid rgba(255,255,255,0.1); 
  padding: 18px 10px; 
  border-radius: 18px; 
  color: white; 
  text-decoration: none; 
  font-size: 10px; 
  font-weight: 600; 
  text-transform: uppercase; 
  letter-spacing: 1px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  transition: 0.3s;
}
.contact-btn i { font-size: 18px; color: var(--accent); }
.contact-btn:active { background: var(--accent); color: black; }
.contact-btn:active i { color: black; }

</style>
</head>
<body>

<div class="hdr">
  <h1 class="brand-name">Enis Collection</h1>
  <span class="brand-tag">Pamper your body</span>
</div>

<div class="floating-actions">
  <div class="float-btn" onclick="alert('Wishlist coming soon!')">
    <i class="far fa-heart"></i>
    <span class="nav-badge" id="wish-count">0</span>
  </div>
  <div class="float-btn" onclick="alert('Cart coming soon!')">
    <i class="fas fa-shopping-bag"></i>
    <span class="nav-badge" id="cart-count">0</span>
  </div>
</div>

<div class="cat-section">
  <div class="cat-pills">
    <div class="cat-pill active" data-cat="ALL"><div class="cat-circle"><i class="fas fa-border-all"></i></div><span class="cat-lbl">All</span></div>
    <div class="cat-pill" data-cat="THRIFT"><div class="cat-circle"><i class="fas fa-leaf"></i></div><span class="cat-lbl">Thrift</span></div>
    <div class="cat-pill" data-cat="STORE"><div class="cat-circle"><i class="fas fa-store"></i></div><span class="cat-lbl">Store</span></div>
    <div class="cat-pill" data-cat="HANDMADE"><div class="cat-circle"><i class="fas fa-wand-magic-sparkles"></i></div><span class="cat-lbl">Handmade</span></div>
  </div>
</div>

<div class="grid" id="product-grid"></div>

<div class="about">
  <h3>Get in Touch</h3>
  <p>Enis Collection is dedicated to providing premium fashion and a pampered experience. Have a question or want to order? Contact us directly.</p>
  
  <div class="contact-grid">
    <a href="tel:+233546527892" class="contact-btn">
      <i class="fas fa-phone-alt"></i> Call Us
    </a>
    <a href="mailto:Sheilaenima@gmail.com" class="contact-btn">
      <i class="far fa-envelope"></i> Email
    </a>
    <a href="https://wa.me/233546527892" class="contact-btn">
      <i class="fab fa-whatsapp"></i> WhatsApp
    </a>
    <a href="https://www.tiktok.com/@eniscollection1" class="contact-btn">
      <i class="fab fa-tiktok"></i> TikTok
    </a>
  </div>
  
  <p style="margin-top:50px; font-size:8px; opacity:0.3; letter-spacing:2px;">© 2026 ENIS COLLECTION | CAPE COAST</p>
</div>

<script>
const PRODUCTS = [
  {id:1, name:"Thick Seamless Dress", price:50, cat:"THRIFT", tag:"Thrift Premium", img:"images/item1.jpg"},
  {id:2, name:"Plaited Skirts & Top", price:50, cat:"THRIFT", tag:"Thrift Premium", img:"images/item2.jpg"},
  {id:3, name:"Short Length Essential", price:45, cat:"THRIFT", tag:"Daily Luxe", img:"images/item3.jpg"},
  {id:4, name:"Church & Work Gown", price:50, cat:"STORE", tag:"Boutique Store", img:"images/item4.jpg"},
  {id:5, name:"Dinner Party Elegance", price:45, cat:"STORE", tag:"Special Edition", img:"images/item5.jpg"},
  {id:6, name:"Lecture & Beach Set", price:45, cat:"STORE", tag:"Boutique Store", img:"images/item6.jpg"},
  {id:7, name:"Handmade Silk Wrap", price:65, cat:"HANDMADE", tag:"Custom Piece", img:"images/item7.jpg"},
  {id:8, name:"Ruched SHEIN Special", price:50, cat:"THRIFT", tag:"Thrift Find", img:"images/item8.jpg"},
  {id:9, name:"Ultimate Work Gown", price:50, cat:"THRIFT", tag:"Professional", img:"images/item9.jpg"},
  {id:10, name:"Refined Church Wear", price:50, cat:"STORE", tag:"Boutique Store", img:"images/item10.jpg"}
];

let wishlist = [];
let cart = [];

function updateCounts() {
  document.getElementById('wish-count').innerText = wishlist.length;
  document.getElementById('cart-count').innerText = cart.length;
}

function toggleWish(id) {
  const idx = wishlist.indexOf(id);
  if (idx > -1) wishlist.splice(idx, 1);
  else wishlist.push(id);
  updateCounts();
  renderGrid(currentFilter);
}

function toggleCart(id) {
  const idx = cart.indexOf(id);
  if (idx > -1) cart.splice(idx, 1);
  else cart.push(id);
  updateCounts();
  renderGrid(currentFilter);
}

let currentFilter = "ALL";

function renderGrid(filter) {
  const grid = document.getElementById('product-grid');
  const filtered = filter === "ALL" ? PRODUCTS : PRODUCTS.filter(p => p.cat === filter);
  
  grid.innerHTML = filtered.map(p => `
    <div class="card">
      <div class="card-img-box">
        <img src="${p.img}" alt="${p.name}">
        <div class="price-pill">₵${p.price}</div>
        <div class="card-actions">
          <button class="action-btn ${wishlist.includes(p.id) ? 'active-wish' : ''}" onclick="toggleWish(${p.id})"><i class="fas fa-heart"></i></button>
          <button class="action-btn ${cart.includes(p.id) ? 'active-cart' : ''}" onclick="toggleCart(${p.id})"><i class="fas fa-shopping-bag"></i></button>
        </div>
      </div>
      <div style="padding:12px 5px">
        <span style="font-size:8px; font-weight:700; color:var(--gold); text-transform:uppercase; letter-spacing:2px; display:block; margin-bottom:4px;">${p.tag}</span>
        <h4 style="font-family:'Outfit',sans-serif; font-size:14px; font-weight:500; color:var(--text)">${p.name}</h4>
      </div>
    </div>
  `).join('');
}

document.querySelectorAll('.cat-pill').forEach(pill => {
  pill.onclick = () => {
    document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    currentFilter = pill.getAttribute('data-cat');
    renderGrid(currentFilter);
  };
});

renderGrid("ALL");
</script>
</body>
</html>
