<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    
    <title>ENIS COLLECTION</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg: #F2F2F7;
            --card-bg: #FFFFFF;
            --text-main: #1C1C1E;
            --text-soft: #8E8E93;
            --accent-gold: #D4AF37;
            --glass: rgba(255, 255, 255, 0.85);
            --border: rgba(0, 0, 0, 0.05);
            --shadow: 0 8px 20px rgba(0,0,0,0.04);
            --accent-green: #25D366;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --card-bg: #1C1C1E;
                --text-main: #FFFFFF;
                --text-soft: #A1A1A6;
                --glass: rgba(28, 28, 30, 0.9);
                --border: rgba(255, 255, 255, 0.1);
                --shadow: 0 10px 30px rgba(0,0,0,0.5);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: #000; height: 100vh; overflow: hidden; position: fixed; width: 100%; }

        .app-shell {
            width: 100%; max-width: 420px; height: 100vh; margin: 0 auto;
            background: var(--bg); position: relative; overflow: hidden;
        }

        /* Splash Screen */
        #splash-screen {
            position: absolute; inset: 0; z-index: 4000;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)), url('images/Splash-Dress.PNG') center/cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Category Filter Bar */
        .filter-bar {
            display: flex; gap: 10px; overflow-x: auto; padding: 10px 20px;
            scrollbar-width: none; margin-top: 10px;
        }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-tag {
            padding: 8px 16px; background: var(--card-bg); border-radius: 20px;
            font-size: 11px; font-weight: 700; color: var(--text-soft);
            white-space: nowrap; border: 0.5px solid var(--border); transition: 0.2s;
        }
        .filter-tag.active { background: var(--text-main); color: var(--bg); }

        /* Shop Content */
        #shop-content { opacity: 0; transition: opacity 0.6s ease; height: 100%; }

        header {
            position: absolute; top: 0; width: 100%;
            padding: calc(env(safe-area-inset-top) + 15px) 0 15px;
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 1000; border-bottom: 0.5px solid var(--border);
            transition: transform 0.4s ease;
        }

        .logo-box h2 { font-size: 19px; font-weight: 800; text-align: center; color: var(--text-main); text-transform: uppercase; }
        .logo-box span { font-size: 8px; color: var(--accent-gold); letter-spacing: 4px; display: block; text-transform: uppercase; text-align: center; margin-top: 4px; font-weight: 700; }

        .feed { 
            height: 100%; overflow-y: scroll; 
            padding: calc(env(safe-area-inset-top) + 140px) 16px 120px; 
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .product-card { 
            background: var(--card-bg); border-radius: 20px; overflow: hidden; 
            box-shadow: var(--shadow); border: 0.5px solid var(--border);
            opacity: 0; transform: translateY(15px); transition: 0.5s ease;
        }
        .product-card.visible { opacity: 1; transform: translateY(0); }

        .p-image { width: 100%; aspect-ratio: 1/1.3; overflow: hidden; background: #8881; }
        .p-image img { width: 100%; height: 100%; object-fit: cover; }
        
        .p-details { padding: 10px; }
        .size-tag { font-size: 9px; color: var(--text-soft); font-weight: 800; margin-bottom: 4px; display: block; }
        .p-name { font-size: 13px; font-weight: 600; color: var(--text-main); line-height: 1.2; height: 32px; overflow: hidden; }
        .price { font-size: 14px; font-weight: 800; color: var(--text-main); margin-top: 5px; }

        /* PREVIEW MODAL - FULL IMAGE VIEW */
        #item-preview {
            position: absolute; inset: 0; 
            background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 3000; display: none; align-items: center; justify-content: center; 
        }
        
        .preview-content { 
            width: 90%; max-height: 85vh; 
            background: var(--card-bg); padding: 8px; 
            border-radius: 24px; text-align: center; 
            display: flex; flex-direction: column;
        }
        
        .preview-image { 
            width: 100%; max-height: 60vh; border-radius: 18px; 
            object-fit: contain; /* Shows full image without cropping */
            background: #000; margin-bottom: 12px; cursor: pointer;
        }

        .btn-order-whatsapp {
            background: var(--accent-green); color: white; padding: 15px; border-radius: 15px;
            text-decoration: none; font-weight: 700; display: flex; align-items: center; 
            gap: 10px; font-size: 14px; width: 100%; justify-content: center;
        }
    </style>
</head>
<body>

<div class="app-shell">
    <div id="splash-screen">
        <div style="text-align:center; color:white; margin-bottom:40px;">
            <h1 style="font-weight: 800; letter-spacing: 1px; font-size: 26px;">WELCOME TO<br>ENIS COLLECTION</h1>
            <p style="font-size:9px; letter-spacing:5px; color: var(--accent-gold); margin-top: 12px; font-weight: 700;">PAMPER YOUR BODY</p>
        </div>
        <button style="background:#fff; color:#000; padding:18px 50px; border-radius:40px; border:none; font-weight:800;" onclick="launchApp()">Enter Shop</button>
    </div>

    <div id="shop-content">
        <header id="mainHeader">
            <div class="logo-box">
                <h2>Enis Collection</h2>
                <span>Pamper Your Body</span>
            </div>
            <div class="filter-bar">
                <div class="filter-tag active" onclick="filterItems('All', this)">All</div>
                <div class="filter-tag" onclick="filterItems('Dress', this)">Dresses</div>
                <div class="filter-tag" onclick="filterItems('Set', this)">Sets & Skirts</div>
                <div class="filter-tag" onclick="filterItems('Work', this)">Work Wear</div>
            </div>
        </header>

        <div class="feed" id="mainFeed">
            <div class="grid" id="productGrid"></div>
            
            <div style="margin-top: 40px; padding: 30px 20px; background: var(--card-bg); border-radius: 24px; text-align: center;">
                <p style="font-size: 13px; color: var(--text-soft); margin-bottom: 20px;">Curated for the modern silhouette.</p>
                <div style="display: flex; justify-content: center; gap: 15px;">
                    <a href="tel:+233546527892" style="color:var(--text-main);"><i class="fas fa-phone"></i></a>
                    <a href="https://www.tiktok.com/@eniscollection1" style="color:var(--text-main);"><i class="fab fa-tiktok"></i></a>
                </div>
            </div>
        </div>
    </div>

    <div id="item-preview" onclick="closePreview()">
        <div class="preview-content" onclick="event.stopPropagation()">
            <img id="preview-img" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" class="preview-image" onclick="closePreview()">
            <div style="padding: 5px 10px 10px;">
                <span id="preview-size" style="font-size: 9px; color: var(--text-soft); font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block;"></span>
                <h2 id="preview-name" style="font-size: 16px; margin-bottom: 15px; color: var(--text-main)"></h2>
                <a id="whatsapp-order-btn" href="#" class="btn-order-whatsapp">
                    <i class="fab fa-whatsapp"></i> Order on WhatsApp
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    const myProducts = [
        { name: "Thick Seamless Dress", price: 50, size: "10", category: "Dress", image: "images/item1.jpg" },
        { name: "Plaited Skirts & Top", price: 50, size: "8/10", category: "Set", image: "images/item2.jpg" },
        { name: "Short Length Essential", price: 45, size: "8", category: "Dress", image: "images/item3.jpg" },
        { name: "Church & Work Midi", price: 50, size: "8", category: "Work", image: "images/item4.jpg" },
        { name: "Dinner & Party Elegance", price: 45, size: "8/10", category: "Dress", image: "images/item5.jpg" },
        { name: "Lecture & Beach Set", price: 45, size: "6/8/10", category: "Set", image: "images/item6.jpg" },
        { name: "Ruched SHEIN Special", price: 50, size: "8/10", category: "Dress", image: "images/item7.jpg" },
        { name: "Ultimate Work Gown", price: 50, size: "12/14", category: "Work", image: "images/item8.jpg" },
        { name: "Skirt & Basic Top Duo", price: 50, size: "10/12", category: "Set", image: "images/item9.jpg" },
        { name: "Refined Church Wear", price: 50, size: "10", category: "Work", image: "images/item10.jpg" }
    ];

    function renderProducts(filter = 'All') {
        const grid = document.getElementById('productGrid');
        const filtered = filter === 'All' ? myProducts : myProducts.filter(p => p.category === filter);
        
        grid.innerHTML = filtered.map((item, idx) => `
            <div class="product-card" style="transition-delay: ${idx * 0.05}s">
                <div class="p-image" onclick="openPreview('${item.name.replace(/'/g, "\\'")}', ${item.price}, '${item.image}', '${item.size}')">
                    <img src="${item.image}" onerror="this.src='https://via.placeholder.com/400x520?text=ENIS'">
                </div>
                <div class="p-details">
                    <span class="size-tag">UK SIZE ${item.size}</span>
                    <h3 class="p-name">${item.name}</h3>
                    <p class="price">GH₵ ${item.price.toFixed(2)}</p>
                </div>
            </div>
        `).join('');

        setTimeout(() => {
            document.querySelectorAll('.product-card').forEach(c => c.classList.add('visible'));
        }, 50);
    }

    function filterItems(cat, el) {
        document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        renderProducts(cat);
    }

    function launchApp() {
        const splash = document.getElementById('splash-screen');
        splash.style.opacity = "0";
        document.getElementById('shop-content').style.opacity = "1";
        renderProducts();
        setTimeout(() => { splash.style.display = "none"; }, 600);
    }

    function openPreview(name, price, image, size) {
        const previewImg = document.getElementById('preview-img');
        
        // Fix glitch: reset to blank pixel first so user doesn't see previous image
        previewImg.src = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";
        
        setTimeout(() => {
            previewImg.src = image;
            document.getElementById('preview-name').innerText = name;
            document.getElementById('preview-size').innerText = `UK SIZE ${size} • GH₵ ${price}`;
            const msg = encodeURIComponent(`Hi Enis! ✨ I'd like to order: ${name} (Size ${size})`);
            document.getElementById('whatsapp-order-btn').href = `https://wa.me/233546527892?text=${msg}`;
            document.getElementById('item-preview').style.display = 'flex';
        }, 10);
    }

    function closePreview() { 
        document.getElementById('item-preview').style.display = 'none';
    }
</script>

</body>
</html>
