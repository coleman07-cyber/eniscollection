<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ENIS COLLECTION | Luxury Wear</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #FFFFFF;
            --card-bg: #FFFFFF;
            --text-main: #121212;
            --text-soft: #636366;
            --accent-gold: #C5A028; 
            --gold-gradient: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --gold-glow: 0 4px 20px rgba(197, 160, 40, 0.15);
            --glass: rgba(255, 255, 255, 0.85);
            --border: rgba(0, 0, 0, 0.08);
            --shadow: 0 10px 40px rgba(0,0,0,0.06);
            --accent-green: #25D366;
            --ease-luxury: cubic-bezier(0.32, 0.72, 0, 1); /* Apple-style smooth curve */
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --card-bg: #121212;
                --text-main: #FFFFFF;
                --text-soft: #A1A1A6;
                --glass: rgba(0, 0, 0, 0.8);
                --border: rgba(255, 255, 255, 0.1);
                --shadow: 0 10px 40px rgba(0,0,0,0.4);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, "SF Pro Display", sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); height: 100vh; overflow: hidden; position: fixed; width: 100%; }

        .app-shell {
            width: 100%; max-width: 420px; height: 100vh; margin: 0 auto;
            background: var(--bg); position: relative; display: flex; flex-direction: column;
        }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: absolute; inset: 0; z-index: 9999;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.85)), url('images/Splash-Dress.PNG') center/cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.8s var(--ease-luxury), transform 0.8s var(--ease-luxury), visibility 0.8s;
            animation: slowZoom 25s infinite alternate;
        }
        
        @keyframes slowZoom { from { transform: scale(1); } to { transform: scale(1.1); } }
        #splash-screen.hidden { opacity: 0; visibility: hidden; transform: scale(1.05); }
        
        .splash-brand h1 { 
            font-family: 'Great Vibes', cursive; 
            font-size: 58px; 
            font-weight: 400; 
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            margin-bottom: 5px;
        }

        .btn-launch {
            background: #fff; color: #000; padding: 18px 50px;
            border-radius: 50px; border: none; font-weight: 700; font-size: 13px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); cursor: pointer; letter-spacing: 2px;
            text-transform: uppercase; margin-top: 40px;
        }

        /* --- SHOP CONTENT --- */
        header { padding: calc(env(safe-area-inset-top) + 20px) 0 15px; background: var(--bg); border-bottom: 0.5px solid var(--border); }
        .logo-box h2 { font-family: 'Playfair Display', serif; font-size: 22px; text-align: center; color: var(--text-main); letter-spacing: 1px;}
        
        /* --- PRODUCT GRID --- */
        .feed { flex: 1; overflow-y: auto; background: var(--bg); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 20px; }
        
        .product-card { 
            background: var(--card-bg); border-radius: 20px; 
            overflow: hidden; box-shadow: var(--shadow); border: 0.5px solid var(--border);
            opacity: 0; transform: translateY(30px); 
            transition: all 0.9s var(--ease-luxury);
        }
        .product-card.visible { opacity: 1; transform: translateY(0); }

        .p-image-wrap { 
            position: relative; width: 100%; aspect-ratio: 1/1.3; overflow: hidden; 
            background: #f2f2f7;
        }
        @media (prefers-color-scheme: dark) { .p-image-wrap { background: #1c1c1e; } }

        .p-image-wrap img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.6s ease; }
        .p-image-wrap img.loaded { opacity: 1; }
        
        /* --- MODERNIZED ABOUT AREA --- */
        .about-modern {
            margin: 40px 20px 60px; padding: 50px 25px;
            background: var(--card-bg); border-radius: 30px;
            border: 0.5px solid var(--border); box-shadow: var(--shadow);
            text-align: center;
        }
        .about-modern .headline { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--text-main); margin-bottom: 15px; }
        .social-btn {
            width: 50px; height: 50px; border-radius: 50%;
            background: var(--bg); color: var(--text-main);
            border: 0.5px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            display: inline-flex; align-items: center; justify-content: center; margin: 0 8px;
            transition: 0.3s;
        }

        /* --- PERFECTED PREVIEW TRANSITION --- */
        #item-preview {
            position: fixed; inset: 0; z-index: 10000;
            background: rgba(0,0,0,0.4); /* Light mode overlay */
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: none; align-items: center; justify-content: center; padding: 20px;
            opacity: 0; 
            transition: opacity 0.6s var(--ease-luxury);
        }
        @media (prefers-color-scheme: dark) { #item-preview { background: rgba(0,0,0,0.85); } }

        #item-preview.active { display: flex; opacity: 1; }
        
        .preview-box { 
            width: 100%; max-width: 320px; background: var(--card-bg); 
            padding: 10px; border-radius: 40px; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.2);
            /* Perfect Medium Transition: Scale + Fade + Slide */
            transform: scale(0.85) translateY(60px); 
            transition: transform 0.6s var(--ease-luxury);
        }
        #item-preview.active .preview-box { transform: scale(1) translateY(0); }
        
        /* Exit Animation Hook */
        #item-preview.closing { opacity: 0; }
        #item-preview.closing .preview-box { transform: scale(0.85) translateY(60px); }

        .preview-img-container { border-radius: 32px; overflow: hidden; height: 400px; }
        .btn-order {
            background: #121212; color: white; padding: 18px; border-radius: 20px;
            text-decoration: none; font-weight: 700; display: flex; align-items: center; 
            gap: 10px; font-size: 14px; justify-content: center; margin-top: 15px;
            transition: 0.3s;
        }
        @media (prefers-color-scheme: dark) { .btn-order { background: var(--accent-green); } }
    </style>
</head>
<body>

<div class="app-shell">
    <div id="splash-screen">
        <div class="splash-brand" style="text-align: center;">
            <h1>Enis Collection</h1>
            <p style="color: #fff; font-size: 10px; letter-spacing: 6px; text-transform: uppercase; font-weight: 600; opacity: 0.9;">Luxury & Elegance</p>
        </div>
        <button class="btn-launch" onclick="launchApp()">Discover</button>
    </div>

    <div id="shop-content" style="display: none; flex-direction: column; height: 100%;">
        <header>
            <div class="logo-box">
                <h2>Enis Collection</h2>
            </div>
        </header>

        <div class="feed" id="mainFeed" onscroll="handleScroll()">
            <div class="grid" id="productGrid"></div>
            
            <div class="about-modern">
                <h3 class="headline">Our Heritage</h3>
                <p style="color: var(--text-soft); font-size: 14px; line-height: 1.6; margin-bottom: 25px;">Curated luxury wear from Cape Coast, designed to pamper your body with timeless sophistication.</p>
                <div class="social-row">
                    <a href="https://wa.me/233546527892" class="social-btn"><i class="fab fa-whatsapp"></i></a>
                    <a href="https://www.tiktok.com/@eniscollection1" class="social-btn"><i class="fab fa-tiktok"></i></a>
                    <a href="tel:+233546527892" class="social-btn"><i class="fas fa-phone"></i></a>
                </div>
            </div>
        </div>
    </div>

    <div id="item-preview" onclick="closePreview()">
        <div class="preview-box" onclick="event.stopPropagation()">
            <div class="preview-img-container">
                <img id="preview-img" src="" class="preview-image" style="width:100%; height:100%; object-fit:cover;">
            </div>
            <div style="padding: 20px 10px; text-align:center;">
                <h2 id="preview-name" style="font-family: 'Playfair Display', serif; font-size: 22px; color: var(--text-main);"></h2>
                <p id="preview-size" style="color: var(--accent-gold); font-size: 12px; font-weight: 700; margin-top: 5px;"></p>
                <a id="wa-btn" href="#" class="btn-order">Order via WhatsApp</a>
            </div>
        </div>
    </div>
</div>

<script>
    const myProducts = [
        { name: "Thick Seamless Dress", price: 50, size: "10", category: "Dress", image: "images/item1.jpg" },
        { name: "Plaited Skirts & Top", price: 50, size: "8/10", category: "Set", image: "images/item2.jpg" },
        { name: "Short Length Essential", price: 45, size: "8", category: "Dress", image: "images/item3.jpg" },
        { name: "Church & Work Midi", price: 50, size: "8", category: "Work", image: "images/item4.jpg" },
        { name: "Dinner & Party Elegance", price: 45, size: "8/10", category: "Dress", image: "images/item5.jpg" },
        { name: "Lecture & Beach Set", price: 45, size: "6/8/10", category: "Set", image: "images/item6.jpg" },
        { name: "Ruched SHEIN Special", price: 50, size: "8/10", category: "Dress", image: "images/item7.jpg" },
        { name: "Ultimate Work Gown", price: 50, size: "12/14", category: "Work", image: "images/item8.jpg" },
        { name: "Skirt & Basic Top Duo", price: 50, size: "10/12", category: "Set", image: "images/item9.jpg" },
        { name: "Refined Church Wear", price: 50, size: "10", category: "Work", image: "images/item10.jpg" }
    ];

    function preloadAllImages() {
        myProducts.forEach(product => { const img = new Image(); img.src = product.image; });
    }
    preloadAllImages();

    function renderProducts() {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = myProducts.map((item) => `
            <div class="product-card">
                <div class="p-image-wrap" onclick="openPreview('${item.name.replace(/'/g, "\\'")}', ${item.price}, '${item.image}', '${item.size}')">
                    <img src="${item.image}" onload="this.classList.add('loaded')">
                    <div style="position:absolute; bottom:10px; right:10px; background:#fff; color:#000; padding:5px 10px; border-radius:10px; font-size:11px; font-weight:800; box-shadow:0 4px 10px rgba(0,0,0,0.1);">₵${item.price}</div>
                </div>
                <div style="padding:15px;">
                    <span style="font-size:10px; color:var(--accent-gold); font-weight:800; text-transform:uppercase;">UK ${item.size}</span>
                    <h3 style="font-size:13px; color:var(--text-main); margin-top:4px;">${item.name}</h3>
                </div>
            </div>
        `).join('');
        setTimeout(handleScroll, 50);
    }

    function handleScroll() {
        const cards = document.querySelectorAll('.product-card');
        cards.forEach(card => {
            const cardTop = card.getBoundingClientRect().top;
            if(cardTop < window.innerHeight * 0.95) card.classList.add('visible');
        });
    }

    function launchApp() {
        const splash = document.getElementById('splash-screen');
        splash.classList.add('hidden');
        setTimeout(() => {
            document.getElementById('shop-content').style.display = 'flex';
            renderProducts();
        }, 400);
    }

    function openPreview(name, price, image, size) {
        const modal = document.getElementById('item-preview');
        document.getElementById('preview-img').src = image;
        document.getElementById('preview-name').innerText = name;
        document.getElementById('preview-size').innerText = `UK SIZE ${size} • ₵${price}`;
        const msg = encodeURIComponent(`Hi Enis! ✨ I'd like to order: ${name} (Size ${size})`);
        document.getElementById('wa-btn').href = `https://wa.me/233546527892?text=${msg}`;
        modal.style.display = 'flex';
        setTimeout(() => modal.classList.add('active'), 10);
    }

    function closePreview() { 
        const modal = document.getElementById('item-preview');
        modal.classList.add('closing'); // Trigger exit animation
        setTimeout(() => {
            modal.classList.remove('active', 'closing');
            modal.style.display = 'none';
        }, 600); // Wait for transition to finish
    }
</script>

</body>
</html>
