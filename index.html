<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>ENIS COLLECTION</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,400&family=Outfit:wght@300;500;700&display=swap"/>
<style>
:root {
  --bg: #FDFCFB; 
  --text: #1A1614;
  --gold: #C5A059;
  --accent: #D4AF37;
  --white: #FFFFFF;
  --radius: 28px;
  --shadow: 0 10px 30px rgba(0,0,0,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

/* ── SPLASH SCREEN ── */
#splash {
  position: fixed; inset: 0; z-index: 2000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #12100E url('images/Splash-Dress.PNG') center/cover no-repeat;
  transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1);
}
#splash::before { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.6); }
#splash.hide { transform: translateY(-100%); }
.splash-content { position: relative; z-index: 1; text-align: center; color: white; }
.splash-logo { font-family: 'Playfair Display', serif; font-size: 42px; margin-bottom: 5px; }

/* ── HEADER ── */
.hdr { position: sticky; top: 0; z-index: 100; background: rgba(253, 252, 251, 0.95); backdrop-filter: blur(15px); padding: 15px 20px; text-align: center; }
.brand-name { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 600; color: var(--text); }
.brand-tag { font-family: 'Montserrat', sans-serif; text-transform: uppercase; font-size: 8px; letter-spacing: 4px; color: var(--gold); font-weight: 600; display: block; margin-top: 4px; }

/* ── CATEGORIES (PROFESSIONAL GOLD STYLE) ── */
.cat-section { padding: 20px; }
.cat-pills { display: flex; gap: 25px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; justify-content: center; }
.cat-pill { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
.cat-lbl { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: #AAA; }
.cat-pill.active .cat-lbl { color: var(--text); }
.cat-circle { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.3s; color: #444; }
.cat-pill.active .cat-circle { background: var(--gold); color: white; box-shadow: 0 8px 20px rgba(197, 160, 89, 0.3); }

/* ── PRODUCT GRID ── */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px 40px; }
.card { border-radius: var(--radius); overflow: hidden; position: relative; }
.card-img-box { position: relative; aspect-ratio: 0.75; border-radius: var(--radius); overflow: hidden; background: #eee; }
.card-img-box img { width: 100%; height: 100%; object-fit: cover; }
.price-pill { position: absolute; bottom: 12px; left: 12px; background: white; padding: 6px 12px; border-radius: 12px; font-weight: 700; font-size: 13px; box-shadow: var(--shadow); }

/* ── FLOATING BUTTONS ── */
.floating-actions { position: fixed; bottom: 30px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 15px; }
.float-btn { width: 55px; height: 55px; background: var(--text); color: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); position: relative; cursor: pointer; }
.nav-badge { position: absolute; top: 0; right: 0; background: var(--gold); color: white; font-size: 10px; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--text); }

/* ── MODAL OVERLAYS ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal { background: white; width: 100%; max-width: 400px; border-radius: 30px; padding: 30px; max-height: 80vh; overflow-y: auto; position: relative; }
.close-modal { position: absolute; top: 20px; right: 20px; font-size: 20px; cursor: pointer; }
.list-item { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
.list-item img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; }

/* ── ABOUT ── */
.about { background: #1A1614; color: white; padding: 60px 25px 120px; border-radius: 40px 40px 0 0; text-align: center; }
.contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 30px; }
.contact-btn { background: rgba(255,255,255,0.05); padding: 18px; border-radius: 18px; color: white; text-decoration: none; font-size: 10px; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,0.1); }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-content">
    <h1 class="splash-logo">Enis Collection</h1>
    <button onclick="document.getElementById('splash').classList.add('hide')" style="margin-top:20px; background:transparent; border:1px solid var(--accent); color:white; padding:12px 40px; border-radius:50px; letter-spacing:2px; text-transform:uppercase; font-size:10px;">Enter Shop</button>
  </div>
</div>

<div class="hdr">
  <h1 class="brand-name">Enis Collection</h1>
  <span class="brand-tag">Pamper your body</span>
</div>

<div class="cat-section">
  <div class="cat-pills">
    <div class="cat-pill active" onclick="filterCat('ALL', this)"><div class="cat-circle"><i class="fas fa-th-large"></i></div><span class="cat-lbl">All</span></div>
    <div class="cat-pill" onclick="filterCat('THRIFT', this)"><div class="cat-circle"><i class="fas fa-leaf"></i></div><span class="cat-lbl">Thrift</span></div>
    <div class="cat-pill" onclick="filterCat('STORE', this)"><div class="cat-circle"><i class="fas fa-store"></i></div><span class="cat-lbl">Store</span></div>
    <div class="cat-pill" onclick="filterCat('HANDMADE', this)"><div class="cat-circle"><i class="fas fa-wand-magic-sparkles"></i></div><span class="cat-lbl">Handmade</span></div>
  </div>
</div>

<div class="grid" id="product-grid"></div>

<div id="cart-overlay" class="overlay">
  <div class="modal">
    <i class="fas fa-times close-modal" onclick="closeModals()"></i>
    <h3 style="margin-bottom:20px; font-family:'Playfair Display'">Your Shopping Bag</h3>
    <div id="cart-list"></div>
    <button onclick="alert('Proceeding to WhatsApp checkout...')" style="width:100%; padding:15px; background:var(--text); color:var(--accent); border-radius:15px; border:none; margin-top:20px; font-weight:700;">Checkout Now</button>
  </div>
</div>

<div class="floating-actions">
  <div class="float-btn" onclick="openModal('wish')"><i class="far fa-heart"></i><span class="nav-badge" id="wish-count">0</span></div>
  <div class="float-btn" onclick="openModal('cart')"><i class="fas fa-shopping-bag"></i><span class="nav-badge" id="cart-count">0</span></div>
</div>

<div class="about">
  <h3 style="font-family:'Playfair Display'; color:var(--accent); font-size:32px;">Connect With Us</h3>
  <div class="contact-grid">
    <a href="tel:+233546527892" class="contact-btn"><i class="fas fa-phone"></i> Call</a>
    <a href="mailto:Sheilaenima@gmail.com" class="contact-btn"><i class="far fa-envelope"></i> Email</a>
    <a href="https://wa.me/233546527892" class="contact-btn"><i class="fab fa-whatsapp"></i> WhatsApp</a>
    <a href="https://www.tiktok.com/@eniscollection1" class="contact-btn"><i class="fab fa-tiktok"></i> TikTok</a>
  </div>
</div>

<script>
const PRODUCTS = [
  {id:1, name:"Thick Seamless Dress", price:50, cat:"THRIFT", img:"images/item1.jpg"},
  {id:2, name:"Plaited Skirts & Top", price:50, cat:"THRIFT", img:"images/item2.jpg"},
  {id:3, name:"Short Length Essential", price:45, cat:"THRIFT", img:"images/item3.jpg"},
  {id:4, name:"Church & Work Gown", price:50, cat:"STORE", img:"images/item4.jpg"},
  {id:5, name:"Dinner Party Elegance", price:45, cat:"STORE", img:"images/item5.jpg"},
  {id:6, name:"Lecture & Beach Set", price:45, cat:"STORE", img:"images/item6.jpg"},
  {id:7, name:"Handmade Silk Wrap", price:65, cat:"HANDMADE", img:"images/item7.jpg"},
  {id:8, name:"Ruched SHEIN Special", price:50, cat:"THRIFT", img:"images/item8.jpg"},
  {id:9, name:"Ultimate Work Gown", price:50, cat:"THRIFT", img:"images/item9.jpg"},
  {id:10, name:"Refined Church Wear", price:50, cat:"STORE", img:"images/item10.jpg"}
];

let wishlist = []; let cart = [];

function renderGrid(f = 'ALL') {
  const g = document.getElementById('product-grid');
  const data = f === 'ALL' ? PRODUCTS : PRODUCTS.filter(p => p.cat === f);
  g.innerHTML = data.map(p => `
    <div class="card">
      <div class="card-img-box">
        <img src="${p.img}">
        <div class="price-pill">₵${p.price}</div>
        <div style="position:absolute; top:12px; right:12px; display:flex; flex-direction:column; gap:8px;">
          <button onclick="toggleItem('wish', ${p.id})" style="width:35px; height:35px; border-radius:50%; border:none; background:white;"><i class="${wishlist.includes(p.id)?'fas':'far'} fa-heart" style="color:${wishlist.includes(p.id)?'red':'#ccc'}"></i></button>
          <button onclick="toggleItem('cart', ${p.id})" style="width:35px; height:35px; border-radius:50%; border:none; background:${cart.includes(p.id)?'#1a1614':'white'}; color:${cart.includes(p.id)?'#D4AF37':'#ccc'}"><i class="fas fa-shopping-bag"></i></button>
        </div>
      </div>
      <div style="padding:10px 0"><h4 style="font-size:14px; font-weight:500;">${p.name}</h4></div>
    </div>
  `).join('');
}

function toggleItem(type, id) {
  let list = type === 'wish' ? wishlist : cart;
  const idx = list.indexOf(id);
  if(idx > -1) list.splice(idx,1); else list.push(id);
  document.getElementById(type+'-count').innerText = list.length;
  renderGrid();
}

function filterCat(c, el) {
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderGrid(c);
}

function openModal(type) {
  const overlay = document.getElementById('cart-overlay');
  const listDiv = document.getElementById('cart-list');
  const list = type === 'wish' ? wishlist : cart;
  overlay.style.display = 'flex';
  listDiv.innerHTML = list.length ? list.map(id => {
    const p = PRODUCTS.find(x => x.id === id);
    return `<div class="list-item"><img src="${p.img}"><div><b>${p.name}</b><br>₵${p.price}</div></div>`;
  }).join('') : '<p>Your list is empty.</p>';
}

function closeModals() { document.getElementById('cart-overlay').style.display = 'none'; }

renderGrid();
</script>
</body>
</html>
