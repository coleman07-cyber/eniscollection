<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    
    <title>ENIS COLLECTION</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg: #F2F2F7;
            --card-bg: #FFFFFF;
            --text-main: #1C1C1E;
            --text-soft: #8E8E93;
            --accent-gold: #D4AF37;
            --glass: rgba(255, 255, 255, 0.8);
            --border: rgba(0, 0, 0, 0.05);
            --shadow: 0 8px 20px rgba(0,0,0,0.04);
            --accent-green: #25D366;
            --radius-outer: 24px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --card-bg: #1C1C1E;
                --text-main: #FFFFFF;
                --text-soft: #A1A1A6;
                --glass: rgba(28, 28, 30, 0.85);
                --border: rgba(255, 255, 255, 0.1);
                --shadow: 0 10px 30px rgba(0,0,0,0.5);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: #000; height: 100vh; overflow: hidden; position: fixed; width: 100%; }

        .app-shell {
            width: 100%; max-width: 420px; height: 100vh; margin: 0 auto;
            background: var(--bg); position: relative; overflow: hidden;
        }

        /* Splash Screen Polish */
        #splash-screen {
            position: absolute; inset: 0; z-index: 4000;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.8)), url('images/Splash-Dress.PNG') center/cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .splash-btn {
            background: #fff; color: #000; padding: 18px 60px; border-radius: 40px;
            font-weight: 700; border: none; cursor: pointer; font-size: 15px;
            transition: transform 0.2s ease, opacity 0.2s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .splash-btn:active { transform: scale(0.95); opacity: 0.9; }

        /* Shop Content */
        #shop-content { opacity: 0; transition: opacity 0.8s ease; height: 100%; }

        header {
            position: absolute; top: 0; width: 100%;
            padding: calc(env(safe-area-inset-top) + 15px) 20px 15px;
            background: var(--glass); 
            backdrop-filter: blur(25px) saturate(180%); -webkit-backdrop-filter: blur(25px) saturate(180%);
            z-index: 1000; border-bottom: 0.5px solid var(--border);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-box h2 { font-size: 20px; font-weight: 800; text-align: center; color: var(--text-main); letter-spacing: -0.5px; text-transform: uppercase; }
        .logo-box span { font-size: 8px; color: var(--accent-gold); letter-spacing: 5px; display: block; text-transform: uppercase; text-align: center; margin-top: 4px; font-weight: 700; }

        .feed { 
            height: 100%; overflow-y: scroll; 
            padding: calc(env(safe-area-inset-top) + 90px) 16px 120px; 
            scrollbar-width: none;
        }
        .feed::-webkit-scrollbar { display: none; }

        /* Product Cards Animation */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        
        .product-card { 
            background: var(--card-bg); border-radius: 20px; overflow: hidden; 
            box-shadow: var(--shadow); border: 0.5px solid var(--border);
            opacity: 0; transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .product-card.visible { opacity: 1; transform: translateY(0); }
        .product-card:active { transform: scale(0.97); }

        .p-image { width: 100%; aspect-ratio: 3.5/4.8; overflow: hidden; background: #8881; }
        .p-image img { width: 100%; height: 100%; object-fit: cover; }
        
        .p-details { padding: 12px; }
        .size-tag { font-size: 9px; color: var(--text-soft); font-weight: 800; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; display: block; }
        .p-name { font-size: 13px; font-weight: 600; color: var(--text-main); line-height: 1.3; height: 34px; overflow: hidden; }
        .price { font-size: 15px; font-weight: 800; color: var(--text-main); margin-top: 6px; }

        /* About & Socials */
        .about-section { 
            margin-top: 30px; padding: 35px 20px; 
            background: var(--card-bg); border-radius: 24px; 
            text-align: center; border: 0.5px solid var(--border);
        }
        .about-section h4 { font-size: 9px; letter-spacing: 4px; color: var(--accent-gold); margin-bottom: 12px; text-transform: uppercase; font-weight: 800; }
        .about-section p { font-size: 14px; color: var(--text-soft); line-height: 1.6; margin-bottom: 25px; }
        
        .contact-hub { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; }
        .icon-circle {
            width: 50px; height: 50px; border-radius: 50%;
            background: var(--bg); display: flex; align-items: center; justify-content: center;
            text-decoration: none; border: 1px solid var(--border); color: var(--text-main);
            transition: transform 0.2s ease;
        }
        .icon-circle:active { transform: scale(0.85); }

        /* PREVIEW MODAL */
        #item-preview {
            position: absolute; inset: 0; 
            background: rgba(0,0,0,0.7); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 3000; display: flex; align-items: center; justify-content: center; 
            opacity: 0; visibility: hidden; transition: all 0.3s ease;
        }
        #item-preview.active { opacity: 1; visibility: visible; }
        
        .preview-content { 
            width: 85%; max-width: 320px; 
            background: var(--card-bg); padding: 12px; 
            border-radius: 28px; text-align: center; 
            transform: scale(0.9); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #item-preview.active .preview-content { transform: scale(1); }
        
        .preview-image { width: 100%; border-radius: 20px; margin-bottom: 15px; aspect-ratio: 3/4; object-fit: cover; }

        .btn-order-whatsapp {
            background: var(--accent-green); color: white; padding: 16px; border-radius: 18px;
            text-decoration: none; font-weight: 700; display: flex; align-items: center; 
            gap: 10px; font-size: 15px; width: 100%; justify-content: center;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2);
        }
    </style>
</head>
<body>

<div class="app-shell">
    <div id="splash-screen">
        <div style="text-align:center; color:white; margin-bottom:40px; padding: 0 20px;">
            <h1 style="font-weight: 700; letter-spacing: 1px; font-size: 32px;">ENIS</h1>
            <p style="font-size:10px; letter-spacing:6px; color: var(--accent-gold); margin-top: 10px; font-weight: 700;">PAMPER YOUR BODY</p>
        </div>
        <button class="splash-btn" onclick="launchApp()">Enter Collection</button>
    </div>

    <div id="shop-content">
        <header id="mainHeader">
            <div class="logo-box">
                <h2>Enis Collection</h2>
                <span>Pamper Your Body</span>
            </div>
        </header>

        <div class="feed" id="mainFeed">
            <div class="grid" id="productGrid"></div>
            
            <div class="about-section">
                <h4>Our Philosophy</h4>
                <p>Curated for the modern silhouette. Every piece is selected to feel like a second skin while maintaining timeless sophistication.</p>
                <div class="contact-hub">
                    <a href="tel:+233546527892" class="icon-circle"><i class="fas fa-phone"></i></a>
                    <a href="javascript:void(0)" class="icon-circle" onclick="copyAndEmail()"><i class="fas fa-envelope"></i></a>
                    <a href="https://www.tiktok.com/@eniscollection1" class="icon-circle"><i class="fab fa-tiktok"></i></a>
                </div>
                <p style="font-size:10px; font-weight:700; letter-spacing:2px; color:var(--accent-gold)">@ENISCOLLECTION1</p>
            </div>
        </div>
    </div>

    <div id="item-preview" onclick="closePreview()">
        <div class="preview-content" onclick="event.stopPropagation()">
            <img id="preview-img" src="" class="preview-image">
            <div style="padding: 0 10px 10px;">
                <span id="preview-size" style="font-size: 10px; color: var(--text-soft); font-weight: 800; text-transform: uppercase; margin-bottom: 8px; display: block;"></span>
                <h2 id="preview-name" style="font-size: 18px; margin-bottom: 20px; color: var(--text-main)"></h2>
                <a id="whatsapp-order-btn" href="#" class="btn-order-whatsapp">
                    <i class="fab fa-whatsapp"></i> Instant Order
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    const myProducts = [
        { name: "Thick Seamless Dress", price: 50, size: "10", image: "images/item1.jpg" },
        { name: "Plaited Skirts & Top", price: 50, size: "8/10", image: "images/item2.jpg" },
        { name: "Short Length Essential", price: 45, size: "8", image: "images/item3.jpg" },
        { name: "Church & Work Midi", price: 50, size: "8", image: "images/item4.jpg" },
        { name: "Dinner & Party Elegance", price: 45, size: "8/10", image: "images/item5.jpg" },
        { name: "Lecture & Beach Set", price: 45, size: "6/8/10", image: "images/item6.jpg" },
        { name: "Ruched SHEIN Special", price: 50, size: "8/10", image: "images/item7.jpg" },
        { name: "Ultimate Work Gown", price: 50, size: "12/14", image: "images/item8.jpg" },
        { name: "Skirt & Basic Top Duo", price: 50, size: "10/12", image: "images/item9.jpg" },
        { name: "Refined Church Wear", price: 50, size: "10", image: "images/item10.jpg" }
    ];

    function renderProducts() {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = myProducts.map((item, idx) => `
            <div class="product-card" style="transition-delay: ${idx * 0.08}s">
                <div class="p-image" onclick="openPreview('${item.name.replace(/'/g, "\\'")}', ${item.price}, '${item.image}', '${item.size}')">
                    <img src="${item.image}" onerror="this.src='https://via.placeholder.com/400x520?text=ENIS'">
                </div>
                <div class="p-details">
                    <span class="size-tag">UK SIZE ${item.size}</span>
                    <h3 class="p-name">${item.name}</h3>
                    <p class="price">GH₵ ${item.price.toFixed(2)}</p>
                </div>
            </div>
        `).join('');
    }

    function launchApp() {
        const splash = document.getElementById('splash-screen');
        const content = document.getElementById('shop-content');
        
        splash.style.opacity = "0";
        splash.style.transform = "scale(1.1)";
        content.style.opacity = "1";
        
        renderProducts();
        
        setTimeout(() => {
            splash.style.display = "none";
            // Trigger the entrance animation for cards
            document.querySelectorAll('.product-card').forEach(c => c.classList.add('visible'));
        }, 800);
    }

    // Smooth Header Scroll
    let lastScroll = 0;
    const feed = document.getElementById('mainFeed');
    const header = document.getElementById('mainHeader');

    feed.addEventListener('scroll', () => {
        const cur = feed.scrollTop;
        if (cur > lastScroll && cur > 100) header.style.transform = 'translateY(-100%)';
        else header.style.transform = 'translateY(0)';
        lastScroll = cur;
    });

    function openPreview(name, price, image, size) {
        document.getElementById('preview-img').src = image;
        document.getElementById('preview-name').innerText = name;
        document.getElementById('preview-size').innerText = `UK SIZE ${size} • GH₵ ${price}`;
        const msg = encodeURIComponent(`Hi Enis! ✨ I'd like to order the ${name} (Size ${size})`);
        document.getElementById('whatsapp-order-btn').href = `https://wa.me/233546527892?text=${msg}`;
        document.getElementById('item-preview').classList.add('active');
    }

    function closePreview() { 
        document.getElementById('item-preview').classList.remove('active');
    }

    function copyAndEmail() {
        navigator.clipboard.writeText("sheilaenima@gmail.com");
        alert("Email copied to clipboard!");
        window.location.href = "mailto:sheilaenima@gmail.com";
    }
</script>

</body>
</html>
