<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>ENIS COLLECTION</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,400&family=Outfit:wght@300;500;700&display=swap"/>
<style>
:root {
  --bg: #FDFCFB; 
  --text: #1A1614;
  --yellow: #F2C94C; 
  --brown: #6B3E26;  
  --white: #FFFFFF;
}

/* ── PERFORMANCE FIXES ── */
* { 
  margin:0; padding:0; box-sizing:border-box; 
  -webkit-tap-highlight-color:transparent; 
  /* Critical for smooth scrolling on mobile */
  touch-action: pan-y; 
}

body { 
  font-family: 'Montserrat', sans-serif; 
  background: var(--bg); 
  color: var(--text); 
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}

/* ── SPLASH SCREEN ── */
#splash {
  position: fixed; inset: 0; z-index: 3000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #12100E url('images/Splash-Dress.PNG') center/cover no-repeat;
  transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1);
}
#splash::before { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.65); }
.splash-content { position: relative; z-index: 1; text-align: center; color: white; }
.splash-logo { font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 600; }
#splash.hide { transform: translateY(-100%); }

/* ── HEADER ── */
.hdr { position: sticky; top: 0; z-index: 100; background: rgba(253, 252, 251, 0.95); backdrop-filter: blur(15px); padding: 15px 20px; text-align: center; }
.brand-name { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 600; color: var(--brown); }
.brand-tag { font-family: 'Outfit', sans-serif; text-transform: uppercase; font-size: 8px; letter-spacing: 5px; color: var(--yellow); font-weight: 700; display: block; margin-top: 4px; }

/* ── PRODUCT GRID ── */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px 40px; }
.card-img-box { position: relative; aspect-ratio: 0.75; border-radius: 28px; overflow: hidden; background: #f5f5f5; }
.card-img-box img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

.modern-price { 
  position: absolute; bottom: 12px; left: 12px; 
  background: var(--brown); color: var(--yellow); 
  padding: 6px 14px; border-radius: 12px; font-weight: 700; font-size: 11px;
}

/* ── COMPACT FLOATING BAR ── */
.float-bar { 
  position: fixed; bottom: 25px; right: 20px; z-index: 1000; 
  display: flex; flex-direction: column; 
  gap: 6px; /* Reduced gap between wishlist and cart */
  transition: opacity 0.3s ease, transform 0.3s ease;
}

/* Hide when scrolling class */
.float-bar.hidden {
  opacity: 0;
  transform: translateY(20px);
  pointer-events: none;
}

.modern-float { 
  width: 44px; height: 44px; /* Slightly smaller for a modern look */
  background: var(--brown); color: var(--yellow); 
  border-radius: 50%; display: flex; align-items: center; justify-content: center; 
  font-size: 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.25); cursor: pointer; position: relative;
}

.m-badge { 
  position: absolute; top: -3px; right: -3px; background: var(--yellow); 
  color: var(--brown); font-size: 9px; width: 18px; height: 18px; border-radius: 50%; 
  display: flex; align-items: center; justify-content: center; border: 2px solid var(--brown); 
}

/* ── SMALLER DRAWER ITEMS ── */
.drawer { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: none; align-items: flex-end; }
.drawer.open { display: flex; }
.drawer-content { width: 100%; background: var(--white); border-radius: 35px 35px 0 0; padding: 25px 20px; max-height: 70vh; overflow-y: auto; }
.small-item { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; border-bottom: 1px solid #f9f9f9; padding-bottom: 10px; }
.small-item img { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; }

/* ── ABOUT SECTION ── */
.about-section { background: var(--brown); color: white; padding: 60px 25px 120px; border-radius: 40px 40px 0 0; text-align: center; }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-content">
    <h1 class="splash-logo">Enis Collection</h1>
    <button onclick="document.getElementById('splash').classList.add('hide')" style="margin-top:25px; background:var(--yellow); border:none; color:var(--brown); padding:14px 40px; border-radius:50px; text-transform:uppercase; font-size:10px; font-weight:700; letter-spacing:2px;">Explore Shop</button>
  </div>
</div>

<div class="hdr">
  <h1 class="brand-name">Enis Collection</h1>
  <span class="brand-tag">Pamper your body</span>
</div>

<div class="grid" id="main-grid"></div>

<div class="float-bar" id="floatingBar">
  <div class="modern-float" onclick="openDrawer('wish')"><i class="fa-regular fa-heart"></i><span class="m-badge" id="w-badge">0</span></div>
  <div class="modern-float" onclick="openDrawer('cart')"><i class="fa-solid fa-cart-shopping"></i><span class="m-badge" id="c-badge">0</span></div>
</div>

<div class="about-section">
  <h3 style="color:var(--yellow); font-family:'Playfair Display'; font-size:28px;">Enis Boutique</h3>
  <p style="margin-top:10px; opacity:0.7;">Curated fashion for your unique style.</p>
</div>

<div id="drawer" class="drawer" onclick="this.classList.remove('open')">
  <div class="drawer-content" onclick="event.stopPropagation()">
    <h2 id="d-title" style="font-family:'Playfair Display'; margin-bottom:20px;"></h2>
    <div id="d-list"></div>
    <button id="checkout-btn" onclick="sendWA()" style="display:none; width:100%; padding:20px; background:var(--brown); color:var(--yellow); border-radius:18px; border:none; margin-top:15px; font-weight:700;">Order on WhatsApp</button>
  </div>
</div>

<script>
const DB = [
  {id:1, name:"Thick Seamless Dress", price:50, img:"images/item1.jpg"},
  {id:2, name:"Plaited Skirts & Top", price:50, img:"images/item2.jpg"},
  {id:3, name:"Short Length Essential", price:45, img:"images/item3.jpg"},
  {id:4, name:"Church & Work Gown", price:50, img:"images/item4.jpg"}
];

let wish = []; let cart = [];
const floatingBar = document.getElementById('floatingBar');
let isScrolling;

// ── HIDE FLOATING BAR ON SCROLL ──
window.addEventListener('scroll', () => {
  // Add hidden class immediately when scrolling starts
  floatingBar.classList.add('hidden');

  // Clear timeout throughout the scroll
  window.clearTimeout(isScrolling);

  // Set timeout to show bar 150ms after scroll ends
  isScrolling = setTimeout(() => {
    floatingBar.classList.remove('hidden');
  }, 150);
}, { passive: true });

function renderGrid() {
  const g = document.getElementById('main-grid');
  g.innerHTML = DB.map(p => `
    <div class="card">
      <div class="card-img-box">
        <img src="${p.img}">
        <div class="modern-price">₵${p.price}</div>
        <div style="position:absolute; top:12px; right:12px; display:flex; flex-direction:column; gap:8px;">
          <button onclick="toggle('wish', ${p.id})" style="width:34px; height:34px; border-radius:50%; border:none; background:rgba(255,255,255,0.9);"><i class="${wish.includes(p.id)?'fa-solid':'fa-regular'} fa-heart"></i></button>
          <button onclick="toggle('cart', ${p.id})" style="width:34px; height:34px; border-radius:50%; border:none; background:${cart.includes(p.id)?'var(--yellow)':'rgba(255,255,255,0.9)'};"><i class="fa-solid fa-cart-shopping"></i></button>
        </div>
      </div>
      <div style="padding:10px 0"><h4 style="font-size:13px;">${p.name}</h4></div>
    </div>
  `).join('');
}

function toggle(type, id) {
  let list = type === 'wish' ? wish : cart;
  let idx = list.indexOf(id);
  if(idx > -1) list.splice(idx,1); else list.push(id);
  document.getElementById(type[0]+'-badge').innerText = list.length;
  renderGrid();
}

function openDrawer(type) {
  const d = document.getElementById('drawer');
  const list = type === 'wish' ? wish : cart;
  document.getElementById('d-title').innerText = type === 'wish' ? 'Favorites' : 'Cart';
  document.getElementById('checkout-btn').style.display = type === 'cart' && list.length ? 'block' : 'none';
  document.getElementById('d-list').innerHTML = list.length ? list.map(id => {
    const p = DB.find(x => x.id === id);
    return `<div class="small-item"><img src="${p.img}"><div><b>${p.name}</b><br><span>₵${p.price}</span></div></div>`;
  }).join('') : '<p style="text-align:center; padding:20px; font-size:12px; opacity:0.5;">Empty</p>';
  d.classList.add('open');
}

renderGrid();
</script>
</body>
</html>
