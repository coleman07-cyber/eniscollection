<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>ENIS COLLECTION | Official Store</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,400&family=Outfit:wght@300;500;700&display=swap"/>
<style>
:root {
  --bg: #FDFCFB; 
  --text: #1A1614;
  --gold: #C5A059;
  --accent: #D4AF37;
  --white: #FFFFFF;
  --radius: 32px; /* Extra round for the "engulfed" look */
  --shadow: 0 10px 40px rgba(0,0,0,0.06);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

/* ── PREMIUM SPLASH SCREEN ── */
#splash {
  position: fixed; inset: 0; z-index: 3000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #12100E; transition: opacity 0.8s ease, visibility 0.8s;
}
#splash.hide { opacity: 0; visibility: hidden; }
.splash-bg { position: absolute; inset: 0; background: url('images/Splash-Dress.PNG') center/cover no-repeat; opacity: 0.5; }
.splash-content { position: relative; z-index: 1; text-align: center; color: white; animation: fadeInUp 1s ease; }
@keyframes fadeInUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }

/* ── NAVIGATION & HEADER ── */
.hdr { position: sticky; top: 0; z-index: 100; background: rgba(253, 252, 251, 0.9); backdrop-filter: blur(20px); padding: 20px; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.03); }
.brand-name { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 600; letter-spacing: -0.5px; }
.brand-tag { font-family: 'Outfit', sans-serif; text-transform: uppercase; font-size: 9px; letter-spacing: 5px; color: var(--gold); font-weight: 500; margin-top: 6px; display: block; }

/* ── PROFESSIONAL CATEGORIES (FROM IMAGE) ── */
.cat-section { padding: 25px 20px 10px; }
.cat-title { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; padding-left: 5px; }
.cat-pills { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
.cat-pill { display: flex; flex-direction: column; align-items: center; gap: 10px; min-width: 70px; cursor: pointer; }
.cat-circle { width: 58px; height: 58px; border-radius: 50%; background: var(--white); display: flex; align-items: center; justify-content: center; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid rgba(0,0,0,0.05); box-shadow: var(--shadow); color: #555; }
.cat-pill.active .cat-circle { background: var(--gold); color: white; transform: scale(1.1); border-color: var(--gold); }
.cat-lbl { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #999; transition: 0.3s; }
.cat-pill.active .cat-lbl { color: var(--text); }

/* ── PRODUCT GRID ── */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; padding: 20px; }
.card { animation: fadeIn 0.6s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

.card-img-box { position: relative; aspect-ratio: 0.75; border-radius: var(--radius); overflow: hidden; background: #F1F1F1; box-shadow: var(--shadow); }
.card-img-box img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s ease; }
.card:active .card-img-box img { transform: scale(1.05); }

.price-tag { position: absolute; bottom: 15px; left: 15px; background: rgba(255,255,255,0.95); padding: 7px 15px; border-radius: 15px; font-weight: 700; font-size: 14px; color: var(--text); backdrop-filter: blur(5px); }
.card-btns { position: absolute; top: 15px; right: 15px; display: flex; flex-direction: column; gap: 10px; }
.btn-round { width: 38px; height: 38px; border-radius: 50%; border: none; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; color: #BBB; font-size: 16px; }
.btn-round.active-heart { color: #FF4D4D; }
.btn-round.active-cart { background: var(--text); color: var(--accent); }

.card-meta { padding: 15px 5px; }
.p-tag { font-size: 9px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; display: block; }
.p-name { font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 500; color: var(--text); }

/* ── FLOATING BUTTONS (BOTTOM RIGHT) ── */
.float-container { position: fixed; bottom: 30px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 15px; }
.float-trigger { width: 60px; height: 60px; background: var(--text); color: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 12px 30px rgba(0,0,0,0.25); cursor: pointer; position: relative; border: 1px solid rgba(255,255,255,0.1); }
.badge-count { position: absolute; top: -2px; right: -2px; background: var(--gold); color: white; font-size: 11px; font-weight: 800; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--text); }

/* ── DRAWER OVERLAY ── */
.drawer { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; display: none; visibility: hidden; transition: 0.3s; backdrop-filter: blur(5px); }
.drawer.open { display: block; visibility: visible; }
.drawer-content { position: absolute; bottom: 0; left: 0; right: 0; background: var(--white); border-radius: 40px 40px 0 0; padding: 40px 25px 30px; max-height: 85vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.1, 0.7, 0.3, 1); }
.drawer.open .drawer-content { transform: translateY(0); }

.checkout-btn { width: 100%; background: var(--text); color: var(--accent); padding: 20px; border-radius: 20px; border: none; font-weight: 700; font-size: 16px; margin-top: 20px; letter-spacing: 1px; cursor: pointer; }

/* ── ABOUT SECTION ── */
.about { background: #1A1614; color: white; padding: 80px 30px 140px; border-radius: 50px 50px 0 0; text-align: center; }
.social-btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 40px; }
.soc-link { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; color: white; text-decoration: none; font-size: 11px; text-transform: uppercase; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 10px; }
.soc-link i { font-size: 22px; color: var(--accent); }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-bg"></div>
  <div class="splash-content">
    <h1 class="splash-logo">Enis Collection</h1>
    <p style="letter-spacing:4px; font-size:10px; text-transform:uppercase; margin-bottom:40px; opacity:0.8;">Pamper Your Body</p>
    <button onclick="document.getElementById('splash').classList.add('hide')" style="background:var(--accent); border:none; color:black; padding:15px 50px; border-radius:50px; font-weight:700; text-transform:uppercase; letter-spacing:2px; font-size:11px;">Start Shopping</button>
  </div>
</div>

<div class="hdr">
  <h1 class="brand-name">Enis Collection</h1>
  <span class="brand-tag">Pamper your body</span>
</div>

<div class="cat-section">
  <h3 class="cat-title">Shop By Style</h3>
  <div class="cat-pills">
    <div class="cat-pill active" onclick="filterData('ALL', this)"><div class="cat-circle"><i class="fas fa-th-large"></i></div><span class="cat-lbl">All</span></div>
    <div class="cat-pill" onclick="filterData('THRIFT', this)"><div class="cat-circle"><i class="fas fa-leaf"></i></div><span class="cat-lbl">Thrift</span></div>
    <div class="cat-pill" onclick="filterData('STORE', this)"><div class="cat-circle"><i class="fas fa-store"></i></div><span class="cat-lbl">Store</span></div>
    <div class="cat-pill" onclick="filterData('HANDMADE', this)"><div class="cat-circle"><i class="fas fa-wand-magic-sparkles"></i></div><span class="cat-lbl">Custom</span></div>
  </div>
</div>

<div class="grid" id="main-grid"></div>

<div class="float-container">
  <div class="float-trigger" onclick="toggleDrawer('wish')"><i class="far fa-heart"></i><span class="badge-count" id="count-wish">0</span></div>
  <div class="float-trigger" onclick="toggleDrawer('cart')"><i class="fas fa-shopping-bag"></i><span class="badge-count" id="count-cart">0</span></div>
</div>

<div id="drawer" class="drawer" onclick="toggleDrawer()">
  <div class="drawer-content" onclick="event.stopPropagation()">
    <h2 id="drawer-title" style="font-family:'Playfair Display'; margin-bottom:20px;">Your Selection</h2>
    <div id="drawer-list"></div>
    <div id="checkout-area"></div>
  </div>
</div>

<div class="about">
  <h2 style="font-family:'Playfair Display'; color:var(--accent); font-size:36px; font-style:italic;">Enis Boutique</h2>
  <p style="margin-top:20px; opacity:0.7; font-size:14px; line-height:1.8;">Established in 2022. Curating the finest pieces to make you feel as beautiful as you truly are.</p>
  <div class="social-btn-grid">
    <a href="tel:+233546527892" class="soc-link"><i class="fas fa-phone-alt"></i> Call</a>
    <a href="mailto:Sheilaenima@gmail.com" class="soc-link"><i class="far fa-envelope"></i> Email</a>
    <a href="https://wa.me/233546527892" class="soc-link"><i class="fab fa-whatsapp"></i> WhatsApp</a>
    <a href="https://www.tiktok.com/@eniscollection1" class="soc-link"><i class="fab fa-tiktok"></i> TikTok</a>
  </div>
</div>

<script>
const DB = [
  {id:1, name:"Thick Seamless Dress", price:50, cat:"THRIFT", tag:"Thrift Premium", img:"images/item1.jpg"},
  {id:2, name:"Plaited Skirts & Top", price:50, cat:"THRIFT", tag:"Thrift Premium", img:"images/item2.jpg"},
  {id:3, name:"Short Length Essential", price:45, cat:"THRIFT", tag:"Daily Luxe", img:"images/item3.jpg"},
  {id:4, name:"Church & Work Gown", price:50, cat:"STORE", tag:"Boutique Store", img:"images/item4.jpg"},
  {id:5, name:"Dinner Party Elegance", price:45, cat:"STORE", tag:"Special Edition", img:"images/item5.jpg"},
  {id:6, name:"Lecture & Beach Set", price:45, cat:"STORE", tag:"Boutique Store", img:"images/item6.jpg"},
  {id:7, name:"Handmade Silk Wrap", price:65, cat:"HANDMADE", tag:"Custom Piece", img:"images/item7.jpg"},
  {id:8, name:"Ruched SHEIN Special", price:50, cat:"THRIFT", tag:"Thrift Find", img:"images/item8.jpg"},
  {id:9, name:"Ultimate Work Gown", price:50, cat:"THRIFT", tag:"Professional", img:"images/item9.jpg"},
  {id:10, name:"Refined Church Wear", price:50, cat:"STORE", tag:"Boutique Store", img:"images/item10.jpg"}
];

let state = { wish: [], cart: [] };

function updateUI() {
  document.getElementById('count-wish').innerText = state.wish.length;
  document.getElementById('count-cart').innerText = state.cart.length;
  renderGrid();
}

function renderGrid(filter = 'ALL') {
  const g = document.getElementById('main-grid');
  const data = filter === 'ALL' ? DB : DB.filter(p => p.cat === filter);
  g.innerHTML = data.map(p => `
    <div class="card">
      <div class="card-img-box">
        <img src="${p.img}" loading="lazy">
        <div class="price-tag">₵${p.price}</div>
        <div class="card-btns">
          <button class="btn-round ${state.wish.includes(p.id)?'active-heart':''}" onclick="toggleItem('wish', ${p.id})"><i class="fas fa-heart"></i></button>
          <button class="btn-round ${state.cart.includes(p.id)?'active-cart':''}" onclick="toggleItem('cart', ${p.id})"><i class="fas fa-shopping-bag"></i></button>
        </div>
      </div>
      <div class="card-meta">
        <span class="p-tag">${p.tag}</span>
        <h4 class="p-name">${p.name}</h4>
      </div>
    </div>
  `).join('');
}

function toggleItem(key, id) {
  const i = state[key].indexOf(id);
  if(i > -1) state[key].splice(i,1); else state[key].push(id);
  updateUI();
}

function filterData(c, el) {
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderGrid(c);
}

function toggleDrawer(type) {
  const d = document.getElementById('drawer');
  const list = document.getElementById('drawer-list');
  const area = document.getElementById('checkout-area');
  
  if(!type) { d.classList.remove('open'); return; }
  
  d.classList.add('open');
  document.getElementById('drawer-title').innerText = type === 'wish' ? 'Wishlist' : 'Shopping Bag';
  
  const items = state[type].map(id => DB.find(x => x.id === id));
  
  list.innerHTML = items.length ? items.map(p => `
    <div style="display:flex; align-items:center; gap:20px; margin-bottom:20px; border-bottom:1px solid #f0f0f0; padding-bottom:15px;">
      <img src="${p.img}" style="width:70px; height:70px; border-radius:15px; object-fit:cover;">
      <div style="flex:1">
        <h5 style="font-size:14px; margin-bottom:4px;">${p.name}</h5>
        <b style="color:var(--gold)">₵${p.price}</b>
      </div>
      <i class="fas fa-trash" style="color:#ddd; font-size:14px;" onclick="toggleItem('${type}', ${p.id}); toggleDrawer('${type}')"></i>
    </div>
  `).join('') : '<p style="text-align:center; padding:40px; color:#aaa;">Your list is currently empty.</p>';

  if(type === 'cart' && items.length > 0) {
    const total = items.reduce((s, p) => s + p.price, 0);
    area.innerHTML = `
      <div style="display:flex; justify-content:space-between; margin:20px 0; font-weight:700; font-size:18px;"><span>Total</span><span>₵${total}</span></div>
      <button class="checkout-btn" onclick="sendWhatsApp()">Confirm & Order via WhatsApp</button>
    `;
  } else { area.innerHTML = ''; }
}

function sendWhatsApp() {
  const items = state.cart.map(id => DB.find(x => x.id === id));
  const listStr = items.map(p => `- ${p.name} (₵${p.price})`).join('%0A');
  const total = items.reduce((s, p) => s + p.price, 0);
  const msg = `Hello Enis Collection! I would like to order:%0A%0A${listStr}%0A%0ATotal: ₵${total}%0A%0APlease let me know the next steps.`;
  window.open(`https://wa.me/233546527892?text=${msg}`);
}

renderGrid();
</script>
</body>
</html>
