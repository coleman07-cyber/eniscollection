<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>ENIS COLLECTION</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000;
            --card-bg: #111;
            --text-main: #FFF;
            --text-soft: #A1A1A6;
            --accent-gold: #D4AF37; 
            --accent-orange: #FF8C00;
            --orange-glow: 0 0 20px rgba(255, 140, 0, 0.5);
            --gold-gradient: linear-gradient(135deg, #D4AF37 0%, #F4D03F 100%);
            --border: rgba(255, 255, 255, 0.1);
            --accent-green: #25D366;
            --ease-fluid: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, "SF Pro Display", sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: #000; height: 100vh; overflow: hidden; position: fixed; width: 100%; color: var(--text-main); }

        .app-shell {
            width: 100%; max-width: 420px; height: 100vh; margin: 0 auto;
            background: var(--bg); position: relative; display: flex; flex-direction: column;
        }

        /* MODERN CENTERED SPLASH SCREEN */
        #splash-screen {
            position: absolute; inset: 0; z-index: 9999;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)), url('images/Splash-Dress.PNG') center/cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: all 0.6s var(--ease-fluid);
            text-align: center;
        }
        #splash-screen.hidden { opacity: 0; visibility: hidden; transform: scale(1.1); }
        
        .splash-text h1 { font-size: 28px; font-weight: 700; letter-spacing: 4px; margin-bottom: 8px; }
        .splash-text p { font-size: 11px; letter-spacing: 6px; color: var(--accent-gold); margin-bottom: 35px; font-weight: 600; }

        .btn-launch {
            background: var(--accent-orange); color: white; padding: 18px 50px;
            border-radius: 50px; border: none; font-weight: 800; font-size: 13px;
            box-shadow: var(--orange-glow); cursor: pointer; letter-spacing: 2px;
            text-transform: uppercase; transition: 0.3s;
        }
        .btn-launch:active { transform: scale(0.95); opacity: 0.8; }

        /* HEADER & CATALOGUE */
        #shop-content { display: none; flex-direction: column; height: 100%; }
        #shop-content.active { display: flex; }

        header { padding: calc(env(safe-area-inset-top) + 15px) 0 10px; border-bottom: 1px solid var(--border); }
        .logo-box h2 { font-size: 18px; font-weight: 800; text-align: center; text-transform: uppercase; letter-spacing: 4px;}
        .logo-box span { font-size: 8px; color: var(--accent-gold); letter-spacing: 5px; display: block; text-transform: uppercase; text-align: center; margin-top: 4px; font-weight: 700; }

        .catalog-bar { display: flex; gap: 10px; overflow-x: auto; padding: 15px 12px; scrollbar-width: none; }
        .catalog-bar::-webkit-scrollbar { display: none; }
        
        .filter-tag {
            padding: 10px 22px; background: #1a1a1a; border-radius: 15px;
            font-size: 11px; font-weight: 700; color: var(--text-soft); white-space: nowrap; 
            transition: 0.3s; text-transform: uppercase; border: 1px solid var(--border);
        }
        .filter-tag.active { background: #fff; color: #000; border-color: #fff; }

        /* PRODUCT FEED */
        .feed { flex: 1; overflow-y: auto; padding-bottom: 40px; }
        .feed::-webkit-scrollbar { display: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
        
        .product-card { 
            background: var(--card-bg); border-radius: 24px; overflow: hidden;
            border: 1px solid var(--border); transition: 0.3s;
        }
        .p-image-wrap { position: relative; width: 100%; aspect-ratio: 1/1.3; overflow: hidden; }
        .p-image-wrap img { width: 100%; height: 100%; object-fit: cover; }
        
        .floating-tag {
            position: absolute; bottom: 10px; right: 10px; background: var(--gold-gradient); 
            color: #000; padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: 900;
        }

        .p-details { padding: 12px; } 
        .p-name { font-size: 12px; font-weight: 600; line-height: 1.4; color: #fff; }

        /* ABOUT SECTION */
        .about-modern {
            margin: 40px 15px; padding: 40px 20px;
            background: linear-gradient(180deg, #000 0%, #111 100%);
            border-top: 1px solid var(--border); text-align: center;
        }
        .headline { font-size: 20px; font-weight: 800; margin-bottom: 12px; }
        .subtext { font-size: 13px; color: var(--text-soft); line-height: 1.6; margin-bottom: 25px; }
        
        .social-row { display: flex; justify-content: center; gap: 20px; }
        .social-btn { color: #fff; font-size: 20px; transition: 0.2s; }
        .social-btn:active { color: var(--accent-gold); }

        /* INSTANT PREVIEW */
        #item-preview {
            position: fixed; inset: 0; z-index: 10000;
            background: rgba(0,0,0,0.95); display: none;
            align-items: center; justify-content: center; padding: 20px;
        }
        #item-preview.active { display: flex; }
        
        .preview-box { 
            width: 290px; background: #000; border-radius: 35px;
            padding: 10px; border: 1px solid var(--border);
            transform: scale(0.9); transition: 0.2s var(--ease-fluid);
        }
        #item-preview.active .preview-box { transform: scale(1); }
        
        .preview-img-container { border-radius: 28px; overflow: hidden; height: 380px; position: relative; }
        .preview-image { width: 100%; height: 100%; object-fit: cover; }
        .preview-content { padding: 15px 5px; text-align: center; }

        .btn-order {
            background: var(--accent-green); color: white; padding: 15px; border-radius: 18px;
            text-decoration: none; font-weight: 800; display: flex; align-items: center; 
            gap: 10px; font-size: 14px; justify-content: center; margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="app-shell">
    <div id="splash-screen">
        <div class="splash-text">
            <h1>WELCOME TO ENIS COLLECTION</h1>
            <p>PAMPER YOUR BODY</p>
        </div>
        <button class="btn-launch" onclick="launchApp()">DISCOVER COLLECTION</button>
    </div>

    <div id="shop-content">
        <header>
            <div class="logo-box"><h2>Enis Collection</h2><span>Pamper Your Body</span></div>
        </header>
        
        <div class="catalog-bar">
            <div class="filter-tag active" onclick="filterItems('All', this)">All</div>
            <div class="filter-tag" onclick="filterItems('Dress', this)">Dresses</div>
            <div class="filter-tag" onclick="filterItems('Set', this)">Sets</div>
            <div class="filter-tag" onclick="filterItems('Work', this)">Work Wear</div>
        </div>

        <div class="feed" id="mainFeed">
            <div class="grid" id="productGrid"></div>
            
            <div class="about-modern">
                <h3 class="headline">Designed for the <br>Extraordinary Woman.</h3>
                <p class="subtext">Hand-selected luxury silhouettes curated in Ghana. We blend timeless sophistication with the comfort of modern tailoring.</p>
                <div class="social-row">
                    <a href="https://wa.me/233546527892" class="social-btn"><i class="fab fa-whatsapp"></i></a>
                    <a href="https://www.tiktok.com/@eniscollection1" class="social-btn"><i class="fab fa-tiktok"></i></a>
                    <a href="tel:+233546527892" class="social-btn"><i class="fas fa-phone"></i></a>
                </div>
            </div>
        </div>
    </div>

    <div id="item-preview" onclick="closePreview()">
        <div class="preview-box" onclick="event.stopPropagation()">
            <div class="preview-img-container">
                <img id="preview-img" src="" class="preview-image">
                <div id="preview-tag" class="floating-tag"></div>
            </div>
            <div class="preview-content">
                <span id="preview-size" style="font-size: 10px; color: var(--accent-gold); font-weight: 800; text-transform: uppercase;"></span>
                <h2 id="preview-name" style="font-size: 16px; margin: 4px 0 10px;"></h2>
                <a id="wa-btn" href="#" class="btn-order"><i class="fab fa-whatsapp"></i> ORDER NOW</a>
            </div>
        </div>
    </div>
</div>

<script>
    const myProducts = [
        { name: "Thick Seamless Dress", price: 50, size: "10", category: "Dress", image: "images/item1.jpg" },
        { name: "Plaited Skirts & Top", price: 50, size: "8/10", category: "Set", image: "images/item2.jpg" },
        { name: "Short Length Essential", price: 45, size: "8", category: "Dress", image: "images/item3.jpg" },
        { name: "Church & Work Midi", price: 50, size: "8", category: "Work", image: "images/item4.jpg" },
        { name: "Dinner & Party Elegance", price: 45, size: "8/10", category: "Dress", image: "images/item5.jpg" },
        { name: "Lecture & Beach Set", price: 45, size: "6/8/10", category: "Set", image: "images/item6.jpg" },
        { name: "Ruched SHEIN Special", price: 50, size: "8/10", category: "Dress", image: "images/item7.jpg" },
        { name: "Ultimate Work Gown", price: 50, size: "12/14", category: "Work", image: "images/item8.jpg" },
        { name: "Skirt & Basic Top Duo", price: 50, size: "10/12", category: "Set", image: "images/item9.jpg" },
        { name: "Refined Church Wear", price: 50, size: "10", category: "Work", image: "images/item10.jpg" }
    ];

    function renderProducts(filter = 'All') {
        const grid = document.getElementById('productGrid');
        const filtered = filter === 'All' ? myProducts : myProducts.filter(p => p.category === filter);
        grid.innerHTML = filtered.map((item) => `
            <div class="product-card" onclick="openPreview('${item.name.replace(/'/g, "\\'")}', ${item.price}, '${item.image}', '${item.size}')">
                <div class="p-image-wrap">
                    <img src="${item.image}">
                    <div class="floating-tag">₵${item.price}</div>
                </div>
                <div class="p-details">
                    <span style="font-size:9px; color:var(--accent-gold); font-weight:800;">UK SIZE ${item.size}</span>
                    <h3 class="p-name">${item.name}</h3>
                </div>
            </div>`).join('');
    }

    function launchApp() {
        document.getElementById('splash-screen').classList.add('hidden');
        document.getElementById('shop-content').classList.add('active');
        renderProducts();
    }

    // INSTANT PREVIEW: NO DELAYS
    function openPreview(name, price, image, size) {
        const modal = document.getElementById('item-preview');
        
        document.getElementById('preview-img').src = image;
        document.getElementById('preview-name').innerText = name;
        document.getElementById('preview-size').innerText = `UK SIZE ${size}`;
        document.getElementById('preview-tag').innerText = `₵${price}`;
        document.getElementById('wa-btn').href = `https://wa.me/233546527892?text=I want to order: ${name}`;

        modal.style.display = 'flex';
        modal.classList.add('active');
    }

    function closePreview() { 
        const modal = document.getElementById('item-preview');
        modal.classList.remove('active');
        setTimeout(() => modal.style.display = 'none', 200);
    }

    function filterItems(cat, el) {
        document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        renderProducts(cat);
    }
</script>
</body>
</html>
