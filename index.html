<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    
    <title>ENIS COLLECTION</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg: #F2F2F7;
            --card-bg: #FFFFFF;
            --text-main: #1C1C1E;
            --text-soft: #8E8E93;
            --glass: rgba(255, 255, 255, 0.85);
            --border: rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
            --accent-green: #25D366;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --card-bg: #1C1C1E;
                --text-main: #FFFFFF;
                --text-soft: #A1A1A6;
                --glass: rgba(28, 28, 30, 0.95);
                --border: rgba(255, 255, 255, 0.1);
                --shadow: 0 8px 24px rgba(0,0,0,0.4);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: #000; height: 100vh; overflow: hidden; position: fixed; width: 100%; }

        .app-shell {
            width: 100%; max-width: 420px; height: 100vh; margin: 0 auto;
            background: var(--bg); position: relative; overflow: hidden;
        }

        /* FIXED HEADER: Synchronized transition */
        header {
            position: absolute; top: 0; width: 100%;
            padding: calc(env(safe-area-inset-top) + 20px) 20px 20px;
            background: var(--glass); 
            backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
            z-index: 1000; border-bottom: 0.5px solid var(--border);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform;
        }

        .header-hidden { transform: translate3d(0, -100%, 0); }

        .logo-box h2 { font-size: 22px; font-weight: 700; text-align: center; color: var(--text-main); letter-spacing: -0.5px; }
        .logo-box span { font-size: 9px; color: var(--text-soft); letter-spacing: 4px; display: block; text-transform: uppercase; text-align: center; margin-top: 4px; font-weight: 600; }

        .search-bar { position: relative; margin-top: 20px; }
        .search-bar i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-soft); font-size: 14px; }
        .search-bar input {
            width: 100%; padding: 12px 15px 12px 40px; border-radius: 12px; border: none;
            background: rgba(120, 120, 128, 0.12); font-size: 16px; color: var(--text-main); outline: none;
        }

        .feed { 
            height: 100%; overflow-y: scroll; 
            padding: calc(env(safe-area-inset-top) + 180px) 16px calc(env(safe-area-inset-bottom) + 80px); 
            -webkit-overflow-scrolling: touch; 
            scrollbar-width: none;
        }
        .feed::-webkit-scrollbar { display: none; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        
        /* CARD ANIMATION */
        .product-card { 
            background: var(--card-bg); border-radius: 20px; overflow: hidden; 
            box-shadow: var(--shadow); border: 0.5px solid var(--border);
            transition: transform 0.1s ease;
        }
        .product-card:active { transform: scale(0.97); }

        .p-image { width: 100%; aspect-ratio: 3.5/4.5; overflow: hidden; cursor: pointer; background: #8881; }
        .p-image img { width: 100%; height: 100%; object-fit: cover; }
        
        .p-details { padding: 14px 12px; }
        .size-tag { font-size: 10px; color: var(--text-soft); font-weight: 700; text-transform: uppercase; margin-bottom: 6px; display: block; }
        .p-details h3 { font-size: 14px; font-weight: 600; color: var(--text-main); line-height: 1.2; }
        .price { font-size: 16px; font-weight: 700; color: var(--text-main); margin-top: 6px; }

        /* PREVIEW MODAL FIXES */
        #item-preview {
            position: absolute; inset: 0; background: rgba(0,0,0,0.8); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 3000; display: flex; align-items: center; justify-content: center; 
            padding: 24px; opacity: 0; visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s;
        }
        
        #item-preview.active { opacity: 1; visibility: visible; }
        
        .preview-content { 
            width: 100%; max-width: 300px; background: var(--card-bg);
            padding: 20px; border-radius: 30px; text-align: center; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            transform: translate3d(0, 30px, 0);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }
        
        #item-preview.active .preview-content { transform: translate3d(0, 0, 0); }
        
        .preview-image { 
            width: 100%; border-radius: 20px; margin-bottom: 15px; 
            aspect-ratio: 3/4; object-fit: cover; background: #8881;
        }

        .btn-order-whatsapp {
            background: var(--accent-green); color: white; padding: 16px; border-radius: 15px;
            text-decoration: none; font-weight: 700; display: flex; align-items: center; 
            gap: 10px; font-size: 15px; width: 100%; justify-content: center;
        }

        /* SPLASH SCREEN FIX */
        #splash-screen {
            position: absolute; inset: 0; z-index: 4000;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.9)), url('images/Splash-Dress.PNG');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: opacity;
        }
    </style>
</head>
<body>

<div class="app-shell">
    <div id="splash-screen">
        <div style="text-align:center; color:white; margin-bottom:40px;">
            <h1 style="font-weight: 600; letter-spacing: 2px; font-size: 26px;">ENIS COLLECTION</h1>
            <p style="font-size:10px; letter-spacing:5px; opacity: 0.8; margin-top: 10px;">PAMPER YOUR BODY</p>
        </div>
        <button style="background:white; color:black; padding:18px 60px; border-radius:40px; font-weight:800; border:none;" onclick="launchApp()">Enter Shop</button>
    </div>

    <header id="mainHeader">
        <div class="logo-box">
            <h2>Enis Collection</h2>
            <span>Pamper Your Body</span>
        </div>
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="shopSearch" placeholder="Search looks..." onkeyup="filterShop()">
        </div>
    </header>

    <div class="feed" id="mainFeed">
        <div class="grid" id="productGrid"></div>
        
        <div class="about-section" style="margin-top:40px; padding:40px 20px; text-align:center;">
            <p style="color:var(--text-soft); font-size:14px;">Curated for the modern silhouette.</p>
        </div>
    </div>

    <div id="item-preview" onclick="closePreview()">
        <div class="preview-content" onclick="event.stopPropagation()">
            <img id="preview-img" src="" class="preview-image">
            <span id="preview-size" class="size-tag"></span>
            <h2 id="preview-name" style="margin-bottom:15px; font-size: 18px; color: var(--text-main);"></h2>
            <a id="whatsapp-order-btn" href="#" class="btn-order-whatsapp">
                <i class="fab fa-whatsapp"></i> Instant Order
            </a>
            <p style="margin-top:20px; font-size:11px; font-weight:700; color:var(--text-soft); cursor:pointer;" onclick="closePreview()">BACK TO SHOP</p>
        </div>
    </div>
</div>

<script>
    const myProducts = [
        { name: "Thick Seamless Dress", price: 50, size: "10", image: "images/item1.jpg" },
        { name: "Plaited Skirts & Top", price: 50, size: "8/10", image: "images/item2.jpg" },
        { name: "Short Length Essential", price: 45, size: "8", image: "images/item3.jpg" },
        { name: "Church & Work Midi", price: 50, size: "8", image: "images/item4.jpg" },
        { name: "Dinner & Party Elegance", price: 45, size: "8/10", image: "images/item5.jpg" },
        { name: "Lecture & Beach Set", price: 45, size: "6/8/10", image: "images/item6.jpg" },
        { name: "Ruched SHEIN Special", price: 50, size: "8/10", image: "images/item7.jpg" },
        { name: "Ultimate Work Gown", price: 50, size: "12/14", image: "images/item8.jpg" },
        { name: "Skirt & Basic Top Duo", price: 50, size: "10/12", image: "images/item9.jpg" },
        { name: "Refined Church Wear", price: 50, size: "10", image: "images/item10.jpg" }
    ];

    // --- SYNCED SCROLL LOGIC ---
    const header = document.getElementById('mainHeader');
    const feed = document.getElementById('mainFeed');
    let lastScrollY = 0;
    let ticking = false;

    feed.addEventListener('scroll', () => {
        if (!ticking) {
            window.requestAnimationFrame(() => {
                const currentScrollY = feed.scrollTop;
                if (currentScrollY > lastScrollY && currentScrollY > 80) {
                    header.classList.add('header-hidden');
                } else {
                    header.classList.remove('header-hidden');
                }
                lastScrollY = currentScrollY;
                ticking = false;
            });
            ticking = true;
        }
    });

    function renderProducts(products) {
        document.getElementById('productGrid').innerHTML = products.map(item => `
            <div class="product-card" data-title="${item.name.toLowerCase()}">
                <div class="p-image" onclick="openPreview('${item.name.replace(/'/g, "\\'")}', ${item.price}, '${item.image}', '${item.size}')">
                    <img src="${item.image}" onerror="this.src='https://via.placeholder.com/400x520?text=Enis'">
                </div>
                <div class="p-details">
                    <span class="size-tag">UK SIZE ${item.size}</span>
                    <h3>${item.name}</h3>
                    <p class="price">GH₵ ${item.price.toFixed(2)}</p>
                </div>
            </div>
        `).join('');
    }
    renderProducts(myProducts);

    function launchApp() {
        const splash = document.getElementById('splash-screen');
        splash.style.opacity = "0";
        // Wait for transition before hiding
        setTimeout(() => splash.style.display = "none", 600);
    }

    // --- PREVIEW FIX: Reset source before opening ---
    function openPreview(name, price, image, size) {
        const modal = document.getElementById('item-preview');
        const imgElement = document.getElementById('preview-img');
        
        // Hide image while loading new one to prevent glitch
        imgElement.style.opacity = "0";
        imgElement.src = image;
        
        imgElement.onload = () => { imgElement.style.opacity = "1"; };

        document.getElementById('preview-name').innerText = name;
        document.getElementById('preview-size').innerText = `SIZE ${size} • GH₵ ${price}`;
        
        const msg = encodeURIComponent(`Hi Enis! ✨ I'd like to order: ${name} (Size ${size})`);
        document.getElementById('whatsapp-order-btn').href = `https://wa.me/233546527892?text=${msg}`;
        
        modal.classList.add('active');
    }

    function closePreview() { 
        document.getElementById('item-preview').classList.remove('active'); 
    }

    function filterShop() {
        let input = document.getElementById('shopSearch').value.toLowerCase();
        let cards = document.getElementsByClassName('product-card');
        Array.from(cards).forEach(card => {
            card.style.display = card.getAttribute('data-title').includes(input) ? "block" : "none";
        });
    }
</script>

</body>
</html>
