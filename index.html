<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>ENIS COLLECTION</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg: #FDFDFD;
            --card-bg: #FFFFFF;
            --text-main: #121212;
            --text-soft: #8E8E93;
            --accent-gold: #D4AF37; 
            --gold-gradient: linear-gradient(135deg, #D4AF37 0%, #F4D03F 100%);
            --gold-glow: 0 4px 15px rgba(212, 175, 55, 0.4);
            --glass: rgba(255, 255, 255, 0.9);
            --border: rgba(0, 0, 0, 0.05);
            --shadow: 0 10px 40px rgba(0,0,0,0.04);
            --accent-green: #25D366;
            --ease-fluid: cubic-bezier(0.23, 1, 0.32, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000;
                --card-bg: #111;
                --text-main: #FFF;
                --text-soft: #A1A1A6;
                --glass: rgba(10, 10, 10, 0.95);
                --border: rgba(255, 255, 255, 0.08);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, "SF Pro Display", sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: #000; height: 100vh; overflow: hidden; position: fixed; width: 100%; }

        .app-shell {
            width: 100%; max-width: 420px; height: 100vh; margin: 0 auto;
            background: var(--bg); position: relative; display: flex; flex-direction: column;
        }

        #splash-screen {
            position: absolute; inset: 0; z-index: 9999;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.8)), url('images/Splash-Dress.PNG') center/cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: all 0.8s var(--ease-fluid);
        }
        #splash-screen.hidden { opacity: 0; visibility: hidden; transform: scale(1.1); }
        
        .btn-launch {
            background: var(--gold-gradient); color: #000; padding: 18px 50px;
            border-radius: 40px; border: none; font-weight: 800; font-size: 12px;
            box-shadow: var(--gold-glow); cursor: pointer;
        }

        #shop-content { display: none; flex-direction: column; height: 100%; }
        #shop-content.active { display: flex; animation: fadeIn 0.8s var(--ease-fluid); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* PERFECTED HEADER */
        header {
            padding: calc(env(safe-area-inset-top) + 15px) 0 10px;
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid var(--border); z-index: 100;
        }

        .logo-box h2 { font-size: 18px; font-weight: 800; text-align: center; color: var(--text-main); text-transform: uppercase; letter-spacing: 3px;}
        .logo-box span { 
            font-size: 7px; background: var(--gold-gradient); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; letter-spacing: 5px; display: block; 
            text-transform: uppercase; text-align: center; margin-top: 5px; font-weight: 800; 
        }

        .catalog-bar { 
            display: flex; gap: 8px; overflow-x: auto; padding: 15px 16px 5px; width: 100%;
            scrollbar-width: none; -ms-overflow-style: none; justify-content: space-between;
        }
        .catalog-bar::-webkit-scrollbar { display: none; }
        
        .filter-tag {
            padding: 8px 14px; background: rgba(120, 120, 128, 0.08); border-radius: 40px;
            font-size: 9px; font-weight: 700; color: var(--text-soft); white-space: nowrap; 
            transition: 0.3s var(--ease-fluid); text-transform: uppercase; letter-spacing: 0.5px;
            flex-shrink: 0;
        }
        
        .filter-tag.active { 
            background: var(--gold-gradient); color: #000; 
            transform: scale(1.02); box-shadow: 0 4px 10px rgba(212, 175, 55, 0.2);
        }

        .feed { flex: 1; overflow-y: auto; padding: 20px 16px 60px; }
        .feed::-webkit-scrollbar { display: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        
        .product-card { 
            background: var(--card-bg); border-radius: 20px; overflow: hidden; 
            box-shadow: var(--shadow); border: 0.5px solid var(--border);
            opacity: 0; transform: translateY(30px) scale(0.95); 
            transition: all 0.7s var(--ease-fluid);
        }
        .product-card.visible { opacity: 1; transform: translateY(0) scale(1); }

        .p-image-wrap { position: relative; width: 100%; aspect-ratio: 1/1.3; overflow: hidden; }
        .p-image-wrap img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s var(--ease-fluid); }
        
        .floating-tag {
            position: absolute; bottom: 10px; right: 10px; background: var(--gold-gradient); 
            color: #000; padding: 4px 12px; border-radius: 10px; font-size: 11px;
            font-weight: 900; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: var(--gold-glow); z-index: 2;
        }

        .p-details { padding: 12px 10px; }
        .p-name { font-size: 12px; font-weight: 600; color: var(--text-main); line-height: 1.3; }

        /* PREVIEW FIX */
        #item-preview {
            position: fixed; inset: 0; z-index: 10000;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: none; align-items: center; justify-content: center; padding: 20px;
            opacity: 0; transition: opacity 0.4s ease;
        }
        #item-preview.active { display: flex; opacity: 1; }

        .preview-box { 
            width: 100%; max-width: 340px; background: var(--card-bg); 
            padding: 10px; border-radius: 30px;
            transform: scale(0.9) translateY(20px); transition: all 0.4s var(--ease-fluid);
        }
        #item-preview.active .preview-box { transform: scale(1) translateY(0); }

        .preview-img-container { width: 100%; border-radius: 22px; overflow: hidden; background: #000; position: relative; aspect-ratio: 1/1.2; }
        
        .preview-image { 
            width: 100%; height: 100%; display: block; object-fit: cover; 
            transition: opacity 0.5s ease; opacity: 1;
        }
        
        .btn-order {
            background: var(--accent-green); color: white; padding: 14px; border-radius: 18px;
            text-decoration: none; font-weight: 700; display: flex; align-items: center; 
            gap: 10px; font-size: 14px; justify-content: center; margin-top: 15px;
        }

        .about-modern {
            margin-top: 60px; padding: 60px 20px 40px;
            background: var(--card-bg); border-radius: 40px 40px 0 0;
            border-top: 1px solid var(--border); text-align: center;
        }
        .about-modern h3 { font-size: 10px; letter-spacing: 4px; color: var(--accent-gold); text-transform: uppercase; margin-bottom: 10px; }
        .social-row { display: flex; justify-content: center; gap: 15px; margin: 25px 0; }
        .social-btn {
            width: 48px; height: 48px; border-radius: 16px;
            background: var(--bg); display: flex; align-items: center; justify-content: center;
            color: var(--text-main); text-decoration: none; border: 0.5px solid var(--border);
            transition: 0.4s var(--ease-fluid); font-size: 18px;
        }
    </style>
</head>
<body>

<div class="app-shell">
    <div id="splash-screen">
        <div style="text-align:center; color:white; margin-bottom:40px;">
            <h1 style="font-weight: 800; font-size: 24px; letter-spacing: 2px;">ENIS COLLECTION</h1>
            <p style="font-size:8px; letter-spacing:6px; color: var(--accent-gold); margin-top: 10px; font-weight: 800;">PAMPER YOUR BODY</p>
        </div>
        <button class="btn-launch" onclick="launchApp()">ENTER SHOP</button>
    </div>

    <div id="shop-content">
        <header>
            <div class="logo-box">
                <h2>Enis Collection</h2>
                <span>Pamper Your Body</span>
            </div>
            <div class="catalog-bar">
                <div class="filter-tag active" onclick="filterItems('All', this)">All</div>
                <div class="filter-tag" onclick="filterItems('Dress', this)">Dresses</div>
                <div class="filter-tag" onclick="filterItems('Set', this)">Sets</div>
                <div class="filter-tag" onclick="filterItems('Work', this)">Work Wear</div>
            </div>
        </header>

        <div class="feed" id="mainFeed" onscroll="handleScroll()">
            <div class="grid" id="productGrid"></div>
            
            <div class="about-modern">
                <h3>Our Heritage</h3>
                <p style="font-weight: 600; font-size: 15px; margin-top: 10px; color: var(--text-main);">Curating luxury for the modern woman.</p>
                <div class="social-row">
                    <a href="tel:+233546527892" class="social-btn"><i class="fas fa-phone"></i></a>
                    <a href="https://wa.me/233546527892" class="social-btn"><i class="fab fa-whatsapp"></i></a>
                    <a href="https://www.tiktok.com/@eniscollection1" class="social-btn"><i class="fab fa-tiktok"></i></a>
                    <a href="mailto:sheilaenima@gmail.com" class="social-btn"><i class="fas fa-envelope"></i></a>
                </div>
                <p style="font-size: 8px; opacity: 0.5; text-transform: uppercase;">Accra, Ghana • Est. 2024</p>
            </div>
        </div>
    </div>

    <div id="item-preview" onclick="closePreview()">
        <div class="preview-box" id="previewBox" onclick="event.stopPropagation()">
            <div class="preview-img-container">
                <img id="preview-img" src="" class="preview-image" onclick="closePreview()">
                <div id="preview-tag" class="floating-tag"></div>
            </div>
            <div style="padding: 15px 10px;">
                <span id="preview-size" style="font-size: 10px; color: var(--text-soft); font-weight: 800; display: block; margin-bottom: 5px;"></span>
                <h2 id="preview-name" style="font-size: 16px; color: var(--text-main); font-weight: 700;"></h2>
                <a id="wa-btn" href="#" class="btn-order"><i class="fab fa-whatsapp"></i> INSTANT ORDER</a>
            </div>
        </div>
    </div>
</div>

<script>
    const myProducts = [
        { name: "Thick Seamless Dress", price: 50, size: "10", category: "Dress", image: "images/item1.jpg" },
        { name: "Plaited Skirts & Top", price: 50, size: "8/10", category: "Set", image: "images/item2.jpg" },
        { name: "Short Length Essential", price: 45, size: "8", category: "Dress", image: "images/item3.jpg" },
        { name: "Church & Work Midi", price: 50, size: "8", category: "Work", image: "images/item4.jpg" },
        { name: "Dinner & Party Elegance", price: 45, size: "8/10", category: "Dress", image: "images/item5.jpg" },
        { name: "Lecture & Beach Set", price: 45, size: "6/8/10", category: "Set", image: "images/item6.jpg" },
        { name: "Ruched SHEIN Special", price: 50, size: "8/10", category: "Dress", image: "images/item7.jpg" },
        { name: "Ultimate Work Gown", price: 50, size: "12/14", category: "Work", image: "images/item8.jpg" },
        { name: "Skirt & Basic Top Duo", price: 50, size: "10/12", category: "Set", image: "images/item9.jpg" },
        { name: "Refined Church Wear", price: 50, size: "10", category: "Work", image: "images/item10.jpg" }
    ];

    function renderProducts(filter = 'All') {
        const grid = document.getElementById('productGrid');
        const filtered = filter === 'All' ? myProducts : myProducts.filter(p => p.category === filter);
        
        grid.innerHTML = filtered.map((item) => `
            <div class="product-card">
                <div class="p-image-wrap" onclick="openPreview('${item.name.replace(/'/g, "\\'")}', ${item.price}, '${item.image}', '${item.size}')">
                    <img src="${item.image}" onerror="this.src='https://via.placeholder.com/400x520?text=ENIS'">
                    <div class="floating-tag">₵${item.price}</div>
                </div>
                <div class="p-details">
                    <span style="font-size:9px; color:var(--accent-gold); font-weight:800;">UK SIZE ${item.size}</span>
                    <h3 class="p-name">${item.name}</h3>
                </div>
            </div>
        `).join('');
        setTimeout(handleScroll, 50);
    }

    function handleScroll() {
        const cards = document.querySelectorAll('.product-card');
        cards.forEach(card => {
            const cardTop = card.getBoundingClientRect().top;
            if(cardTop < window.innerHeight * 0.95) card.classList.add('visible');
        });
    }

    function launchApp() {
        document.getElementById('splash-screen').classList.add('hidden');
        document.getElementById('shop-content').classList.add('active');
        renderProducts();
    }

    function openPreview(name, price, image, size) {
        const modal = document.getElementById('item-preview');
        const pImg = document.getElementById('preview-img');
        
        pImg.src = image; // Load source immediately
        
        document.getElementById('preview-name').innerText = name;
        document.getElementById('preview-size').innerText = `UK SIZE ${size}`;
        document.getElementById('preview-tag').innerText = `₵${price}`;
        const msg = encodeURIComponent(`Hi Enis! ✨ I'd like to order: ${name} (Size ${size})`);
        document.getElementById('wa-btn').href = `https://wa.me/233546527892?text=${msg}`;
        
        modal.style.display = 'flex';
        setTimeout(() => modal.classList.add('active'), 10);
    }

    function closePreview() { 
        const modal = document.getElementById('item-preview');
        modal.classList.remove('active');
        setTimeout(() => modal.style.display = 'none', 400);
    }

    function filterItems(cat, el) {
        document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        renderProducts(cat);
        document.getElementById('mainFeed').scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>

</body>
</html>
