<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ENIS COLLECTION</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #FDFDFD;
            --card-bg: #FFFFFF;
            --text-main: #121212;
            --text-soft: #8E8E93;
            --accent-gold: #C5A02E;
            --glass: rgba(255, 255, 255, 0.9);
            --border: rgba(0, 0, 0, 0.05);
            --shadow: 0 10px 40px rgba(0,0,0,0.04);
            --accent-green: #25D366;
            --ease-fluid: cubic-bezier(0.23, 1, 0.32, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000; --card-bg: #111; --text-main: #FFF; --text-soft: #A1A1A6;
                --glass: rgba(10, 10, 10, 0.95); --border: rgba(255, 255, 255, 0.08);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, "SF Pro Display", sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; height: 100vh; overflow: hidden; position: fixed; width: 100%; }

        .app-shell { width: 100%; max-width: 420px; height: 100vh; margin: 0 auto; background: var(--bg); position: relative; display: flex; flex-direction: column; }

        /* SPLASH */
        #splash-screen {
            position: absolute; inset: 0; z-index: 9999;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.8)), url('images/Splash-Dress.PNG') center/cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: all 0.8s var(--ease-fluid);
        }
        #splash-screen.hidden { opacity: 0; visibility: hidden; transform: scale(1.1); }

        #shop-content { display: none; flex-direction: column; height: 100%; }
        #shop-content.active { display: flex; animation: fadeIn 0.8s var(--ease-fluid); }

        /* HEADER & SEARCH */
        header {
            padding: calc(env(safe-area-inset-top) + 10px) 20px 10px;
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid var(--border); z-index: 100;
        }
        .search-container {
            height: 0; overflow: hidden; transition: 0.5s var(--ease-fluid); opacity: 0;
        }
        .search-container.visible { height: 50px; opacity: 1; margin-top: 10px; }
        .search-input {
            width: 100%; padding: 10px 15px; border-radius: 12px; border: none;
            background: rgba(120, 120, 128, 0.1); color: var(--text-main); font-size: 14px;
        }

        /* REFRESH SPINNER */
        .refresh-spinner {
            height: 0; display: flex; justify-content: center; align-items: center;
            color: var(--accent-gold); overflow: hidden; transition: 0.3s;
        }
        .refresh-spinner i { animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* FEED */
        .feed { flex: 1; overflow-y: auto; padding: 0 16px 60px; -webkit-overflow-scrolling: touch; }
        .feed::-webkit-scrollbar { display: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding-top: 15px; }
        
        .product-card { 
            background: var(--card-bg); border-radius: 20px; overflow: hidden; 
            box-shadow: var(--shadow); border: 0.5px solid var(--border);
            opacity: 0; transform: translateY(30px); transition: 0.7s var(--ease-fluid);
        }
        .product-card.visible { opacity: 1; transform: translateY(0); }

        /* FOMO TAGS */
        .fomo-tag {
            position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px); color: var(--accent-gold); font-size: 8px;
            padding: 4px 8px; border-radius: 6px; font-weight: 800; text-transform: uppercase;
        }

        .p-image-wrap { position: relative; aspect-ratio: 1/1.3; overflow: hidden; }
        .p-image-wrap img { width: 100%; height: 100%; object-fit: cover; }
        
        .floating-tag {
            position: absolute; bottom: 10px; right: 10px;
            background: var(--accent-gold); color: #000;
            padding: 4px 10px; border-radius: 10px; font-size: 11px;
            font-weight: 900; box-shadow: 0 4px 10px rgba(197, 160, 46, 0.3);
        }

        /* ABOUT */
        .about-modern {
            margin-top: 60px; padding: 60px 20px; background: var(--card-bg);
            border-radius: 40px 40px 0 0; text-align: center;
        }

        /* PREVIEW */
        #item-preview {
            position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(15px); display: none; align-items: center; justify-content: center;
            opacity: 0; transition: 0.4s var(--ease-fluid);
        }
        #item-preview.active { display: flex; opacity: 1; }
        .preview-box { 
            width: 85%; background: var(--card-bg); padding: 8px; border-radius: 28px;
            transform: scale(0.9); transition: 0.4s var(--ease-fluid);
        }
        #item-preview.active .preview-box { transform: scale(1); }

        .btn-order {
            background: var(--accent-green); color: white; padding: 15px; border-radius: 18px;
            text-decoration: none; font-weight: 700; display: flex; align-items: center; 
            gap: 10px; justify-content: center; margin-top: 15px; transition: 0.2s;
        }
        .btn-order:active { transform: scale(0.94); filter: brightness(1.1); }
    </style>
</head>
<body>

<div class="app-shell">
    <div id="splash-screen">
        <h1 style="color:white; letter-spacing:3px;">ENIS COLLECTION</h1>
        <button style="margin-top:20px; padding:15px 40px; border-radius:30px; border:none; font-weight:800;" onclick="launchApp()">ENTER SHOP</button>
    </div>

    <div id="shop-content">
        <header onclick="toggleSearch()">
            <div class="logo-box">
                <h2>Enis Collection</h2>
                <span>Pamper Your Body</span>
            </div>
            <div id="searchBar" class="search-container">
                <input type="text" class="search-input" placeholder="Search dresses, sets..." onkeyup="handleSearch(this.value)">
            </div>
            <div class="catalog-bar" id="catBar">
                <div class="filter-tag active" onclick="filterItems('All', this)">All</div>
                <div class="filter-tag" onclick="filterItems('Dress', this)">Dresses</div>
                <div class="filter-tag" onclick="filterItems('Set', this)">Sets</div>
                <div class="filter-tag" onclick="filterItems('Work', this)">Work</div>
            </div>
        </header>

        <div class="feed" id="mainFeed" onscroll="handleFeedScroll()">
            <div id="refreshIndicator" class="refresh-spinner"><i class="fas fa-circle-notch"></i></div>
            <div class="grid" id="productGrid"></div>
            
            <div class="about-modern">
                <h3>Our Heritage</h3>
                <div style="display:flex; justify-content:center; gap:20px; margin-top:20px;">
                    <a href="tel:+233546527892" style="color:var(--text-main)"><i class="fas fa-phone"></i></a>
                    <a href="https://wa.me/233546527892" style="color:var(--text-main)"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
        </div>
    </div>

    <div id="item-preview" onclick="closePreview()">
        <div class="preview-box" onclick="event.stopPropagation()">
            <div class="p-image-wrap" style="border-radius:20px;">
                <img id="preview-img" src="">
                <div id="preview-tag" class="floating-tag"></div>
            </div>
            <div style="padding:15px 10px;">
                <h2 id="preview-name" style="font-size:18px; color:var(--text-main);"></h2>
                <a id="wa-btn" href="#" class="btn-order"><i class="fab fa-whatsapp"></i> INSTANT ORDER</a>
            </div>
        </div>
    </div>
</div>

<script>
    const myProducts = [
        { name: "Thick Seamless Dress", price: 50, size: "10", category: "Dress", image: "images/item1.jpg", status: "Limited Stock" },
        { name: "Plaited Skirts & Top", price: 50, size: "8/10", category: "Set", image: "images/item2.jpg", status: "" },
        { name: "Short Length Essential", price: 45, size: "8", category: "Dress", image: "images/item3.jpg", status: "New Arrival" },
        { name: "Church & Work Midi", price: 50, size: "8", category: "Work", image: "images/item4.jpg", status: "" },
        { name: "Dinner & Party Elegance", price: 45, size: "8/10", category: "Dress", image: "images/item5.jpg", status: "Selling Fast" },
        { name: "Lecture & Beach Set", price: 45, size: "6/8/10", category: "Set", image: "images/item6.jpg", status: "" },
        { name: "Ruched SHEIN Special", price: 50, size: "8/10", category: "Dress", image: "images/item7.jpg", status: "Limited" },
        { name: "Ultimate Work Gown", price: 50, size: "12/14", category: "Work", image: "images/item8.jpg", status: "" },
        { name: "Skirt & Basic Top Duo", price: 50, size: "10/12", category: "Set", image: "images/item9.jpg", status: "New" },
        { name: "Refined Church Wear", price: 50, size: "10", category: "Work", image: "images/item10.jpg", status: "" }
    ];

    function renderProducts(data = myProducts) {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = data.map(item => `
            <div class="product-card">
                <div class="p-image-wrap" onclick="openPreview('${item.name}', ${item.price}, '${item.image}', '${item.size}')">
                    ${item.status ? `<div class="fomo-tag">${item.status}</div>` : ''}
                    <img src="${item.image}" onerror="this.src='https://via.placeholder.com/400x520?text=ENIS'">
                    <div class="floating-tag">₵${item.price}</div>
                </div>
                <div style="padding:10px">
                    <p style="font-size:10px; color:var(--accent-gold); font-weight:800;">UK ${item.size}</p>
                    <p style="font-size:12px; font-weight:600; color:var(--text-main);">${item.name}</p>
                </div>
            </div>
        `).join('');
        setTimeout(revealCards, 100);
    }

    function revealCards() {
        document.querySelectorAll('.product-card').forEach((c, i) => {
            setTimeout(() => c.classList.add('visible'), i * 50);
        });
    }

    function handleFeedScroll() {
        const feed = document.getElementById('mainFeed');
        const spinner = document.getElementById('refreshIndicator');
        if (feed.scrollTop < -10) {
            spinner.style.height = "50px";
            spinner.querySelector('i').style.display = "block";
            setTimeout(() => location.reload(), 1000);
        }
        revealCards();
    }

    function toggleSearch() {
        document.getElementById('searchBar').classList.toggle('visible');
    }

    function handleSearch(val) {
        const filtered = myProducts.filter(p => p.name.toLowerCase().includes(val.toLowerCase()));
        renderProducts(filtered);
    }

    function launchApp() {
        document.getElementById('splash-screen').classList.add('hidden');
        document.getElementById('shop-content').classList.add('active');
        renderProducts();
    }

    function openPreview(name, price, image, size) {
        const modal = document.getElementById('item-preview');
        document.getElementById('preview-img').src = image;
        document.getElementById('preview-name').innerText = name;
        document.getElementById('preview-tag').innerText = `₵${price}`;
        const msg = encodeURIComponent(`Hi Enis! ✨ I'd like to order: ${name} (Size ${size})`);
        document.getElementById('wa-btn').href = `https://wa.me/233546527892?text=${msg}`;
        modal.style.display = 'flex';
        setTimeout(() => modal.classList.add('active'), 10);
    }

    function closePreview() {
        const modal = document.getElementById('item-preview');
        modal.classList.remove('active');
        setTimeout(() => modal.style.display = 'none', 400);
    }

    function filterItems(cat, el) {
        document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        const filtered = cat === 'All' ? myProducts : myProducts.filter(p => p.category === cat);
        renderProducts(filtered);
    }
</script>
</body>
</html>
