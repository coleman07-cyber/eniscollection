<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>ENIS COLLECTION</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            /* LIGHT MODE: SILK NUDE */
            --bg: #F9F5F2;
            --card-bg: #FFFFFF;
            --header-bg: rgba(249, 245, 242, 0.9);
            --text-main: #2D2424;
            --text-soft: #8E7B77;
            --accent-pink: #D4A3A3;
            --border: rgba(212, 163, 163, 0.2);
            --shadow: 0 10px 30px rgba(166, 144, 138, 0.15);
            --tag-bg: #2D2424;
            --tag-text: #FFFFFF;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                /* DARK MODE: MIDNIGHT ROSE */
                --bg: #0F0E0E;
                --card-bg: #1A1818;
                --header-bg: rgba(15, 14, 14, 0.9);
                --text-main: #F2EBE9;
                --text-soft: #A6908A;
                --accent-pink: #E2B4B4; /* Brighter pink for dark backgrounds */
                --border: rgba(255, 255, 255, 0.08);
                --shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
                --tag-bg: #E2B4B4;
                --tag-text: #0F0E0E;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, "SF Pro Display", sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: var(--text-main); height: 100vh; overflow: hidden; position: fixed; width: 100%; transition: background 0.3s ease; }

        .app-shell {
            width: 100%; max-width: 420px; height: 100vh; margin: 0 auto;
            background: var(--bg); position: relative; display: flex; flex-direction: column;
        }

        /* SPLASH SCREEN */
        #splash-screen {
            position: absolute; inset: 0; z-index: 9999;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.8)), url('images/Splash-Dress.PNG') center/cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }
        #splash-screen.hidden { opacity: 0; visibility: hidden; transform: scale(1.1); }

        #shop-content { display: none; flex-direction: column; height: 100%; }
        #shop-content.active { display: flex; animation: fadeIn 0.6s ease-out; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        header {
            padding: calc(env(safe-area-inset-top) + 15px) 20px 10px;
            background: var(--header-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); z-index: 100;
        }

        .logo-box h2 { font-size: 19px; font-weight: 700; text-align: center; color: var(--text-main); text-transform: uppercase; letter-spacing: 4px;}
        .logo-box span { font-size: 8px; color: var(--accent-pink); letter-spacing: 6px; display: block; text-transform: uppercase; text-align: center; margin-top: 5px; font-weight: 600; }

        .catalog-bar { 
            display: flex; gap: 10px; overflow-x: auto; padding: 15px 0 5px; 
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .catalog-bar::-webkit-scrollbar { display: none; }
        
        .filter-tag {
            padding: 8px 18px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 40px;
            font-size: 10px; font-weight: 700; color: var(--text-soft); white-space: nowrap; 
            transition: 0.3s ease; text-transform: uppercase; letter-spacing: 1px;
        }
        .filter-tag.active { background: var(--accent-pink); color: #FFF; border-color: var(--accent-pink); }

        .feed { 
            flex: 1; overflow-y: auto; overflow-x: hidden;
            padding: 20px 16px 60px; -webkit-overflow-scrolling: touch; 
        }
        .feed::-webkit-scrollbar { display: none; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        
        .product-card { 
            background: var(--card-bg); border-radius: 24px; overflow: hidden; 
            box-shadow: var(--shadow); border: 1px solid var(--border);
            opacity: 0; transform: translateY(20px); transition: all 0.6s ease-out;
        }
        .product-card.visible { opacity: 1; transform: translateY(0); }

        .p-image-wrap { position: relative; width: 100%; aspect-ratio: 1/1.3; overflow: hidden; }
        .p-image-wrap img { width: 100%; height: 100%; object-fit: cover; }
        
        .floating-tag {
            position: absolute; bottom: 12px; right: 12px;
            background: var(--tag-bg); color: var(--tag-text);
            padding: 5px 12px; border-radius: 12px; font-size: 11px;
            font-weight: 800; z-index: 2;
        }

        .p-details { padding: 14px 12px; }
        .p-name { font-size: 12px; font-weight: 600; color: var(--text-main); line-height: 1.4; }
        .p-size-tag { font-size: 9px; color: var(--accent-pink); font-weight: 800; text-transform: uppercase; margin-bottom: 4px; display: block; }

        .about-modern {
            margin-top: 60px; padding: 60px 24px;
            background: var(--card-bg); border-radius: 40px 40px 0 0;
            border-top: 1px solid var(--border); text-align: center;
        }
        
        .social-btn {
            width: 50px; height: 50px; border-radius: 50%;
            background: var(--bg); display: flex; align-items: center; justify-content: center;
            color: var(--accent-pink); border: 1px solid var(--border);
            transition: 0.3s; font-size: 20px; text-decoration: none;
        }

        /* PREVIEW MODAL */
        #item-preview {
            position: fixed; inset: 0; z-index: 10000;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center; padding: 25px;
            opacity: 0; transition: opacity 0.4s ease;
        }
        #item-preview.active { display: flex; opacity: 1; }

        .preview-box { 
            width: 100%; max-width: 350px; background: var(--card-bg); 
            padding: 10px; border-radius: 32px; border: 1px solid var(--border);
            transform: translateY(20px); transition: 0.4s ease;
        }
        #item-preview.active .preview-box { transform: translateY(0); }

        .btn-order {
            background: #25D366; color: white; padding: 16px; border-radius: 20px;
            text-decoration: none; font-weight: 700; display: flex; align-items: center; 
            gap: 12px; font-size: 14px; justify-content: center; margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="app-shell">
    <div id="splash-screen">
        <div style="text-align:center; color:white; margin-bottom:40px;">
            <h1 style="font-weight: 700; font-size: 26px; letter-spacing: 5px;">ENIS</h1>
            <p style="font-size:9px; letter-spacing:8px; color: #D4A3A3; margin-top: 10px; font-weight:600;">PAMPER YOUR BODY</p>
        </div>
        <button style="background:#fff; color:#000; padding:20px 60px; border-radius:40px; border:none; font-weight:700; font-size:12px; letter-spacing:2px;" onclick="launchApp()">SHOP COLLECTION</button>
    </div>

    <div id="shop-content">
        <header>
            <div class="logo-box">
                <h2>Enis Collection</h2>
                <span>Pamper Your Body</span>
            </div>
            <div class="catalog-bar">
                <div class="filter-tag active" onclick="filterItems('All', this)">All Items</div>
                <div class="filter-tag" onclick="filterItems('Dress', this)">Dresses</div>
                <div class="filter-tag" onclick="filterItems('Set', this)">Sets</div>
                <div class="filter-tag" onclick="filterItems('Work', this)">Work Wear</div>
            </div>
        </header>

        <div class="feed" id="mainFeed" onscroll="handleScroll()">
            <div class="grid" id="productGrid"></div>
            
            <div class="about-modern">
                <h3 style="font-size: 11px; letter-spacing: 3px; color: var(--accent-pink); text-transform: uppercase;">The Enis Story</h3>
                <p style="font-weight: 600; font-size: 17px; margin-top: 10px;">Elegance in every thread.</p>
                
                <div style="display:flex; justify-content:center; gap:15px; margin: 30px 0;">
                    <a href="tel:+233546527892" class="social-btn"><i class="fas fa-phone"></i></a>
                    <a href="https://wa.me/233546527892" class="social-btn"><i class="fab fa-whatsapp"></i></a>
                    <a href="https://www.tiktok.com/@eniscollection1" class="social-btn"><i class="fab fa-tiktok"></i></a>
                </div>
                <p style="font-size: 8px; letter-spacing: 5px; color: var(--text-soft); text-transform: uppercase;">Accra • Established 2024</p>
            </div>
        </div>
    </div>

    <div id="item-preview" onclick="closePreview()">
        <div class="preview-box" onclick="event.stopPropagation()">
            <div style="border-radius: 22px; overflow: hidden;">
                <img id="preview-img" src="" style="width:100%; display:block;">
            </div>
            <div style="padding: 20px 10px;">
                <span id="preview-tag" style="font-size: 18px; font-weight: 800; display: block; margin-bottom: 5px;"></span>
                <h2 id="preview-name" style="font-size: 15px; color: var(--text-soft); font-weight: 500;"></h2>
                <a id="wa-btn" href="#" class="btn-order"><i class="fab fa-whatsapp"></i> ORDER VIA WHATSAPP</a>
            </div>
        </div>
    </div>
</div>

<script>
    const myProducts = [
        { name: "Thick Seamless Dress", price: 50, size: "10", category: "Dress", image: "images/item1.jpg" },
        { name: "Plaited Skirts & Top", price: 50, size: "8/10", category: "Set", image: "images/item2.jpg" },
        { name: "Short Length Essential", price: 45, size: "8", category: "Dress", image: "images/item3.jpg" },
        { name: "Church & Work Midi", price: 50, size: "8", category: "Work", image: "images/item4.jpg" },
        { name: "Dinner & Party Elegance", price: 45, size: "8/10", category: "Dress", image: "images/item5.jpg" },
        { name: "Lecture & Beach Set", price: 45, size: "6/8/10", category: "Set", image: "images/item6.jpg" },
        { name: "Ruched SHEIN Special", price: 50, size: "8/10", category: "Dress", image: "images/item7.jpg" },
        { name: "Ultimate Work Gown", price: 50, size: "12/14", category: "Work", image: "images/item8.jpg" },
        { name: "Skirt & Basic Top Duo", price: 50, size: "10/12", category: "Set", image: "images/item9.jpg" },
        { name: "Refined Church Wear", price: 50, size: "10", category: "Work", image: "images/item10.jpg" }
    ];

    function renderProducts(filter = 'All') {
        const grid = document.getElementById('productGrid');
        const filtered = filter === 'All' ? myProducts : myProducts.filter(p => p.category === filter);
        
        grid.innerHTML = filtered.map(item => `
            <div class="product-card">
                <div class="p-image-wrap" onclick="openPreview('${item.name.replace(/'/g, "\\'")}', ${item.price}, '${item.image}', '${item.size}')">
                    <img src="${item.image}" onerror="this.src='https://via.placeholder.com/400x520?text=ENIS'">
                    <div class="floating-tag">₵${item.price}</div>
                </div>
                <div class="p-details">
                    <span class="p-size-tag">UK SIZE ${item.size}</span>
                    <h3 class="p-name">${item.name}</h3>
                </div>
            </div>
        `).join('');
        setTimeout(handleScroll, 100);
    }

    function handleScroll() {
        document.querySelectorAll('.product-card').forEach(card => {
            if(card.getBoundingClientRect().top < window.innerHeight * 0.95) card.classList.add('visible');
        });
    }

    function launchApp() {
        document.getElementById('splash-screen').classList.add('hidden');
        document.getElementById('shop-content').classList.add('active');
        renderProducts();
    }

    function openPreview(name, price, image, size) {
        const modal = document.getElementById('item-preview');
        document.getElementById('preview-img').src = image;
        document.getElementById('preview-name').innerText = name;
        document.getElementById('preview-tag').innerText = `₵${price}`;
        const msg = encodeURIComponent(`Hi Enis! ✨ I'd like to order: ${name} (Size ${size})`);
        document.getElementById('wa-btn').href = `https://wa.me/233546527892?text=${msg}`;
        modal.style.display = 'flex';
        setTimeout(() => modal.classList.add('active'), 10);
    }

    function closePreview() { 
        const modal = document.getElementById('item-preview');
        modal.classList.remove('active');
        setTimeout(() => modal.style.display = 'none', 400);
    }

    function filterItems(cat, el) {
        document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        renderProducts(cat);
        document.getElementById('mainFeed').scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>

</body>
</html>
