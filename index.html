<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>ENIS COLLECTION</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,400&family=Outfit:wght@300;500;700&display=swap"/>
<style>
:root {
  --bg: #FDFCFB; 
  --text: #1A1614;
  --accent: #D4AF37; /* Sophisticated Gold */
  --dark: #252220;
  --white: #FFFFFF;
}

/* ── UI FIXES ── */
* { 
  margin:0; padding:0; box-sizing:border-box; 
  -webkit-tap-highlight-color:transparent; 
  touch-action: pan-y; 
}
body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

/* ── CENTERED SPLASH ── */
#splash {
  position: fixed; inset: 0; z-index: 3000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #12100E;
  transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1);
}
#splash.hide { transform: translateY(-100%); }
.splash-content { text-align: center; color: white; }
.splash-logo { font-family: 'Playfair Display', serif; font-size: 38px; margin-bottom: 20px; }

/* ── HEADER & NAVIGATION ── */
.hdr { position: sticky; top: 0; z-index: 100; background: rgba(253, 252, 251, 0.9); backdrop-filter: blur(10px); padding: 15px 20px; text-align: center; }
.brand-name { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 600; }
.brand-tag { font-family: 'Montserrat', sans-serif; text-transform: uppercase; font-size: 8px; letter-spacing: 4px; color: var(--accent); display: block; margin-top: 4px; }

/* ── CATEGORIES ── */
.cat-section { padding: 10px 20px; }
.cat-pills { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
.cat-pill { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; min-width: 60px; }
.cat-circle { width: 54px; height: 54px; border-radius: 50%; background: var(--white); display: flex; align-items: center; justify-content: center; border: 1px solid #eee; transition: 0.3s; color: #555; }
.cat-pill.active .cat-circle { background: var(--dark); color: var(--white); border-color: var(--dark); }
.cat-lbl { font-size: 9px; font-weight: 600; text-transform: uppercase; color: #999; }

/* ── PRODUCT GRID ── */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 10px 20px 40px; }
.card-img-box { position: relative; aspect-ratio: 0.8; border-radius: 24px; overflow: hidden; background: #f9f9f9; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
.card-img-box img { width: 100%; height: 100%; object-fit: cover; }
.modern-price { position: absolute; bottom: 10px; left: 10px; background: rgba(255,255,255,0.95); color: var(--dark); padding: 5px 10px; border-radius: 10px; font-weight: 700; font-size: 11px; }

/* ACTION ICONS ON IMAGE */
.action-overlay { position: absolute; top: 10px; right: 10px; display: flex; flex-direction: column; gap: 6px; }
.icon-btn { width: 32px; height: 32px; border-radius: 50%; border: none; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; font-size: 13px; color: #333; }
.icon-btn.active-cart { background: var(--accent); color: white; }

/* ── FLOATING UI (TIGHT GAP & AUTO-HIDE) ── */
.float-bar { 
  position: fixed; bottom: 25px; right: 20px; z-index: 1000; 
  display: flex; flex-direction: column; 
  gap: 8px; /* Tight gap */
  transition: 0.3s ease; 
}
.float-bar.hidden { opacity: 0; transform: translateY(15px); pointer-events: none; }
.modern-float { width: 46px; height: 46px; background: var(--dark); color: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); position: relative; }
.m-badge { position: absolute; top: -2px; right: -2px; background: var(--accent); color: var(--dark); font-size: 9px; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; border: 1px solid var(--dark); }

/* ── COMPACT DRAWER ITEMS ── */
.drawer { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; display: none; align-items: flex-end; }
.drawer.open { display: flex; }
.drawer-content { width: 100%; background: var(--white); border-radius: 30px 30px 0 0; padding: 25px; max-height: 65vh; overflow-y: auto; }
.small-item { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; }
.small-item img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }
.small-item b { font-size: 13px; }

/* ── ABOUT SECTION ── */
.about-section { background: var(--dark); color: white; padding: 50px 20px 100px; border-radius: 35px 35px 0 0; text-align: center; }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-content">
    <h1 class="splash-logo">Enis Collection</h1>
    <button onclick="document.getElementById('splash').classList.add('hide')" style="background:var(--accent); border:none; color:var(--dark); padding:12px 35px; border-radius:50px; font-weight:700; text-transform:uppercase; font-size:10px; letter-spacing:1px;">Enter Shop</button>
  </div>
</div>

<div class="hdr">
  <h1 class="brand-name">Enis Collection</h1>
  <span class="brand-tag">Pamper your body</span>
</div>

<div class="cat-section">
  <div class="cat-pills">
    <div class="cat-pill active" onclick="filterCat('ALL', this)"><div class="cat-circle"><i class="fa-solid fa-grip"></i></div><span class="cat-lbl">All</span></div>
    <div class="cat-pill" onclick="filterCat('THRIFT', this)"><div class="cat-circle"><i class="fa-solid fa-leaf"></i></div><span class="cat-lbl">Thrift</span></div>
    <div class="cat-pill" onclick="filterCat('STORE', this)"><div class="cat-circle"><i class="fa-solid fa-bag-shopping"></i></div><span class="cat-lbl">Store</span></div>
  </div>
</div>

<div class="grid" id="main-grid"></div>

<div class="float-bar" id="floatingBar">
  <div class="modern-float" onclick="openDrawer('wish')"><i class="fa-regular fa-heart"></i><span class="m-badge" id="w-badge">0</span></div>
  <div class="modern-float" onclick="openDrawer('cart')"><i class="fa-solid fa-cart-shopping"></i><span class="m-badge" id="c-badge">0</span></div>
</div>

<div class="about-section">
  <h3 style="font-family:'Playfair Display'; font-size:24px; color:var(--accent);">Enis Boutique</h3>
  <p style="margin:15px 0; font-size:12px; opacity:0.6;">Elegance for every occasion.</p>
</div>

<div id="drawer" class="drawer" onclick="this.classList.remove('open')">
  <div class="drawer-content" onclick="event.stopPropagation()">
    <h2 id="d-title" style="font-family:'Playfair Display'; margin-bottom:15px; font-size:18px;"></h2>
    <div id="d-list"></div>
    <button id="checkout-btn" onclick="sendWA()" style="display:none; width:100%; padding:15px; background:var(--dark); color:var(--accent); border-radius:12px; border:none; margin-top:15px; font-weight:700;">Order on WhatsApp</button>
  </div>
</div>

<script>
const DB = [
  {id:1, name:"Thick Seamless Dress", price:50, cat:"THRIFT", img:"images/item1.jpg"},
  {id:2, name:"Plaited Skirts & Top", price:50, cat:"THRIFT", img:"images/item2.jpg"},
  {id:3, name:"Short Length Essential", price:45, cat:"THRIFT", img:"images/item3.jpg"},
  {id:4, name:"Church & Work Gown", price:50, cat:"STORE", img:"images/item4.jpg"}
];

let wish = []; let cart = [];
const fBar = document.getElementById('floatingBar');
let timer;

// HIDE ON SCROLL
window.addEventListener('scroll', () => {
  fBar.classList.add('hidden');
  clearTimeout(timer);
  timer = setTimeout(() => fBar.classList.remove('hidden'), 150);
});

function renderGrid(f = 'ALL') {
  const g = document.getElementById('main-grid');
  const items = f === 'ALL' ? DB : DB.filter(x => x.cat === f);
  g.innerHTML = items.map(p => `
    <div class="card">
      <div class="card-img-box">
        <img src="${p.img}">
        <div class="modern-price">₵${p.price}</div>
        <div class="action-overlay">
          <button onclick="toggle('wish', ${p.id})" class="icon-btn"><i class="${wish.includes(p.id)?'fa-solid':'fa-regular'} fa-heart" style="${wish.includes(p.id)?'color:#e74c3c':''}"></i></button>
          <button onclick="toggle('cart', ${p.id})" class="icon-btn ${cart.includes(p.id)?'active-cart':''}"><i class="fa-solid fa-cart-shopping"></i></button>
        </div>
      </div>
      <div style="padding:10px 0"><h4 style="font-size:12px; font-weight:500;">${p.name}</h4></div>
    </div>
  `).join('');
}

function toggle(type, id) {
  let list = type === 'wish' ? wish : cart;
  let idx = list.indexOf(id);
  if(idx > -1) list.splice(idx,1); else list.push(id);
  document.getElementById(type[0]+'-badge').innerText = list.length;
  renderGrid();
}

function openDrawer(type) {
  const d = document.getElementById('drawer');
  const list = type === 'wish' ? wish : cart;
  document.getElementById('d-title').innerText = type === 'wish' ? 'Favorites' : 'My Bag';
  document.getElementById('d-list').innerHTML = list.length ? list.map(id => {
    const p = DB.find(x => x.id === id);
    return `<div class="small-item"><img src="${p.img}"><div><b>${p.name}</b><br><small>₵${p.price}</small></div></div>`;
  }).join('') : '<p style="text-align:center; padding:20px; opacity:0.4;">Empty</p>';
  document.getElementById('checkout-btn').style.display = type === 'cart' && list.length ? 'block' : 'none';
  d.classList.add('open');
}

renderGrid();
</script>
</body>
</html>
