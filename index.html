<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>ENIS COLLECTION</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg: #FDFDFD;
            --card-bg: #FFFFFF;
            --text-main: #121212;
            --text-soft: #8E8E93;
            --accent-gold: #C5A02E; /* Luxury Champagne Gold */
            --glass: rgba(255, 255, 255, 0.9);
            --border: rgba(0, 0, 0, 0.05);
            --shadow: 0 10px 40px rgba(0,0,0,0.04);
            --accent-green: #25D366;
            --ease-fluid: cubic-bezier(0.23, 1, 0.32, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000; --card-bg: #111; --text-main: #FFF; --text-soft: #A1A1A6;
                --glass: rgba(10, 10, 10, 0.95); --border: rgba(255, 255, 255, 0.08);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, "SF Pro Display", sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: #000; height: 100vh; overflow: hidden; position: fixed; width: 100%; }

        .app-shell {
            width: 100%; max-width: 420px; height: 100vh; margin: 0 auto;
            background: var(--bg); position: relative; display: flex; flex-direction: column;
        }

        /* SPLASH SCREEN - PRESERVED */
        #splash-screen {
            position: absolute; inset: 0; z-index: 9999;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.8)), url('images/Splash-Dress.PNG') center/cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: all 0.8s var(--ease-fluid);
        }
        #splash-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; transform: scale(1.1); }

        #shop-content { display: none; flex-direction: column; height: 100%; }
        #shop-content.active { display: flex; }

        /* HEADER & SEARCH */
        header {
            padding: calc(env(safe-area-inset-top) + 15px) 20px 10px;
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid var(--border); z-index: 100;
        }
        .logo-box h2 { font-size: 18px; font-weight: 800; text-align: center; color: var(--text-main); text-transform: uppercase; letter-spacing: 3px;}
        .logo-box span { font-size: 7px; color: var(--accent-gold); letter-spacing: 5px; display: block; text-transform: uppercase; text-align: center; margin-top: 5px; font-weight: 700; }

        .search-container {
            height: 0; overflow: hidden; transition: 0.4s var(--ease-fluid); opacity: 0;
        }
        .search-container.visible { height: 45px; opacity: 1; margin-top: 15px; }
        .search-input {
            width: 100%; padding: 10px 15px; border-radius: 12px; border: 1px solid var(--border);
            background: var(--bg); color: var(--text-main); font-size: 13px; outline: none;
        }

        .catalog-bar { 
            display: flex; gap: 10px; overflow-x: auto; padding: 15px 0 5px; 
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .catalog-bar::-webkit-scrollbar { display: none; }
        
        .filter-tag {
            padding: 8px 18px; background: rgba(120, 120, 128, 0.08); border-radius: 40px;
            font-size: 10px; font-weight: 700; color: var(--text-soft); white-space: nowrap; 
            transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .filter-tag.active { background: var(--text-main); color: var(--bg); }

        /* FLUID FEED */
        .feed { 
            flex: 1; overflow-y: auto; overflow-x: hidden;
            padding: 0 16px 60px; -webkit-overflow-scrolling: touch; 
        }
        .feed::-webkit-scrollbar { display: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding-top: 15px;}
        
        /* REFRESH SPINNER */
        .refresh-spinner {
            height: 0; display: flex; justify-content: center; align-items: center;
            color: var(--accent-gold); overflow: hidden; transition: 0.3s;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .product-card { 
            background: var(--card-bg); border-radius: 20px; overflow: hidden; 
            box-shadow: var(--shadow); border: 0.5px solid var(--border);
            opacity: 0; transform: translateY(25px); transition: 0.7s var(--ease-fluid);
        }
        .product-card.visible { opacity: 1; transform: translateY(0); }
        .product-card:active { transform: scale(0.97); transition: 0.2s; }

        .p-image-wrap { position: relative; width: 100%; aspect-ratio: 1/1.3; overflow: hidden; }
        .p-image-wrap img { width: 100%; height: 100%; object-fit: cover; }
        
        /* PRESERVED TAG STYLES */
        .floating-tag {
            position: absolute; bottom: 10px; right: 10px;
            background: var(--accent-gold); color: #000;
            padding: 4px 10px; border-radius: 10px; font-size: 11px;
            font-weight: 900; border: 1px solid rgba(0,0,0,0.1);
            box-shadow: 0 4px 10px rgba(197, 160, 46, 0.3);
            z-index: 2;
        }

        .fomo-tag {
            position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.85);
            color: var(--text-main); font-size: 8px; padding: 4px 8px;
            border-radius: 6px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
            z-index: 2; border: 0.5px solid var(--border);
        }

        .p-details { padding: 12px 10px; }
        .p-name { font-size: 12px; font-weight: 600; color: var(--text-main); line-height: 1.3; }

        /* PRESERVED ABOUT */
        .about-modern {
            margin-top: 60px; padding: 60px 20px 40px;
            background: var(--card-bg); border-radius: 40px 40px 0 0;
            border-top: 1px solid var(--border); text-align: center;
        }
        .about-modern h3 { font-size: 10px; letter-spacing: 4px; color: var(--accent-gold); text-transform: uppercase; margin-bottom: 10px; }
        .social-row { display: flex; justify-content: center; gap: 15px; margin: 25px 0; }
        .social-btn {
            width: 48px; height: 48px; border-radius: 16px;
            background: var(--bg); display: flex; align-items: center; justify-content: center;
            color: var(--text-main); text-decoration: none; border: 0.5px solid var(--border);
            transition: 0.4s; font-size: 18px;
        }

        /* PREVIEW - MEDIUM TRANSITION */
        #item-preview {
            position: fixed; inset: 0; z-index: 10000;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            display: none; align-items: center; justify-content: center; padding: 25px;
            opacity: 0; transition: opacity 0.5s var(--ease-fluid);
        }
        #item-preview.active { display: flex; opacity: 1; }
        .preview-box { 
            width: fit-content; max-width: 85%; background: var(--card-bg); 
            padding: 8px; border-radius: 28px;
            transform: scale(0.9); transition: 0.5s var(--ease-fluid);
        }
        #item-preview.active .preview-box { transform: scale(1); }
        .preview-img-container { max-height: 50vh; border-radius: 22px; overflow: hidden; background: #000; }
        .preview-image { display: block; max-width: 100%; max-height: 50vh; object-fit: contain; }
        
        .btn-order {
            background: var(--accent-green); color: white; padding: 14px; border-radius: 18px;
            text-decoration: none; font-weight: 700; display: flex; align-items: center; 
            gap: 10px; font-size: 14px; justify-content: center; margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="app-shell">
    <div id="splash-screen">
        <div style="text-align:center; color:white; margin-bottom:40px;">
            <h1 style="font-weight: 800; font-size: 24px; letter-spacing: 2px;">ENIS COLLECTION</h1>
            <p style="font-size:8px; letter-spacing:6px; color: var(--accent-gold); margin-top: 10px;">PAMPER YOUR BODY</p>
        </div>
        <button style="background:#fff; color:#000; padding:18px 50px; border-radius:40px; border:none; font-weight:800; font-size:12px;" onclick="launchApp()">ENTER SHOP</button>
    </div>

    <div id="shop-content">
        <header>
            <div class="logo-box" onclick="toggleSearch()">
                <h2>Enis Collection</h2>
                <span>Pamper Your Body</span>
            </div>
            <div id="searchBar" class="search-container">
                <input type="text" class="search-input" placeholder="Search our collection..." onkeyup="handleSearch(this.value)">
            </div>
            <div class="catalog-bar">
                <div class="filter-tag active" onclick="filterItems('All', this)">All Items</div>
                <div class="filter-tag" onclick="filterItems('Dress', this)">Dresses</div>
                <div class="filter-tag" onclick="filterItems('Set', this)">Sets</div>
                <div class="filter-tag" onclick="filterItems('Work', this)">Work Wear</div>
            </div>
        </header>

        <div class="feed" id="mainFeed" onscroll="handleScroll()">
            <div id="refreshIndicator" class="refresh-spinner"><i class="fas fa-circle-notch" style="animation: spin 1s linear infinite;"></i></div>
            <div class="grid" id="productGrid"></div>
            
            <div class="about-modern">
                <h3>Our Heritage</h3>
                <p style="font-weight: 600; font-size: 16px; margin-top: 10px; color: var(--text-main);">Curating silhouettes for the modern woman.</p>
                <div class="social-row">
                    <a href="tel:+233546527892" class="social-btn"><i class="fas fa-phone"></i></a>
                    <a href="https://wa.me/233546527892" class="social-btn"><i class="fab fa-whatsapp"></i></a>
                    <a href="https://www.tiktok.com/@eniscollection1" class="social-btn"><i class="fab fa-tiktok"></i></a>
                </div>
                <p style="font-size: 7px; letter-spacing: 2px; color: var(--accent-gold); margin-top: 25px; font-weight: 700; text-transform: uppercase;">Crafted for Excellence</p>
            </div>
        </div>
    </div>

    <div id="item-preview" onclick="closePreview()">
        <div class="preview-box" id="previewBox" onclick="event.stopPropagation()">
            <div class="preview-img-container">
                <img id="preview-img" src="" class="preview-image" onclick="closePreview()">
                <div id="preview-tag" class="floating-tag"></div>
            </div>
            <div style="padding: 15px 10px;">
                <span id="preview-size" style="font-size: 10px; color: var(--text-soft); font-weight: 800; display: block; margin-bottom: 5px;"></span>
                <h2 id="preview-name" style="font-size: 16px; color: var(--text-main); font-weight: 700;"></h2>
                <a id="wa-btn" href="#" class="btn-order"><i class="fab fa-whatsapp"></i> INSTANT ORDER</a>
            </div>
        </div>
    </div>
</div>

<script>
    const myProducts = [
        { name: "Thick Seamless Dress", price: 50, size: "10", category: "Dress", image: "images/item1.jpg", status: "Limited Stock" },
        { name: "Plaited Skirts & Top", price: 50, size: "8/10", category: "Set", image: "images/item2.jpg", status: "" },
        { name: "Short Length Essential", price: 45, size: "8", category: "Dress", image: "images/item3.jpg", status: "New Arrival" },
        { name: "Church & Work Midi", price: 50, size: "8", category: "Work", image: "images/item4.jpg", status: "" },
        { name: "Dinner & Party Elegance", price: 45, size: "8/10", category: "Dress", image: "images/item5.jpg", status: "Selling Fast" },
        { name: "Lecture & Beach Set", price: 45, size: "6/8/10", category: "Set", image: "images/item6.jpg", status: "" },
        { name: "Ruched SHEIN Special", price: 50, size: "8/10", category: "Dress", image: "images/item7.jpg", status: "Limited" },
        { name: "Ultimate Work Gown", price: 50, size: "12/14", category: "Work", image: "images/item8.jpg", status: "" },
        { name: "Skirt & Basic Top Duo", price: 50, size: "10/12", category: "Set", image: "images/item9.jpg", status: "New" },
        { name: "Refined Church Wear", price: 50, size: "10", category: "Work", image: "images/item10.jpg", status: "" }
    ];

    function renderProducts(data = myProducts) {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = data.map(item => `
            <div class="product-card">
                <div class="p-image-wrap" onclick="openPreview('${item.name.replace(/'/g, "\\'")}', ${item.price}, '${item.image}', '${item.size}')">
                    ${item.status ? `<div class="fomo-tag">${item.status}</div>` : ''}
                    <img src="${item.image}" onerror="this.src='https://via.placeholder.com/400x520?text=ENIS'">
                    <div class="floating-tag">₵${item.price}</div>
                </div>
                <div class="p-details">
                    <span style="font-size:9px; color:var(--accent-gold); font-weight:800;">SIZE ${item.size}</span>
                    <h3 class="p-name">${item.name}</h3>
                </div>
            </div>
        `).join('');
        handleScroll();
    }

    function handleScroll() {
        const cards = document.querySelectorAll('.product-card');
        const feed = document.getElementById('mainFeed');
        const spinner = document.getElementById('refreshIndicator');
        
        // Reveal animation
        cards.forEach(card => {
            if(card.getBoundingClientRect().top < window.innerHeight * 0.9) card.classList.add('visible');
        });

        // Pull to refresh simulation
        if (feed.scrollTop < -20) {
            spinner.style.height = "40px";
            setTimeout(() => location.reload(), 800);
        }
    }

    function toggleSearch() {
        document.getElementById('searchBar').classList.toggle('visible');
    }

    function handleSearch(val) {
        const filtered = myProducts.filter(p => p.name.toLowerCase().includes(val.toLowerCase()));
        renderProducts(filtered);
    }

    function launchApp() {
        document.getElementById('splash-screen').classList.add('hidden');
        document.getElementById('shop-content').classList.add('active');
        renderProducts();
    }

    function openPreview(name, price, image, size) {
        const modal = document.getElementById('item-preview');
        const pImg = document.getElementById('preview-img');
        pImg.src = image;
        pImg.onload = () => {
            document.getElementById('preview-name').innerText = name;
            document.getElementById('preview-size').innerText = `UK SIZE ${size}`;
            document.getElementById('preview-tag').innerText = `₵${price}`;
            const msg = encodeURIComponent(`Hi Enis! ✨ I'd like to order: ${name} (Size ${size})`);
            document.getElementById('wa-btn').href = `https://wa.me/233546527892?text=${msg}`;
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
        };
    }

    function closePreview() {
        const modal = document.getElementById('item-preview');
        modal.classList.remove('active');
        setTimeout(() => modal.style.display = 'none', 500);
    }

    function filterItems(cat, el) {
        document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        const filtered = cat === 'All' ? myProducts : myProducts.filter(p => p.category === cat);
        renderProducts(filtered);
        document.getElementById('mainFeed').scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>

</body>
</html>
