<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    
    <title>ENIS COLLECTION</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg: #F2F2F7;
            --card-bg: #FFFFFF;
            --text-main: #1C1C1E;
            --text-soft: #8E8E93;
            --accent-gold: #D4AF37;
            --glass: rgba(255, 255, 255, 0.85);
            --border: rgba(0, 0, 0, 0.05);
            --shadow: 0 8px 20px rgba(0,0,0,0.04);
            --accent-green: #25D366;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --card-bg: #1C1C1E;
                --text-main: #FFFFFF;
                --text-soft: #A1A1A6;
                --glass: rgba(28, 28, 30, 0.9);
                --border: rgba(255, 255, 255, 0.1);
                --shadow: 0 10px 30px rgba(0,0,0,0.5);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: #000; height: 100vh; width: 100%; overflow: hidden; position: fixed; }

        .app-shell {
            width: 100%; max-width: 420px; height: 100vh; margin: 0 auto;
            background: var(--bg); position: relative; overflow: hidden;
        }

        /* Splash Screen - Added pointer-events fix */
        #splash-screen {
            position: absolute; inset: 0; z-index: 4000;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)), url('images/Splash-Dress.PNG') center/cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: all 0.6s ease;
        }
        #splash-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        /* Header & Sticky Filter */
        header {
            position: absolute; top: 0; width: 100%;
            padding: calc(env(safe-area-inset-top) + 15px) 0 10px;
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 1000; border-bottom: 0.5px solid var(--border);
        }

        .logo-box h2 { font-size: 19px; font-weight: 800; text-align: center; color: var(--text-main); text-transform: uppercase; letter-spacing: 1px;}
        .logo-box span { font-size: 8px; color: var(--accent-gold); letter-spacing: 4px; display: block; text-transform: uppercase; text-align: center; margin-top: 4px; font-weight: 700; }

        .filter-bar { display: flex; gap: 8px; overflow-x: auto; padding: 12px 16px 5px; scrollbar-width: none; }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-tag {
            padding: 6px 14px; background: rgba(120, 120, 128, 0.1); border-radius: 20px;
            font-size: 11px; font-weight: 600; color: var(--text-soft); white-space: nowrap; transition: 0.3s;
        }
        .filter-tag.active { background: var(--text-main); color: var(--bg); }

        /* Main Scrollable Area */
        .feed { 
            height: 100%; overflow-y: auto; overflow-x: hidden;
            padding: calc(env(safe-area-inset-top) + 135px) 16px 100px;
            -webkit-overflow-scrolling: touch;
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .product-card { 
            background: var(--card-bg); border-radius: 18px; overflow: hidden; 
            box-shadow: var(--shadow); border: 0.5px solid var(--border);
            opacity: 0; transform: translateY(15px); transition: 0.5s ease;
        }
        .product-card.visible { opacity: 1; transform: translateY(0); }

        /* Image + Price Tag */
        .p-image-wrap { position: relative; width: 100%; aspect-ratio: 1/1.3; background: #8881; }
        .p-image-wrap img { width: 100%; height: 100%; object-fit: cover; }
        
        .floating-tag {
            position: absolute; bottom: 8px; right: 8px;
            background: rgba(255, 255, 255, 0.9); color: #000;
            padding: 4px 10px; border-radius: 10px; font-size: 12px;
            font-weight: 800; backdrop-filter: blur(5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .p-details { padding: 10px; }
        .p-name { font-size: 13px; font-weight: 600; color: var(--text-main); line-height: 1.2; }

        /* PREVIEW MODAL - THE FIX */
        #item-preview {
            position: absolute; inset: 0; 
            background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 5000; display: none; align-items: center; justify-content: center;
        }
        
        .preview-box { 
            width: fit-content; max-width: 85%;
            background: var(--card-bg); padding: 6px; 
            border-radius: 24px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .preview-img-container {
            position: relative;
            max-height: 60vh;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
        }

        .preview-image { 
            display: block; width: auto; max-width: 100%;
            max-height: 60vh; object-fit: contain; cursor: pointer;
        }

        .preview-details { padding: 15px 10px; }

        .btn-order {
            background: var(--accent-green); color: white; padding: 14px; border-radius: 16px;
            text-decoration: none; font-weight: 700; display: flex; align-items: center; 
            gap: 8px; font-size: 14px; justify-content: center; transition: 0.2s;
        }
        .btn-order:active { transform: scale(0.96); }
    </style>
</head>
<body>

<div class="app-shell">
    <div id="splash-screen">
        <div style="text-align:center; color:white; margin-bottom:40px;">
            <h1 style="font-weight: 800; letter-spacing: 1px; font-size: 26px;">WELCOME TO<br>ENIS COLLECTION</h1>
            <p style="font-size:9px; letter-spacing:5px; color: var(--accent-gold); margin-top: 12px; font-weight: 700;">PAMPER YOUR BODY</p>
        </div>
        <button style="background:#fff; color:#000; padding:18px 50px; border-radius:40px; border:none; font-weight:800;" onclick="launchApp()">Enter Shop</button>
    </div>

    <div id="shop-content" style="opacity: 0; height: 100%;">
        <header>
            <div class="logo-box">
                <h2>Enis Collection</h2>
                <span>Pamper Your Body</span>
            </div>
            <div class="filter-bar">
                <div class="filter-tag active" onclick="filterItems('All', this)">All</div>
                <div class="filter-tag" onclick="filterItems('Dress', this)">Dresses</div>
                <div class="filter-tag" onclick="filterItems('Set', this)">Sets</div>
                <div class="filter-tag" onclick="filterItems('Work', this)">Work</div>
            </div>
        </header>

        <div class="feed" id="mainFeed">
            <div class="grid" id="productGrid"></div>
        </div>
    </div>

    <div id="item-preview" onclick="closePreview()">
        <div class="preview-box" id="previewBox" onclick="event.stopPropagation()">
            <div class="preview-img-container">
                <img id="preview-img" src="" class="preview-image" onclick="closePreview()">
                <div id="preview-tag" class="floating-tag"></div>
            </div>
            <div class="preview-details">
                <span id="preview-size" style="font-size: 9px; color: var(--text-soft); font-weight: 800; letter-spacing: 1px; display: block; margin-bottom: 5px;"></span>
                <h2 id="preview-name" style="font-size: 16px; margin-bottom: 15px; color: var(--text-main)"></h2>
                <a id="wa-btn" href="#" class="btn-order"><i class="fab fa-whatsapp"></i> Order on WhatsApp</a>
            </div>
        </div>
    </div>
</div>

<script>
    const myProducts = [
        { name: "Thick Seamless Dress", price: 50, size: "10", category: "Dress", image: "images/item1.jpg" },
        { name: "Plaited Skirts & Top", price: 50, size: "8/10", category: "Set", image: "images/item2.jpg" },
        { name: "Short Length Essential", price: 45, size: "8", category: "Dress", image: "images/item3.jpg" },
        { name: "Church & Work Midi", price: 50, size: "8", category: "Work", image: "images/item4.jpg" },
        { name: "Dinner & Party Elegance", price: 45, size: "8/10", category: "Dress", image: "images/item5.jpg" },
        { name: "Lecture & Beach Set", price: 45, size: "6/8/10", category: "Set", image: "images/item6.jpg" },
        { name: "Ruched SHEIN Special", price: 50, size: "8/10", category: "Dress", image: "images/item7.jpg" },
        { name: "Ultimate Work Gown", price: 50, size: "12/14", category: "Work", image: "images/item8.jpg" },
        { name: "Skirt & Basic Top Duo", price: 50, size: "10/12", category: "Set", image: "images/item9.jpg" },
        { name: "Refined Church Wear", price: 50, size: "10", category: "Work", image: "images/item10.jpg" }
    ];

    function renderProducts(filter = 'All') {
        const grid = document.getElementById('productGrid');
        const filtered = filter === 'All' ? myProducts : myProducts.filter(p => p.category === filter);
        
        grid.innerHTML = filtered.map((item, idx) => `
            <div class="product-card" style="transition-delay: ${idx * 0.05}s">
                <div class="p-image-wrap" onclick="openPreview('${item.name.replace(/'/g, "\\'")}', ${item.price}, '${item.image}', '${item.size}')">
                    <img src="${item.image}" onerror="this.src='https://via.placeholder.com/400x520?text=ENIS'">
                    <div class="floating-tag">₵${item.price}</div>
                </div>
                <div class="p-details">
                    <span style="font-size:9px; color:var(--text-soft); font-weight:800;">SIZE ${item.size}</span>
                    <h3 class="p-name">${item.name}</h3>
                </div>
            </div>
        `).join('');

        setTimeout(() => {
            document.querySelectorAll('.product-card').forEach(c => c.classList.add('visible'));
        }, 50);
    }

    function launchApp() {
        document.getElementById('splash-screen').classList.add('hidden');
        document.getElementById('shop-content').style.opacity = "1";
        renderProducts();
    }

    function openPreview(name, price, image, size) {
        const modal = document.getElementById('item-preview');
        const pImg = document.getElementById('preview-img');
        const pBox = document.getElementById('previewBox');
        
        // Anti-Glitch reset
        pImg.src = ""; 
        pBox.style.opacity = "0";

        pImg.src = image;
        pImg.onload = () => {
            document.getElementById('preview-name').innerText = name;
            document.getElementById('preview-size').innerText = `UK SIZE ${size}`;
            document.getElementById('preview-tag').innerText = `₵${price}`;
            const msg = encodeURIComponent(`Hi Enis! ✨ I'd like to order the ${name} (Size ${size})`);
            document.getElementById('wa-btn').href = `https://wa.me/233546527892?text=${msg}`;
            
            modal.style.display = 'flex';
            setTimeout(() => { pBox.style.opacity = "1"; }, 50);
        };
    }

    function closePreview() { 
        document.getElementById('item-preview').style.display = 'none';
        document.getElementById('preview-img').src = ""; // Flush image
    }

    function filterItems(cat, el) {
        document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        renderProducts(cat);
    }
</script>

</body>
</html>
