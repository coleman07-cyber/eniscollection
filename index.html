<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="color-scheme" content="light" />
  <title>ENIS COLLECTION</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Montserrat:wght@300;400;600;700;800&display=swap" />

  <style>
    :root {
      --bg:          #FDF8F5;
      --card-bg:     #FFF9F7;
      --text:        #2C1A1A;
      --muted:       #9E7E7E;
      --accent:      #B06B7A;   
      --gold:        #C8956A;   
      --green:       #25D366;   
      --border:      rgba(176,107,122,0.13);
      --border-md:   rgba(176,107,122,0.24);
      --ease:        cubic-bezier(0.25,1,0.5,1);
      --r-card:      20px;
      --r-pill:      50px;
    }

    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      font-family: 'Montserrat', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%; width: 100%;
      background: var(--bg);
      overflow: hidden;
    }
    body { position: fixed; width: 100%; }

    /* SPLASH SCREEN */
    #splash {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      background-color: #2C0F18;
      background-image: linear-gradient(160deg, rgba(28,8,16,0.88) 0%, rgba(44,16,24,0.55) 50%, rgba(44,20,20,0.18) 100%);
      background-size: cover; background-position: center;
      transition: opacity 0.5s ease, visibility 0.5s;
    }
    #splash.gone { opacity: 0; visibility: hidden; pointer-events: none; }

    .splash-logo { font-family: 'Great Vibes', cursive; font-size: 62px; color: #FFF5F0; text-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .splash-tagline { font-family: 'Playfair Display', serif; font-style: italic; font-size: 14px; color: rgba(255,220,225,0.9); letter-spacing: 2px; }
    
    #btn-shop-now {
      margin-top: 40px; padding: 0 50px; height: 50px;
      border-radius: var(--r-pill); border: 1.5px solid white;
      background: transparent; color: white; font-weight: 700;
      letter-spacing: 2px; cursor: pointer;
    }

    /* SHOP MAIN */
    #shop {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      opacity: 0; transition: opacity 0.5s ease;
    }
    #shop.open { opacity: 1; }

    .shop-header { padding: 40px 20px 10px; text-align: center; }
    .shop-title { font-family: 'Playfair Display', serif; font-size: 24px; letter-spacing: 4px; color: var(--text); }
    
    .cats { display: flex; gap: 10px; overflow-x: auto; padding: 15px; scrollbar-width: none; }
    .cat { 
      padding: 8px 20px; border-radius: 20px; border: 1px solid var(--border-md);
      background: white; font-size: 10px; font-weight: 700; white-space: nowrap; 
    }
    .cat.active { background: var(--accent); color: white; border-color: var(--accent); }

    .feed { flex: 1; overflow-y: auto; padding-bottom: 100px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
    
    .card { background: var(--card-bg); border-radius: var(--r-card); overflow: hidden; position: relative; }
    .card-img { width: 100%; aspect-ratio: 3/4; object-fit: cover; }
    .card-info { padding: 10px; }
    .card-price { font-weight: 800; color: var(--gold); }
    
    /* MODALS & PANELS */
    .panel {
      position: fixed; top: 0; right: 0; bottom: 0; width: 100%;
      background: var(--bg); z-index: 2000; transform: translateX(100%);
      transition: transform 0.4s var(--ease); display: flex; flex-direction: column;
    }
    .panel.open { transform: translateX(0); }
    .panel-head { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }

    #fabs { position: fixed; bottom: 30px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 900; }
    .fab { 
        width: 50px; height: 50px; border-radius: 25px; border: none; 
        background: var(--accent); color: white; font-size: 20px; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.2); position: relative;
    }
    .fab-badge {
        position: absolute; top: 0; right: 0; background: var(--text);
        color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px;
        display: none;
    }
    .fab-badge.show { display: block; }

    /* Item Preview Modal */
    #preview {
        position: fixed; inset: 0; background: rgba(0,0,0,0.8);
        z-index: 3000; display: none; align-items: center; justify-content: center;
    }
    #preview.open { display: flex; }
    #preview-card { background: white; width: 90%; max-width: 350px; border-radius: 20px; overflow: hidden; }
    .preview-info { padding: 20px; text-align: center; }
    #preview-order { 
        display: flex; align-items: center; justify-content: center; gap: 10px;
        background: var(--green); color: white; text-decoration: none; padding: 15px; border-radius: 10px;
    }
  </style>
</head>
<body>

  <div id="splash">
    <h1 class="splash-logo">Enis Collection</h1>
    <p class="splash-tagline">Elegance for every woman</p>
    <button id="btn-shop-now">SHOP NOW</button>
  </div>

  <div id="shop">
    <div class="shop-header">
      <h1 class="shop-title">Enis Collection</h1>
    </div>

    <div class="cats" id="cats">
      <button class="cat active" data-cat="All">All Items</button>
      <button class="cat" data-cat="Thrift">Thrift</button>
      <button class="cat" data-cat="Store">Store</button>
      <button class="cat" data-cat="Handmade">Handmade</button>
    </div>

    <div class="feed">
      <div class="grid" id="grid"></div>
    </div>
  </div>

  <div id="fabs">
    <button class="fab" id="fab-heart"><i class="fas fa-heart"></i><span class="fab-badge" id="wish-badge">0</span></button>
    <button class="fab" id="fab-bag"><i class="fas fa-shopping-bag"></i><span class="fab-badge" id="cart-badge">0</span></button>
  </div>

  <div class="panel" id="cart-panel">
    <div class="panel-head">
      <h2>My Bag</h2>
      <button id="cart-close" style="background:none; border:none; font-size:24px;">&times;</button>
    </div>
    <div id="cart-body" style="flex:1; overflow-y:auto; padding: 20px;"></div>
    <div style="padding: 20px; border-top: 1px solid #ddd;">
        <button id="checkout-btn" style="width:100%; background:var(--green); color:white; border:none; padding:15px; border-radius:10px; font-weight:bold;">CHECKOUT VIA WHATSAPP</button>
    </div>
  </div>

  <div id="preview">
    <div id="preview-card">
        <img id="preview-img" src="" style="width:100%; height:300px; object-fit:cover;">
        <div class="preview-info">
            <h2 id="preview-name"></h2>
            <p id="preview-meta" style="margin-bottom:20px; color:var(--gold); font-weight:bold;"></p>
            <a id="preview-order" href="#">
                <i class="fab fa-whatsapp"></i> ORDER ON WHATSAPP
            </a>
            <button onclick="closePreview()" style="margin-top:15px; background:none; border:none; color:var(--muted);">Close</button>
        </div>
    </div>
  </div>

  <script>
    var PRODUCTS = [
      { id:1,  name:"Thick Seamless Dress",    price:50, size:"10",     cat:"Thrift",   img:"https://images.unsplash.com/photo-1539008835270-2d7c449b0fbd?auto=format&fit=crop&w=500" },
      { id:2,  name:"Plaited Skirts & Top",    price:50, size:"8/10",   cat:"Thrift",   img:"https://images.unsplash.com/photo-1515372039744-b8f02a3ae446?auto=format&fit=crop&w=500" },
      { id:4,  name:"Church & Work Gown",      price:50, size:"8",      cat:"Store",    img:"https://images.unsplash.com/photo-1595777457583-95e059d581b8?auto=format&fit=crop&w=500" }
    ];

    var cart = [];
    var wishlist = [];

    // Navigation
    document.getElementById("btn-shop-now").addEventListener("click", function() {
      document.getElementById("splash").classList.add("gone");
      document.getElementById("shop").classList.add("open");
      renderGrid("All");
    });

    // Render Grid
    function renderGrid(filter) {
      const grid = document.getElementById("grid");
      const filtered = PRODUCTS.filter(p => filter === "All" || p.cat === filter);
      
      grid.innerHTML = filtered.map(p => `
        <div class="card" onclick="openPreview(${p.id})">
          <img src="${p.img}" class="card-img">
          <div class="card-info">
            <div class="card-price">₵${p.price}</div>
            <div style="font-size:12px; font-weight:700;">${p.name}</div>
          </div>
        </div>
      `).join('');
    }

    // Category Filter
    document.getElementById("cats").addEventListener("click", (e) => {
        if(e.target.classList.contains('cat')) {
            document.querySelectorAll('.cat').forEach(c => c.classList.remove('active'));
            e.target.classList.add('active');
            renderGrid(e.target.dataset.cat);
        }
    });

    // Preview
    function openPreview(id) {
        const p = PRODUCTS.find(x => x.id === id);
        document.getElementById("preview-img").src = p.img;
        document.getElementById("preview-name").innerText = p.name;
        document.getElementById("preview-meta").innerText = `Size: ${p.size} • ₵${p.price}`;
        
        // Add to cart automatically for demo or update button
        document.getElementById("preview-order").onclick = () => {
            const text = encodeURIComponent(`Hi Enis! I want to order ${p.name} (Size ${p.size})`);
            window.open(`https://wa.me/233546527892?text=${text}`);
        };

        // Logic to add to bag
        if(!cart.find(c => c.id === p.id)) {
            cart.push(p);
            updateBadges();
        }

        document.getElementById("preview").classList.add("open");
    }

    function closePreview() {
        document.getElementById("preview").classList.remove("open");
    }

    function updateBadges() {
        document.getElementById("cart-badge").innerText = cart.length;
        document.getElementById("cart-badge").classList.toggle("show", cart.length > 0);
    }

    // Panels
    document.getElementById("fab-bag").onclick = () => {
        const body = document.getElementById("cart-body");
        body.innerHTML = cart.length ? cart.map(i => `
            <div style="display:flex; gap:10px; margin-bottom:15px; align-items:center;">
                <img src="${i.img}" style="width:50px; height:60px; object-fit:cover; border-radius:5px;">
                <div style="flex:1">
                    <div style="font-weight:bold; font-size:14px;">${i.name}</div>
                    <div style="color:var(--accent)">₵${i.price}</div>
                </div>
            </div>
        `).join('') : "Your bag is empty";
        document.getElementById("cart-panel").classList.add("open");
    };

    document.getElementById("cart-close").onclick = () => document.getElementById("cart-panel").classList.remove("open");
  </script>
</body>
</html>
