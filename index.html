<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>ENIS COLLECTION</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,400&family=Outfit:wght@300;500;700&display=swap"/>
<style>
:root {
  --bg: #FDFCFB; 
  --text: #1A1614;
  --gold: #C5A059;
  --white: #FFFFFF;
  --radius: 30px;
  --shadow: 0 10px 30px rgba(0,0,0,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

/* ── CINEMATIC SPLASH SCREEN ── */
#splash { 
  position: fixed; inset: 0; z-index: 3000; 
  background: #12100E url('images/Splash-Dress.PNG') center/cover no-repeat;
  display: flex; align-items: center; justify-content: center; 
  transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1), visibility 1s;
}
#splash::before {
  content: ""; position: absolute; inset: 0;
  background: radial-gradient(circle, rgba(18,16,14,0.3) 0%, rgba(18,16,14,0.85) 100%);
}
.splash-content {
  position: relative; z-index: 10; text-align: center; color: white;
  animation: scaleUp 1.2s ease-out;
}
@keyframes scaleUp { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

.enter-btn {
  margin-top: 30px; background: none; border: 1px solid rgba(255,255,255,0.4);
  color: white; padding: 14px 45px; border-radius: 50px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 3px; font-size: 10px; cursor: pointer;
  transition: 0.3s; backdrop-filter: blur(10px);
}
.enter-btn:active { background: white; color: black; transform: scale(0.95); }
#splash.hide { opacity: 0; visibility: hidden; }

/* ── HEADER ── */
.hdr { position: sticky; top: 0; z-index: 100; background: rgba(253, 252, 251, 0.95); backdrop-filter: blur(20px); padding: 15px 20px; text-align: center; }
.brand-name { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 600; letter-spacing: -0.5px; }
.brand-tag { font-family: 'Outfit', sans-serif; text-transform: uppercase; font-size: 8px; letter-spacing: 5px; color: var(--gold); display: block; margin-top: 4px; }

/* ── PERFECTLY ROUND CATEGORIES ── */
.cat-section { padding: 20px; }
.cat-pills { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; justify-content: space-between; }
.cat-pill { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
.cat-circle { 
  width: 58px; height: 58px; border-radius: 50%; /* Forced Perfect Circle */
  background: var(--white); display: flex; align-items: center; justify-content: center; 
  border: 1px solid #f0f0f0; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
  color: #777; font-size: 18px; 
}
.cat-pill.active .cat-circle { background: var(--text); color: var(--white); border-color: var(--text); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
.cat-lbl { font-size: 9px; font-weight: 700; text-transform: uppercase; color: #BBB; letter-spacing: 1px; }
.cat-pill.active .cat-lbl { color: var(--text); }

/* ── PRODUCT GRID ── */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px 40px; }
.card-img-box { position: relative; aspect-ratio: 0.75; border-radius: 28px; overflow: hidden; background: #f5f5f5; box-shadow: var(--shadow); }
.card-img-box img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }

/* MODERN MINIMAL PRICE TAG */
.modern-price { 
  position: absolute; bottom: 12px; left: 12px; 
  background: rgba(255,255,255,0.9); backdrop-filter: blur(8px);
  padding: 6px 14px; border-radius: 12px; font-weight: 700; font-size: 12px;
  color: var(--text); border: 1px solid rgba(0,0,0,0.03);
}

/* ── MODERN BUTTON OVERLAYS ── */
.action-overlay { position: absolute; top: 12px; right: 12px; display: flex; flex-direction: column; gap: 8px; }
.icon-btn { 
  width: 36px; height: 36px; border-radius: 50%; border: none; 
  background: rgba(255,255,255,0.85); backdrop-filter: blur(10px);
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  transition: 0.3s; font-size: 14px; color: #444;
}
.icon-btn.active-wish { color: #e74c3c; }
.icon-btn.active-cart { background: var(--text); color: var(--gold); }

/* ── COMPACT FLOATING BAR ── */
.float-bar { 
  position: fixed; bottom: 25px; right: 20px; z-index: 1000; 
  display: flex; flex-direction: column; gap: 10px; 
}
.modern-float { 
  width: 48px; height: 48px; background: var(--text); color: var(--gold); 
  border-radius: 50%; display: flex; align-items: center; justify-content: center; 
  font-size: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); cursor: pointer; position: relative;
}
.m-badge { 
  position: absolute; top: -4px; right: -4px; background: var(--gold); 
  color: white; font-size: 9px; font-weight: 800; width: 20px; height: 20px; 
  border-radius: 50%; display: flex; align-items: center; justify-content: center; 
  border: 2.5px solid var(--text); 
}

/* ── DRAWER ── */
.drawer { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: flex-end; }
.drawer.open { display: flex; }
.drawer-content { 
  width: 100%; background: var(--white); border-radius: 35px 35px 0 0; padding: 35px 25px; 
  max-height: 80vh; overflow-y: auto; -webkit-overflow-scrolling: touch; 
}
</style>
</head>
<body>

<div id="splash">
  <div class="splash-content">
    <h1 style="font-family:'Playfair Display'; font-size:42px; margin-bottom:5px; font-weight:600;">Enis Collection</h1>
    <p style="letter-spacing:5px; font-size:9px; opacity:0.7; text-transform:uppercase;">Luxury Thrift & Store</p>
    <button class="enter-btn" onclick="document.getElementById('splash').classList.add('hide')">Enter Boutique</button>
  </div>
</div>

<div class="hdr">
  <h1 class="brand-name">Enis Collection</h1>
  <span class="brand-tag">Pamper your body</span>
</div>

<div class="cat-section">
  <div class="cat-pills">
    <div class="cat-pill active" onclick="filterCat('ALL', this)"><div class="cat-circle"><i class="fa-solid fa-grip"></i></div><span class="cat-lbl">All</span></div>
    <div class="cat-pill" onclick="filterCat('THRIFT', this)"><div class="cat-circle"><i class="fa-solid fa-leaf"></i></div><span class="cat-lbl">Thrift</span></div>
    <div class="cat-pill" onclick="filterCat('STORE', this)"><div class="cat-circle"><i class="fa-solid fa-bag-shopping"></i></div><span class="cat-lbl">Store</span></div>
    <div class="cat-pill" onclick="filterCat('CUSTOM', this)"><div class="cat-circle"><i class="fa-solid fa-wand-sparkles"></i></div><span class="cat-lbl">Custom</span></div>
  </div>
</div>

<div class="grid" id="main-grid"></div>

<div class="float-bar">
  <div class="modern-float" onclick="openDrawer('wish')"><i class="fa-regular fa-heart"></i><span class="m-badge" id="w-badge">0</span></div>
  <div class="modern-float" onclick="openDrawer('cart')"><i class="fa-solid fa-cart-shopping"></i><span class="m-badge" id="c-badge">0</span></div>
</div>

<div id="drawer" class="drawer" onclick="this.classList.remove('open')">
  <div class="drawer-content" onclick="event.stopPropagation()">
    <h2 id="d-title" style="font-family:'Playfair Display'; margin-bottom:25px; font-size:24px;"></h2>
    <div id="d-list"></div>
    <button id="checkout-btn" onclick="sendWA()" style="display:none; width:100%; padding:20px; background:var(--text); color:var(--gold); border-radius:20px; border:none; margin-top:20px; font-weight:700; letter-spacing:1px;">Confirm via WhatsApp</button>
  </div>
</div>

<script>
const DB = [
  {id:1, name:"Thick Seamless Dress", price:50, cat:"THRIFT", img:"images/item1.jpg"},
  {id:2, name:"Plaited Skirts & Top", price:50, cat:"THRIFT", img:"images/item2.jpg"},
  {id:3, name:"Short Length Essential", price:45, cat:"THRIFT", img:"images/item3.jpg"},
  {id:4, name:"Church & Work Gown", price:50, cat:"STORE", img:"images/item4.jpg"},
  {id:5, name:"Dinner Party Elegance", price:45, cat:"STORE", img:"images/item5.jpg"},
  {id:6, name:"Lecture & Beach Set", price:45, cat:"STORE", img:"images/item6.jpg"},
  {id:7, name:"Handmade Silk Wrap", price:65, cat:"CUSTOM", img:"images/item7.jpg"},
  {id:8, name:"Ruched SHEIN Special", price:50, cat:"THRIFT", img:"images/item8.jpg"},
  {id:9, name:"Ultimate Work Gown", price:50, cat:"THRIFT", img:"images/item9.jpg"},
  {id:10, name:"Refined Church Wear", price:50, cat:"STORE", img:"images/item10.jpg"}
];

let wish = []; let cart = [];

function renderGrid(f = 'ALL') {
  const g = document.getElementById('main-grid');
  const items = f === 'ALL' ? DB : DB.filter(x => x.cat === f);
  g.innerHTML = items.map(p => `
    <div class="card">
      <div class="card-img-box">
        <img src="${p.img}" loading="lazy">
        <div class="modern-price">₵${p.price}</div>
        <div class="action-overlay">
          <button onclick="toggle('wish', ${p.id})" class="icon-btn ${wish.includes(p.id)?'active-wish':''}"><i class="${wish.includes(p.id)?'fa-solid':'fa-regular'} fa-heart"></i></button>
          <button onclick="toggle('cart', ${p.id})" class="icon-btn ${cart.includes(p.id)?'active-cart':''}"><i class="fa-solid fa-cart-plus"></i></button>
        </div>
      </div>
      <div style="padding:12px 0"><h4 style="font-size:13px; font-weight:500; opacity:0.9;">${p.name}</h4></div>
    </div>
  `).join('');
}

function toggle(type, id) {
  let list = type === 'wish' ? wish : cart;
  let idx = list.indexOf(id);
  if(idx > -1) list.splice(idx,1); else list.push(id);
  document.getElementById(type[0]+'-badge').innerText = list.length;
  renderGrid();
}

function openDrawer(type) {
  const d = document.getElementById('drawer');
  const list = type === 'wish' ? wish : cart;
  document.getElementById('d-title').innerText = type === 'wish' ? 'My Wishlist' : 'My Shopping Bag';
  document.getElementById('checkout-btn').style.display = type === 'cart' && list.length ? 'block' : 'none';
  
  document.getElementById('d-list').innerHTML = list.length ? list.map(id => {
    const p = DB.find(x => x.id === id);
    return `<div style="display:flex; gap:18px; margin-bottom:20px; align-items:center;">
      <img src="${p.img}" style="width:65px; height:65px; border-radius:18px; object-fit:cover;">
      <div style="flex:1"><b>${p.name}</b><br><span style="color:var(--gold); font-size:14px; font-weight:600;">₵${p.price}</span></div>
      <i class="fa-solid fa-xmark" style="color:#ccc; font-size:18px; padding:10px;" onclick="toggle('${type}', ${p.id}); openDrawer('${type}')"></i>
    </div>`;
  }).join('') : '<p style="text-align:center; padding:50px; color:#aaa; font-size:14px;">Your list is empty.</p>';
  d.classList.add('open');
}

function filterCat(c, el) {
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderGrid(c);
}

function sendWA() {
  const total = cart.reduce((sum, id) => sum + DB.find(x => x.id === id).price, 0);
  const items = cart.map(id => DB.find(x => x.id === id).name).join(', ');
  window.open(`https://wa.me/233546527892?text=Hello Enis Collection! I would like to order: ${items}. Total Price: ₵${total}`);
}

renderGrid();
</script>
</body>
</html>
