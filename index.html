<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ENIS COLLECTION | Official Store</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #F2F2F7;
            --card-bg: #FFFFFF;
            --accent: #000000;
            --text-main: #1C1C1E;
            --text-soft: #8E8E93;
            --glass: rgba(255, 255, 255, 0.75);
            --border: rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --card-bg: #1C1C1E;
                --accent: #FFFFFF;
                --text-main: #FFFFFF;
                --text-soft: #8E8E93;
                --glass: rgba(28, 28, 30, 0.85);
                --border: rgba(255, 255, 255, 0.1);
                --shadow: 0 4px 12px rgba(0,0,0,0.3);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; position: fixed; width: 100%; }

        .app-shell {
            width: 100%; max-width: 420px; height: 100vh;
            background: var(--bg); position: relative; overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }

        header {
            position: absolute; top: 0; width: 100%;
            padding: 60px 20px 20px;
            background: var(--glass); 
            backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
            z-index: 1000; border-bottom: 0.5px solid var(--border);
        }
        .logo-box h2 { font-size: 22px; font-weight: 700; text-align: center; color: var(--text-main); letter-spacing: -0.5px; }
        .logo-box span { font-size: 9px; color: var(--text-soft); letter-spacing: 4px; display: block; text-transform: uppercase; text-align: center; margin-top: 4px; font-weight: 600; }

        .search-bar { position: relative; margin-top: 20px; }
        .search-bar i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-soft); font-size: 14px; }
        .search-bar input {
            width: 100%; padding: 12px 15px 12px 40px; border-radius: 12px; border: none;
            background: rgba(120, 120, 128, 0.12); font-size: 16px; color: var(--text-main); outline: none;
        }

        .feed { 
            height: 100%; overflow-y: scroll; 
            padding: 190px 16px 100px; 
            -webkit-overflow-scrolling: touch; 
            scrollbar-width: none;
        }
        .feed::-webkit-scrollbar { display: none; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .product-card { 
            background: var(--card-bg); border-radius: 20px; overflow: hidden; 
            box-shadow: var(--shadow); border: 0.5px solid var(--border);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .product-card:active { transform: scale(0.96); opacity: 0.8; }

        .p-image { width: 100%; aspect-ratio: 3.5/4.5; overflow: hidden; cursor: pointer; background: rgba(128,128,128,0.05); }
        .p-image img { width: 100%; height: 100%; object-fit: cover; }
        
        .p-details { padding: 14px 12px; }
        .size-tag { font-size: 10px; color: var(--text-soft); font-weight: 700; text-transform: uppercase; margin-bottom: 6px; display: block; letter-spacing: 0.5px; }
        .p-details h3 { font-size: 14px; font-weight: 600; margin: 0; color: var(--text-main); line-height: 1.2; }
        .price { font-size: 16px; font-weight: 700; color: var(--text-main); margin-top: 6px; }

        .footer-card { margin-top: 40px; padding: 40px 24px; background: var(--card-bg); border-radius: 28px; text-align: center; border: 0.5px solid var(--border); box-shadow: var(--shadow); }
        .footer-card h4 { font-size: 11px; letter-spacing: 3px; color: var(--text-soft); margin-bottom: 15px; text-transform: uppercase; }
        .footer-card p { font-size: 15px; color: var(--text-main); margin-bottom: 25px; line-height: 1.6; opacity: 0.8; }
        
        .contact-link { 
            font-size: 12px; font-weight: 700; text-decoration: none; 
            color: var(--text-main); border-bottom: 2px solid var(--text-main); 
            padding-bottom: 4px; text-transform: uppercase; letter-spacing: 1px;
            transition: opacity 0.2s;
        }
        .contact-link:active { opacity: 0.5; }

        /* --- PREVIEW MODAL --- */
        #item-preview {
            position: absolute; inset: 0; background: rgba(0,0,0,0.3); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 3000; display: flex; align-items: center; justify-content: center; 
            padding: 24px; opacity: 0; visibility: hidden; pointer-events: none;
            transition: opacity 0.2s ease; /* Faster entry */
        }
        #item-preview.active { opacity: 1; visibility: visible; pointer-events: auto; }
        
        .preview-content { 
            width: 100%; max-width: 300px; background: var(--card-bg);
            padding: 24px; border-radius: 36px; text-align: center; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            transform: scale(0.9); transition: 0.35s cubic-bezier(0.1, 0.9, 0.2, 1);
        }
        #item-preview.active .preview-content { transform: scale(1); }
        
        .preview-image { 
            width: 100%; border-radius: 22px; margin-bottom: 20px; 
            aspect-ratio: 3/4; object-fit: cover; cursor: pointer;
            opacity: 0; transition: opacity 0.25s ease; /* Fade image in separately */
        }

        .btn-order-whatsapp {
            background: #25D366; color: white; padding: 18px; border-radius: 20px;
            text-decoration: none; font-weight: 700; display: flex; align-items: center; 
            gap: 12px; font-size: 15px; width: 100%; justify-content: center;
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3);
        }

        #splash-screen {
            position: absolute; inset: 0; z-index: 4000;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.8)), url('images/Splash-Dress.PNG');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
            padding-bottom: 80px; transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>

<div class="app-shell">
    <div id="splash-screen">
        <div style="text-align:center; color:white; margin-bottom:40px;">
            <h1 style="font-weight: 700; letter-spacing: 2px; font-size: 28px;">WELCOME TO ENIS COLLECTION</h1>
            <p style="font-size:11px; letter-spacing:5px; opacity: 0.8;">PAMPER YOUR BODY</p>
        </div>
        <button style="background:white; color:black; padding:20px 60px; border-radius:40px; font-weight:700; border:none; cursor:pointer;" onclick="launchApp()">Enter Shop</button>
    </div>

    <div id="main-content" style="height:100%;">
        <header>
            <div class="logo-box">
                <h2>Enis Collection</h2>
                <span>Pamper Your Body</span>
            </div>
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="shopSearch" placeholder="Search looks..." onkeyup="filterShop()">
            </div>
        </header>

        <div class="feed">
            <div class="grid" id="productGrid"></div>
            
            <div class="footer-card">
                <h4>EST. 2022</h4>
                <p>Curated for the modern silhouette. We believe every piece should feel like a second skin while maintaining an air of timeless sophistication.</p>
                <div style="display:flex; justify-content:center; gap:30px; margin-bottom: 25px;">
                    <span class="contact-link" onclick="copyAndEmail()">Email</span>
                    <a href="tel:+233546527892" class="contact-link">Call Direct</a>
                </div>
                <a href="https://www.tiktok.com/@eniscollection1" style="text-decoration: none; color: inherit; opacity: 0.7;">
                    <i class="fab fa-tiktok" style="font-size: 24px; color: var(--text-main);"></i>
                </a>
            </div>
        </div>
    </div>

    <div id="item-preview" onclick="closePreview()">
        <div class="preview-content" onclick="event.stopPropagation()">
            <img id="preview-img" src="" class="preview-image" onload="this.style.opacity='1'" onclick="closePreview()">
            <span id="preview-size" class="size-tag"></span>
            <h2 id="preview-name" style="margin-bottom:20px; font-size: 20px; font-weight: 700; color: var(--text-main);"></h2>
            <a id="whatsapp-order-btn" href="#" class="btn-order-whatsapp">
                <i class="fab fa-whatsapp"></i> Instant Order
            </a>
            <p style="margin-top:20px; font-size:11px; font-weight:700; color:var(--text-soft); text-transform:uppercase; cursor:pointer; letter-spacing:1px;" onclick="closePreview()">Back to Collection</p>
        </div>
    </div>
</div>

<script>
    const myProducts = [
        { name: "Thick Seamless Dress", price: 50, size: "10", image: "images/item1.jpg" },
        { name: "Plaited Skirts & Top", price: 50, size: "8/10", image: "images/item2.jpg" },
        { name: "Short Length Essential", price: 45, size: "8", image: "images/item3.jpg" },
        { name: "Church & Work Midi", price: 50, size: "8", image: "images/item4.jpg" },
        { name: "Dinner & Party Elegance", price: 45, size: "8/10", image: "images/item5.jpg" },
        { name: "Lecture & Beach Set", price: 45, size: "6/8/10", image: "images/item6.jpg" },
        { name: "Ruched SHEIN Special", price: 50, size: "8/10", image: "images/item7.jpg" },
        { name: "Ultimate Work Gown", price: 50, size: "12/14", image: "images/item8.jpg" },
        { name: "Skirt & Basic Top Duo", price: 50, size: "10/12", image: "images/item9.jpg" },
        { name: "Refined Church Wear", price: 50, size: "10", image: "images/item10.jpg" }
    ];

    function renderProducts(products) {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = products.map(item => `
            <div class="product-card" data-title="${item.name.toLowerCase()}">
                <div class="p-image" onclick="openPreview('${item.name.replace(/'/g, "\\'")}', '${item.price}', '${item.image}', '${item.size}')">
                    <img src="${item.image}" onerror="this.src='https://via.placeholder.com/400x520?text=Collection'">
                </div>
                <div class="p-details">
                    <span class="size-tag">UK SIZE ${item.size}</span>
                    <h3>${item.name}</h3>
                    <p class="price">GH₵ ${item.price.toFixed(2)}</p>
                </div>
            </div>
        `).join('');
    }
    renderProducts(myProducts);

    function launchApp() {
        document.getElementById('splash-screen').style.opacity = "0";
        setTimeout(() => { document.getElementById('splash-screen').style.display = "none"; }, 500);
    }

    function openPreview(name, price, image, size) {
        const modal = document.getElementById('item-preview');
        const previewImg = document.getElementById('preview-img');
        
        // 1. Reset state so user never sees the OLD image
        previewImg.style.opacity = "0";
        previewImg.src = ""; 
        
        // 2. Prepare text content immediately
        document.getElementById('preview-name').innerText = name;
        document.getElementById('preview-size').innerText = `SIZE ${size} • GH₵ ${price}`;
        const msg = encodeURIComponent(`Hi Enis! ✨ I'd like to order: ${name} (Size ${size})`);
        document.getElementById('whatsapp-order-btn').href = `https://wa.me/233546527892?text=${msg}`;

        // 3. CACHE BUSTER + IMAGE PRELOAD (The Magic Fix)
        const newSrc = image + "?v=" + new Date().getTime();
        const imgLoader = new Image();
        imgLoader.src = newSrc;

        // ONLY open the modal when the image is fully downloaded by the browser
        imgLoader.onload = function() {
            previewImg.src = newSrc;
            modal.classList.add('active');
        };

        // 4. Emergency Fallback (If internet is very slow, open anyway after 400ms)
        setTimeout(() => {
            if (!modal.classList.contains('active')) {
                previewImg.src = newSrc;
                modal.classList.add('active');
            }
        }, 400); 
    }

    function closePreview() { 
        document.getElementById('item-preview').classList.remove('active'); 
        setTimeout(() => {
            document.getElementById('preview-img').src = "";
            document.getElementById('preview-img').style.opacity = "0";
        }, 300);
    }

    function filterShop() {
        let input = document.getElementById('shopSearch').value.toLowerCase();
        let cards = document.getElementsByClassName('product-card');
        Array.from(cards).forEach(card => {
            card.style.display = card.getAttribute('data-title').includes(input) ? "block" : "none";
        });
    }

    function copyAndEmail() {
        navigator.clipboard.writeText("sheilaenima@gmail.com");
        alert("Email copied!");
        window.location.href = "mailto:sheilaenima@gmail.com";
    }
</script>

</body>
</html>
