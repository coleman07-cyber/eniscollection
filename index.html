<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    
    <title>ENIS COLLECTION</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg: #F2F2F7;
            --card-bg: #FFFFFF;
            --text-main: #1C1C1E;
            --text-soft: #8E8E93;
            --glass: rgba(255, 255, 255, 0.9);
            --border: rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
            --accent-green: #25D366;
            --radius-outer: 28px;
            --radius-inner: 20px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --card-bg: #1C1C1E;
                --text-main: #FFFFFF;
                --text-soft: #A1A1A6;
                --glass: rgba(28, 28, 30, 0.9);
                --border: rgba(255, 255, 255, 0.1);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            min-height: 100vh;
            color: var(--text-main);
        }

        /* SPLASH SCREEN - STAYS FIXED */
        #splash-screen {
            position: fixed; inset: 0; z-index: 10000;
            background: #000;
            background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.85)), url('images/Splash-Dress.PNG');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #splash-screen.lifted { transform: translateY(-100%); }

        /* HEADER - FIXED TOP */
        header {
            position: fixed; top: 0; left: 0; right: 0;
            padding: calc(env(safe-area-inset-top) + 15px) 20px 15px;
            background: var(--glass); 
            backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
            z-index: 1000; border-bottom: 0.5px solid var(--border);
            transition: transform 0.4s ease;
        }
        .header-hidden { transform: translateY(-100%); }

        .logo-box h2 { font-size: 22px; font-weight: 800; text-align: center; letter-spacing: -0.5px; }
        .logo-box span { font-size: 9px; color: var(--text-soft); letter-spacing: 5px; display: block; text-transform: uppercase; text-align: center; margin-top: 4px; font-weight: 700; }

        /* CONTENT WRAPPER */
        .content {
            max-width: 450px; margin: 0 auto;
            padding: calc(env(safe-area-inset-top) + 90px) 16px 60px;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 40px; }
        
        .product-card { 
            background: var(--card-bg); border-radius: 20px; overflow: hidden; 
            box-shadow: var(--shadow); border: 0.5px solid var(--border);
        }

        .p-image { width: 100%; aspect-ratio: 1 / 1.35; overflow: hidden; background: #8881; }
        .p-image img { width: 100%; height: 100%; object-fit: cover; }
        
        .p-details { padding: 12px; }
        .size-tag { font-size: 9px; color: var(--text-soft); font-weight: 800; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .p-name { font-size: 13px; font-weight: 600; line-height: 1.2; height: 32px; overflow: hidden; }
        .price { font-size: 15px; font-weight: 700; margin-top: 4px; }

        /* ABOUT SECTION - RESTORED STYLE */
        .about-section { 
            background: var(--card-bg); border-radius: 30px; 
            padding: 40px 24px; text-align: center;
            border: 0.5px solid var(--border); box-shadow: var(--shadow);
            margin-bottom: 40px;
        }
        .about-section h4 { font-size: 10px; letter-spacing: 5px; color: var(--text-soft); text-transform: uppercase; margin-bottom: 15px; }
        .about-section p { font-size: 15px; line-height: 1.6; margin-bottom: 30px; }
        
        .contact-hub { display: flex; justify-content: center; gap: 20px; }
        .icon-circle {
            width: 50px; height: 50px; border-radius: 50%;
            background: rgba(120, 120, 128, 0.1); 
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: var(--text-main); font-size: 18px;
        }

        /* PREVIEW MODAL */
        #item-preview {
            position: fixed; inset: 0; 
            background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 11000; display: none; align-items: center; justify-content: center; 
            padding: 20px;
        }
        #item-preview.active { display: flex; }
        
        .preview-content { 
            width: 80%; max-width: 320px; 
            background: var(--card-bg); padding: 10px; 
            border-radius: var(--radius-outer); text-align: center; 
            transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.2);
        }
        #item-preview.active .preview-content { transform: scale(1); }
        
        .preview-image { 
            width: 100%; border-radius: var(--radius-inner); 
            aspect-ratio: 1 / 1.4; object-fit: cover;
            margin-bottom: 15px; display: block;
        }

        #preview-name { 
            font-size: 16px; font-weight: 800; text-transform: uppercase; 
            letter-spacing: 2px; margin-bottom: 15px;
        }

        .btn-order-whatsapp {
            background: var(--accent-green); color: white; padding: 16px; border-radius: 18px;
            text-decoration: none; font-weight: 700; display: flex; align-items: center; 
            gap: 10px; font-size: 14px; width: 100%; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div style="text-align:center; color:white; margin-bottom:40px;">
            <h2 style="font-weight: 300; letter-spacing: 4px; font-size: 14px; opacity: 0.8;">WELCOME TO</h2>
            <h1 style="font-weight: 700; letter-spacing: 2px; font-size: 30px; margin-top: 5px;">ENIS COLLECTION</h1>
            <p style="font-size:9px; letter-spacing:6px; opacity: 0.6; margin-top: 15px;">PAMPER YOUR BODY</p>
        </div>
        <button style="background:white; color:black; padding:20px 60px; border-radius:50px; font-weight:900; border:none; cursor:pointer;" onclick="launchApp()">ENTER SHOP</button>
    </div>

    <header id="mainHeader">
        <div class="logo-box">
            <h2>Enis Collection</h2>
            <span>Pamper Your Body</span>
        </div>
    </header>

    <div class="content">
        <div class="grid" id="productGrid"></div>
        
        <div class="about-section">
            <h4>About Enis</h4>
            <p>Curated for the modern silhouette. Every piece is selected to feel like a second skin while maintaining timeless sophistication.</p>
            <div class="contact-hub">
                <a href="tel:+233546527892" class="icon-circle"><i class="fas fa-phone"></i></a>
                <a href="https://www.tiktok.com/@eniscollection1" class="icon-circle"><i class="fab fa-tiktok"></i></a>
                <a href="mailto:sheilaenima@gmail.com" class="icon-circle"><i class="fas fa-envelope"></i></a>
            </div>
        </div>
    </div>

    <div id="item-preview" onclick="closePreview()">
        <div class="preview-content" onclick="event.stopPropagation()">
            <img id="preview-img" src="" class="preview-image">
            <div style="padding-bottom: 5px;">
                <span id="preview-size" style="font-size: 9px; color: var(--text-soft); font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block;"></span>
                <h2 id="preview-name"></h2>
                <a id="whatsapp-order-btn" href="#" class="btn-order-whatsapp">
                    <i class="fab fa-whatsapp"></i> INSTANT ORDER
                </a>
            </div>
        </div>
    </div>

<script>
    const myProducts = [
        { name: "Thick Seamless Dress", price: 50, size: "10", image: "images/item1.jpg" },
        { name: "Plaited Skirts & Top", price: 50, size: "8/10", image: "images/item2.jpg" },
        { name: "Short Length Essential", price: 45, size: "8", image: "images/item3.jpg" },
        { name: "Church & Work Midi", price: 50, size: "8", image: "images/item4.jpg" },
        { name: "Dinner & Party Elegance", price: 45, size: "8/10", image: "images/item5.jpg" },
        { name: "Lecture & Beach Set", price: 45, size: "6/8/10", image: "images/item6.jpg" },
        { name: "Ruched SHEIN Special", price: 50, size: "8/10", image: "images/item7.jpg" },
        { name: "Ultimate Work Gown", price: 50, size: "12/14", image: "images/item8.jpg" },
        { name: "Skirt & Basic Top Duo", price: 50, size: "10/12", image: "images/item9.jpg" },
        { name: "Refined Church Wear", price: 50, size: "10", image: "images/item10.jpg" }
    ];

    function renderProducts() {
        document.getElementById('productGrid').innerHTML = myProducts.map(item => `
            <div class="product-card" onclick="openPreview('${item.name.replace(/'/g, "\\'")}', ${item.price}, '${item.image}', '${item.size}')">
                <div class="p-image">
                    <img src="${item.image}" onerror="this.src='https://via.placeholder.com/400x520?text=ENIS'">
                </div>
                <div class="p-details">
                    <span class="size-tag">UK SIZE ${item.size}</span>
                    <h3 class="p-name">${item.name}</h3>
                    <p class="price">GH₵ ${item.price.toFixed(2)}</p>
                </div>
            </div>
        `).join('');
    }
    renderProducts();

    function launchApp() {
        document.getElementById('splash-screen').classList.add('lifted');
    }

    function openPreview(name, price, image, size) {
        document.getElementById('preview-img').src = image;
        document.getElementById('preview-name').innerText = name;
        document.getElementById('preview-size').innerText = `UK SIZE ${size} • GH₵ ${price}`;
        const msg = encodeURIComponent(`Hi Enis! I'd like to order: ${name} (Size ${size})`);
        document.getElementById('whatsapp-order-btn').href = `https://wa.me/233546527892?text=${msg}`;
        document.getElementById('item-preview').style.display = 'flex';
        setTimeout(() => document.getElementById('item-preview').classList.add('active'), 10);
    }

    function closePreview() { 
        document.getElementById('item-preview').classList.remove('active'); 
        setTimeout(() => document.getElementById('item-preview').style.display = 'none', 300);
    }

    // SCROLL LOGIC
    let lastScroll = 0;
    window.addEventListener('scroll', () => {
        const cur = window.scrollY;
        const header = document.getElementById('mainHeader');
        if (cur > lastScroll && cur > 80) header.classList.add('header-hidden');
        else header.classList.remove('header-hidden');
        lastScroll = cur;
    });
</script>

</body>
</html>
